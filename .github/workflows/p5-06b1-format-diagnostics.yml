name: P5-06B1 format diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: p5-06b1-review-entry-api
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Apply focused formatting
        run: |
          npx biome format --write \
            src/admin/submissions/review-entry-authorization.ts \
            src/admin/submissions/review-entry.ts \
            src/admin/submissions/drizzle-review-entry-backend.ts \
            functions/admin/api/review-entry/[submissionId].ts \
            tests/submission-review-entry.test.ts \
            tests/submission-review-entry-api.test.ts \
            scripts/check-submission-review-entry.ts \
            package.json
      - name: Capture focused diagnostics
        shell: bash
        run: |
          set +e
          npm run check > p5-06b1-check.log 2>&1
          npm run schema:check > p5-06b1-schema.log 2>&1
          npx vitest run tests/submission-review-entry.test.ts tests/submission-review-entry-api.test.ts > p5-06b1-tests.log 2>&1
          exit 0
      - name: Upload focused diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: p5-06b1-focused-diagnostics
          path: p5-06b1-*.log
          if-no-files-found: error
      - name: Remove temporary workflow and commit formatting
        shell: bash
        run: |
          rm .github/workflows/p5-06b1-format-diagnostics.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/admin/submissions/review-entry-authorization.ts \
            src/admin/submissions/review-entry.ts \
            src/admin/submissions/drizzle-review-entry-backend.ts \
            functions/admin/api/review-entry/[submissionId].ts \
            tests/submission-review-entry.test.ts \
            tests/submission-review-entry-api.test.ts \
            scripts/check-submission-review-entry.ts \
            package.json \
            .github/workflows/p5-06b1-format-diagnostics.yml
          git commit -m "P5-06B1 apply focused formatting"
          git push origin HEAD:p5-06b1-review-entry-api
