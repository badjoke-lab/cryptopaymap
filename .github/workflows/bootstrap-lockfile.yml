name: Bootstrap npm lockfile

on:
  push:
    branches:
      - p1-01-application-foundation

permissions:
  contents: write

jobs:
  lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: p1-01-application-foundation

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Generate lockfile
        run: npm install --package-lock-only --ignore-scripts --no-audit --no-fund

      - name: Commit lockfile
        run: |
          if git diff --quiet -- package-lock.json && git ls-files --error-unmatch package-lock.json >/dev/null 2>&1; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package-lock.json
          git commit -m "P1-01: add npm lockfile"
          git push origin HEAD:p1-01-application-foundation
