name: P5-05I branch Node types

on:
  push:
    branches:
      - p5-05i-photo-r2-signing-integration

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-05i-photo-r2-signing-integration
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm install --save-dev --save-exact @types/node@24
      - name: Commit dependency metadata
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json
          git commit -m "chore: add Node types for P5-05I audit"
          git push origin HEAD:p5-05i-photo-r2-signing-integration
