          )
          old_replay = """      if (active?.pointer.snapshotDigest === plan.pointer.snapshotDigest) {
        return {
          requestId: contextResult.data.requestId,
          approvalRequestId: approvalResult.data.requestId,
          snapshotDigest: plan.pointer.snapshotDigest,
