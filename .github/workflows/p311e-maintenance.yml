          auth_test = Path('tests/export-activation-authorization.test.ts')
          auth_test.write_text("""import { describe, expect, it } from 'vitest';
import {
  authorizeExportPublication,
  readExportPublicationAuthorizationPolicy,
} from '../src/admin/export-release/publication-authorization';

const identity = {
  actorId: 'cloudflare-access:release-activator',
  actorType: 'human' as const,
  subject: 'release-activator',
  email: 'activator@example.test',
};
const requestId = '10000000-0000-4000-8000-000000000001';

describe('export activation authorization', () => {
  it('authorizes an allowlisted identity', () => {
    const policy = readExportPublicationAuthorizationPolicy({
      CPM_ADMIN_EXPORT_PUBLISH_ACTOR_IDS: JSON.stringify([identity.actorId]),
    });
    expect(authorizeExportPublication(identity, policy, requestId)).toEqual({
      requestId,
      actorId: identity.actorId,
      actorType: identity.actorType,
      capabilities: ['export:publish'],
    });
  });

  it('fails closed without configuration', () => {
    const policy = readExportPublicationAuthorizationPolicy({});
    expect(() => authorizeExportPublication(identity, policy, requestId)).toThrow();
  });

  it('rejects an identity outside the allowlist', () => {
    const policy = readExportPublicationAuthorizationPolicy({
      CPM_ADMIN_EXPORT_PUBLISH_ACTOR_IDS: JSON.stringify(['another-actor']),
    });
    expect(() => authorizeExportPublication(identity, policy, requestId)).toThrowError(
      expect.objectContaining({ code: 'not_authorized' }),
    );
  });

  it('requires an idempotency UUID', () => {
    const policy = readExportPublicationAuthorizationPolicy({
      CPM_ADMIN_EXPORT_PUBLISH_ACTOR_IDS: JSON.stringify([identity.actorId]),
    });
    expect(() => authorizeExportPublication(identity, policy, null)).toThrowError(
      expect.objectContaining({ code: 'invalid_request_id' }),
    );
  });
});
""")

          runtime = Path('scripts/check-export-activation.ts')
          runtime.write_text("""import { createR2ExportPublicationTarget } from '../src/admin/export-release/activation-r2';
import { InMemoryExportPublicationTarget } from '../src/admin/export-release/in-memory-activation';
import {
  authorizeExportPublication,
  exportPublicationActorPolicySchema,
  readExportPublicationAuthorizationPolicy,
