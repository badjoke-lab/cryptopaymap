name: P3-11E maintenance

on:
  push:
    branches:
      - work/p311e
    paths:
      - .github/workflows/p311e-maintenance.yml

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p311e
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Harden activation contract and synchronize delivery
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          contract = Path('src/admin/export-release/publication-contract.ts')
          text = contract.read_text()
          text = text.replace(
              "const reasonCodeSchema = z\n  .string()\n  .trim()\n  .min(1)\n  .max(96)\n  .regex(/^[a-z0-9]+(?:_[a-z0-9]+)*$/);\n\n",
              "",
          )
          text = text.replace(
              "    publishedAt: z.iso.datetime({ offset: true }),\n    reasonCode: reasonCodeSchema,\n    internalNote: z.string().trim().min(1).max(2_000).nullable(),\n",
              "    publishedAt: z.iso.datetime({ offset: true }),\n",
          )
          text = text.replace(
              "    publishedAt: z.iso.datetime({ offset: true }),\n    releasePrefix: z.string().min(1).max(512),\n",
              "    publishedAt: z.iso.datetime({ offset: true }),\n    activationFingerprint: sha256Schema,\n    releasePrefix: z.string().min(1).max(512),\n",
          )
          marker = "function releaseObjectKey(snapshotDigest: string, path: string): string {\n  return `export-releases/by-snapshot/${snapshotDigest}/${path.replace(/^\\//, '')}`;\n}\n\n"
          fingerprint = """function releaseObjectKey(snapshotDigest: string, path: string): string {
  return `export-releases/by-snapshot/${snapshotDigest}/${path.replace(/^\//, '')}`;
}

export async function exportPublicationFingerprint(
  context: ExportPublicationMutationContext,
  input: ExportPublicationInput,
): Promise<string> {
  const { publishedAt: _publishedAt, ...stableInput } = input;
  return hashPublicArtifact({
    requestId: context.requestId,
    actorId: context.actorId,
    actorType: context.actorType,
    input: stableInput,
  });
}

function pointerIdentity(pointer: ActiveExportReleasePointer): unknown {
  const { publishedAt: _publishedAt, ...identity } = pointer;
  return identity;
}

"""
          if marker not in text:
            raise SystemExit('releaseObjectKey marker not found')
          text = text.replace(marker, fingerprint)
          text = text.replace(
              "  publishedAt: string,\n): Promise<ExportPublicationPlan> {",
              "  publishedAt: string,\n  activationFingerprint: string,\n): Promise<ExportPublicationPlan> {",
          )
          text = text.replace(
              "    publishedAt,\n    releasePrefix,\n",
              "    publishedAt,\n    activationFingerprint,\n    releasePrefix,\n",
          )
          text = text.replace(
              "  if (approval.generatedAt !== input.expectedGeneratedAt) issues.push('approvalGeneratedAt');\n",
              "  if (approval.generatedAt !== input.expectedGeneratedAt) issues.push('approvalGeneratedAt');\n  if (Date.parse(approval.decidedAt) > Date.parse(input.publishedAt)) {\n    issues.push('approvalDecidedAt');\n  }\n",
          )
          text = text.replace(
              "    publishedAt: string,\n  ) => Promise<ExportPublicationPlan> = buildExportPublicationPlan,",
