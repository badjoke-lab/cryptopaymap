    throw new Error('Export activation runtime export is missing.');
  }
}

const requestId = '10000000-0000-4000-8000-000000000001';
const approvalRequestId = '10000000-0000-4000-8000-000000000002';
const snapshotDigest = 'a'.repeat(64);
const generatedAt = '2026-07-04T00:00:00.000Z';
const publishedAt = '2026-07-04T02:00:00.000Z';
const releasePrefix = `export-releases/by-snapshot/${snapshotDigest}/`;
const plan: ExportPublicationPlan = {
  pointerKey: 'export-releases/active.json',
  releasePrefix,
  pointer: {
    formatVersion: '1',
    snapshotDigest,
    datasetVersion: '2026.07.04.1',
    schemaVersion: '1.0.0',
    generatedAt,
    publishedAt,
    activationFingerprint: '0'.repeat(64),
    releasePrefix,
    files: [
      {
        path: '/version.json',
        objectKey: `${releasePrefix}version.json`,
        mediaType: 'application/json',
        sha256: 'b'.repeat(64),
        canonicalByteSize: 12,
      },
    ],
  },
  objects: [
    {
      path: '/version.json',
      objectKey: `${releasePrefix}version.json`,
      mediaType: 'application/json',
      sha256: 'b'.repeat(64),
      canonicalByteSize: 12,
      body: '{"ok":true}\\n',
    },
  ],
};
const target = new InMemoryExportPublicationTarget();
const service = createExportPublicationService(
  {
    loadApprovedRelease: async () => ({
      requestId: approvalRequestId,
      action: 'approve',
      releaseStatus: 'approved',
      snapshotDigest,
      artifactCount: 1,
      datasetVersion: '2026.07.04.1',
      schemaVersion: '1.0.0',
      generatedAt,
      decidedAt: '2026-07-04T01:00:00.000Z',
    }),
  },
  target,
  async () => plan,
);
const receipt = await service.publish(
  {
    requestId,
    actorId: 'system:export-activation-check',
    actorType: 'system',
    capabilities: ['export:publish'],
  },
  {
    approvalRequestId,
    expectedSnapshotDigest: snapshotDigest,
    expectedArtifactCount: 1,
    expectedDatasetVersion: '2026.07.04.1',
    expectedSchemaVersion: '1.0.0',
    expectedGeneratedAt: generatedAt,
    expectedActiveSnapshotDigest: null,
    publishedAt,
  },
  {},
);
if (
  receipt.state !== 'published' ||
  target.snapshot().pointer?.pointer.snapshotDigest !== snapshotDigest
) {
  throw new Error('Export activation runtime checks produced an invalid result.');
}
console.log('Export activation checks passed.');
""")

          docs = Path('docs/EXPORT_RELEASE_ACTIVATION.md')
          docs.write_text("""# Export release activation

**Implementation item:** P3-11E  
**Status:** Active

## Purpose

This contract activates a previously approved public export snapshot without allowing an approval receipt, private candidate, or active release pointer to change silently between review and activation.

Release activation remains separate from the approve or reject decision.

## Authorization

Activation uses the isolated capability `export:publish` and the independent actor allowlist `CPM_ADMIN_EXPORT_PUBLISH_ACTOR_IDS`. A reviewer authorized for `export:release` is not automatically authorized to activate a release. Every request requires an `Idempotency-Key` UUID.

## Exact inputs

The protected request pins the approved decision request ID, snapshot digest, artifact count, dataset version, schema version, generation time, and expected currently active snapshot digest. The server supplies the activation time. The client never submits artifact bodies, object keys, validation results, or pointer content.

## Revalidation

Before writing public objects, the service reloads the durable approved decision and private candidate bundle, reruns the full public export boundary, rebuilds canonical JSON, recomputes artifact hashes and the complete snapshot digest, and compares all approval and candidate expectations.

## Immutable release objects

Artifacts use the deterministic prefix `export-releases/by-snapshot/{snapshotDigest}/`. Existing objects are reused only when key, size, media type, snapshot digest, artifact path, and SHA-256 metadata match exactly. Mismatched immutable objects are never overwritten.

A partial staging failure leaves the active pointer unchanged. A retry may safely fill missing immutable objects.

## Active pointer

The active release is selected only by `export-releases/active.json`. The pointer contains release versions, generation and activation times, immutable prefix, one-way activation fingerprint, and the complete artifact inventory.

The pointer is written only after every immutable object is verified.

## Conditional activation

The R2 adapter reads the active pointer ETag and uses a conditional `put` operation. The first release requires the pointer to be absent. A replacement requires the ETag read before staging to remain current. A failed condition returns a pointer conflict rather than overwriting another activation.

## Activation fingerprint

The public pointer stores a one-way fingerprint derived from the idempotency request ID, actor identity and type, and exact activation expectations. The server-generated activation time is excluded so an exact retry can recover after a timeout. The actor identity and request ID themselves are not written into the pointer body.

An exact retry returns `replayed`. A different request attempting to reuse the already active snapshot returns a conflict.

## Endpoint

`POST /admin/api/export-activate` validates the separate publication policy, loads the server-controlled candidate, checks the durable approval, stages immutable objects, and conditionally switches the pointer.

## Receipt

A successful operation returns the request and approval IDs, snapshot and release versions, generation and activation times, previous active snapshot, pointer key, release prefix, artifact count, and `published` or `replayed` state.

The operation receipt is not yet durable publication history. Durable activation history and rollback are the next delivery.

## Explicit exclusions

P3-11E does not add durable activation history, rollback, release history UI, automatic candidate generation, root-path materialization, inactive release cleanup, or live Access, R2, database, and production verification.
""")

