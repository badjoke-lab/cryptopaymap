name: P3-07H finalize branch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Synchronize source branch
        run: git pull --rebase origin "${GITHUB_HEAD_REF}"
      - name: Align jsdom FormData and format files
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/candidate-promotion-field-controls.test.tsx')
          text = path.read_text()
          needle = "beforeEach(() => {\n  let sequence = 0;"
          replacement = "beforeEach(() => {\n  vi.stubGlobal('FormData', window.FormData);\n  let sequence = 0;"
          if needle in text:
              text = text.replace(needle, replacement, 1)
          if "vi.stubGlobal('FormData', window.FormData);" not in text:
              raise SystemExit('FormData test setup is unavailable.')
          path.write_text(text)
          PY
          npx biome format --write \
            scripts/check-candidate-promotion-field-controls.ts \
            src/admin/promotion/field-source-selection.ts \
            src/components/admin/CandidatePromotionEditor.tsx \
            src/components/admin/CandidatePromotionForm.tsx \
            src/components/admin/PromotionAssetRowEditor.tsx \
            src/components/admin/PromotionAssetSection.tsx \
            src/components/admin/PromotionClaimSection.tsx \
            src/components/admin/PromotionFieldSourceControls.tsx \
            tests/candidate-promotion-field-controls.test.tsx \
            tests/candidate-promotion-field-source-selection.test.ts
          rm .github/workflows/p307h-finalize.yml
      - name: Commit finalized files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P3-07H: finalize field source controls"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
