name: P3-08B build persistence

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Synchronize branch
        run: git pull --rebase origin "${GITHUB_HEAD_REF}"
      - name: Materialize P3-08B files
        env:
          GUARDS_GZ: ""
          STATE_GZ: ""
          BACKEND_GZ: ""
          TEST_GZ: ""
          RUNTIME_GZ: ""
        run: |
          python - <<'PY'
          import base64
          import gzip
          import os
          from pathlib import Path

          files = {
              "src/admin/evidence-review/drizzle-guards.ts": os.environ["GUARDS_GZ"],
              "src/admin/evidence-review/drizzle-state.ts": os.environ["STATE_GZ"],
              "src/admin/evidence-review/drizzle-backend.ts": os.environ["BACKEND_GZ"],
              "tests/evidence-review-persistence.test.ts": os.environ["TEST_GZ"],
              "scripts/check-evidence-review-persistence.ts": os.environ["RUNTIME_GZ"],
          }
          for path, encoded in files.items():
              target = Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(gzip.decompress(base64.b64decode(encoded)))

          index_path = Path("src/db/schema/index.ts")
          index_text = index_path.read_text()
          export_line = "export * from './evidence-review-decisions';\n"
          if export_line not in index_text:
              needle = "export * from './evidence';\n"
              if needle not in index_text:
                  raise SystemExit("Schema export insertion point is unavailable.")
              index_text = index_text.replace(needle, needle + export_line, 1)
          index_path.write_text(index_text)

          runtime_path = Path("src/schemas/verification-events.ts")
          runtime_text = runtime_path.read_text()
          if "  'rejected',\n" not in runtime_text.split("]);", 1)[0]:
              runtime_text = runtime_text.replace(
                  "  'ended',\n  'restored',",
                  "  'ended',\n  'rejected',\n  'restored',",
                  1,
              )
          rejected_block = """    if (
              event.eventType === 'rejected' &&
              (event.fromStatus !== 'candidate' || event.toStatus !== 'rejected')
            ) {
              context.addIssue({
                code: 'custom',
                path: ['toStatus'],
                message: 'Rejected events transition candidate claims to rejected.',
              });
            }

          """
          if "Rejected events transition candidate claims to rejected." not in runtime_text:
              needle = "    if (\n      event.eventType === 'restored' &&"
              if needle not in runtime_text:
                  raise SystemExit("Rejected event validation insertion point is unavailable.")
              runtime_text = runtime_text.replace(needle, rejected_block + needle, 1)
          runtime_text = runtime_text.replace(
              "['marked_stale', 'ended'].includes(decision.event.eventType)",
              "['marked_stale', 'ended', 'rejected'].includes(decision.event.eventType)",
              1,
          )
          runtime_text = runtime_text.replace(
              "Stale and ended events require decision evidence.",
              "Stale, ended, and rejected events require decision evidence.",
              1,
          )
          runtime_path.write_text(runtime_text)

          decision_schema = Path("src/db/schema/evidence-review-decisions.ts")
          decision_text = decision_schema.read_text()
          decision_text = decision_text.replace(
              "or (${table.claimAction} <> 'no_change' and ${table.verificationEventId} is not null)",
              "or (${table.claimAction} <> 'no_change' and ${table.disposition} = 'accepted' and ${table.verificationEventId} is not null)",
              1,
          )
          decision_schema.write_text(decision_text)

          package_path = Path("package.json")
          package_text = package_path.read_text()
          addition = " && tsx scripts/check-evidence-review-persistence.ts"
          if addition not in package_text:
              needle = " && tsx scripts/check-evidence-review-decision.ts\""
              if needle not in package_text:
                  raise SystemExit("schema:check persistence insertion point is unavailable.")
              package_text = package_text.replace(needle, needle[:-1] + addition + '"', 1)
          package_path.write_text(package_text)
          PY
      - name: Generate migration and snapshot
        run: npm run db:generate
      - name: Format P3-08B files
        run: |
          npx biome format --write \
            src/admin/evidence-review/drizzle-guards.ts \
            src/admin/evidence-review/drizzle-state.ts \
            src/admin/evidence-review/drizzle-backend.ts \
            src/db/schema/evidence-review-decisions.ts \
            src/db/schema/index.ts \
            src/db/schema/verification-events.ts \
            src/schemas/verification-events.ts \
            tests/evidence-review-persistence.test.ts \
            scripts/check-evidence-review-persistence.ts
      - name: Remove one-time builder
        run: rm .github/workflows/p308b-build.yml
      - name: Commit generated persistence
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P3-08B: add durable Evidence review persistence"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
