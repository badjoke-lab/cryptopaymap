name: P5-06D1 scoped formatting

on:
  push:
    branches:
      - p5-06d1-common-terminal-resolution

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-06d1-common-terminal-resolution
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format P5-06D1 files
        run: >-
          npx biome format --write
          src/submissions/terminal-resolution-contract.ts
          src/admin/submissions/terminal-resolution-authorization.ts
          src/admin/submissions/terminal-resolution.ts
          src/admin/submissions/drizzle-terminal-resolution-backend.ts
          functions/admin/api/terminal-resolution/[submissionId].ts
          tests/submission-terminal-resolution.test.ts
          tests/submission-terminal-resolution-api.test.ts
          scripts/check-submission-terminal-resolution.ts
          src/submissions/private-status-service.ts
          src/submissions/drizzle-persistence.ts
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/submissions/terminal-resolution-contract.ts \
            src/admin/submissions/terminal-resolution-authorization.ts \
            src/admin/submissions/terminal-resolution.ts \
            src/admin/submissions/drizzle-terminal-resolution-backend.ts \
            functions/admin/api/terminal-resolution/[submissionId].ts \
            tests/submission-terminal-resolution.test.ts \
            tests/submission-terminal-resolution-api.test.ts \
            scripts/check-submission-terminal-resolution.ts \
            src/submissions/private-status-service.ts \
            src/submissions/drizzle-persistence.ts
          git commit -m "P5-06D1 apply repository formatting"
          git push origin HEAD:p5-06d1-common-terminal-resolution
