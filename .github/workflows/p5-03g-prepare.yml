name: Prepare P5-03G branch

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-03g-problem-decisions
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Synchronize tracking
        run: |
          python <<'PY'
          from pathlib import Path

          def replace_if_present(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old in text:
                  file.write_text(text.replace(old, new))

          replace_if_present(
              'docs/PROJECT_STATUS.md',
              'P5-03F — Negative Evidence and priority-recheck decision boundary',
              'P5-03G — Problem correction and urgent visibility decision boundaries',
          )
          replace_if_present(
              'docs/PROJECT_STATUS.md',
              '- P5-03F negative Evidence and priority-recheck decision boundary is in progress.',
              '- P5-03F negative Evidence and priority-recheck decision boundary is complete through #199.\n- P5-03G problem correction and urgent visibility decision boundaries are in progress.',
          )
          replace_if_present(
              'docs/PROJECT_STATUS.md',
              '3. P5-03 — Payment and problem reports — In progress at P5-03F',
              '3. P5-03 — Payment and problem reports — In progress at P5-03G',
          )
          replace_if_present(
              'docs/PROJECT_STATUS.md',
              'P5-03F  Negative Evidence and priority-recheck decision                   In progress',
              'P5-03F  Negative Evidence and priority-recheck decision                   Completed #199\nP5-03G  Problem correction and urgent visibility decisions                  In progress',
          )
          replace_if_present(
              'docs/PROJECT_STATUS.md',
              '35. `docs/P5_03F_NEGATIVE_EVIDENCE_AND_RECHECK_PRIORITY.md`;\n36. `docs/P4_18_E_LIVE_REVIEW_AND_HANDOFF_AUDIT.md`.',
              '35. `docs/P5_03F_NEGATIVE_EVIDENCE_AND_RECHECK_PRIORITY.md`;\n36. `docs/P5_03G_PROBLEM_CORRECTION_AND_URGENT_VISIBILITY.md`;\n37. `docs/P4_18_E_LIVE_REVIEW_AND_HANDOFF_AUDIT.md`.',
          )
          replace_if_present(
              'docs/PROJECT_STATUS.md',
              """## Current active scope — P5-03F negative Evidence and recheck priority

P5-03F adds a separately authorized, idempotent, atomic decision for reviewed failed-payment and no-longer-accepts reports to become accepted private or restricted contradicting Evidence. Reviewers may also create a durable recheck-priority signal without changing Claim status, visibility, canonical fields, publication, or `nextReviewAt`.

The protected reconfirmation queue derives priority from accepted contradicting Evidence plus its durable Submission decision event. A later Verification Event resolves the priority signal without deleting Evidence or rewriting history.

Repository implementation and GitHub validation proceed without Cloudflare or Neon operator actions. Configured Access, deployed Functions, live Neon execution, and integrated audit remain assigned to P5-03I.

## Next

Complete P5-03F authorization, request and event contracts, atomic negative Evidence persistence, recheck-priority integration, idempotent replay, protected API, focused tests, schema validation, and tracking. Then proceed to P5-03G correction and urgent visibility decision boundaries.

## Blocked

No repository blocker to P5-03F is known. Configured Cloudflare/Neon execution is intentionally deferred to P5-03I; retained Launch work remains unchanged and launch readiness is not claimed.""",
              """## Current active scope — P5-03G problem correction and urgent visibility

P5-03G adds separately authorized, idempotent, atomic operations for typed correction handoff, duplicate/no-change resolution, restricted urgent temporary hiding, and accepted-negative-Evidence Claim actions.

Correction approval remains a durable handoff and does not apply canonical fields. Closure, privacy, or rights reports may temporarily hide a public Claim only with restricted evidence and urgent permission. Mark-stale and end require accepted contradicting Evidence from P5-03F for the same Submission and Claim.

Repository implementation and GitHub validation proceed without Cloudflare or Neon operator actions. Configured Access, deployed Functions, live Neon execution, and integrated audit remain assigned to P5-03I.

## Next

Complete P5-03G authorization, strict request/event contracts, projection integrity, atomic persistence, deterministic replay, protected API, focused tests, schema validation, and tracking. Then proceed to P5-03H public payment/problem routes and forms.

## Blocked

No repository blocker to P5-03G is known. Configured Cloudflare/Neon execution is intentionally deferred to P5-03I; retained Launch work remains unchanged and launch readiness is not claimed.""",
          )

          replace_if_present('docs/IMPLEMENTATION_PLAN.md', '**Status:** In progress at P5-03F', '**Status:** In progress at P5-03G')
          replace_if_present(
              'docs/IMPLEMENTATION_PLAN.md',
              'P5-03F — Negative Evidence and priority-recheck decision boundary         In progress\n    ↓\nP5-03G — Problem correction and urgent visibility decision boundaries     Planned',
              'P5-03F — Negative Evidence and priority-recheck decision boundary         Completed #199\n    ↓\nP5-03G — Problem correction and urgent visibility decision boundaries     In progress',
          )
          replace_if_present(
              'docs/IMPLEMENTATION_PLAN.md',
              'P5-03A is complete through #194, P5-03B through #195, P5-03C through #196, P5-03D through #197, and P5-03E through #198. P5-03F owns the separately authorized, idempotent, atomic negative-Evidence decision and the non-mutating recheck-priority signal derived by the protected reconfirmation queue. It accepts only failed payment reports or `payment_failed` / `no_longer_accepts_crypto` problem reports, creates no public Evidence, and does not change Claim status, visibility, `nextReviewAt`, canonical fields, export, or publication. Configured Cloudflare Access and live Neon execution remain deferred to P5-03I.',
              'P5-03A is complete through #194, P5-03B through #195, P5-03C through #196, P5-03D through #197, P5-03E through #198, and P5-03F through #199. P5-03G owns typed correction handoff, duplicate/no-change resolution, restricted urgent temporary hiding, and explicit mark-stale/end actions backed by accepted contradicting Evidence. It does not apply canonical corrections automatically, merge or delete canonical records, create public Evidence, or publish data. Configured Cloudflare Access and live Neon execution remain deferred to P5-03I.',
          )

          replace_if_present('docs/PHASE5_IMPLEMENTATION_SEQUENCE.md', '**Status:** Active — P5-03F in progress', '**Status:** Active — P5-03G in progress')
          replace_if_present('docs/PHASE5_IMPLEMENTATION_SEQUENCE.md', '**Status:** In progress at P5-03F', '**Status:** In progress at P5-03G')
          replace_if_present(
              'docs/PHASE5_IMPLEMENTATION_SEQUENCE.md',
              'P5-03F  Negative Evidence and priority-recheck decision                   In progress\nP5-03   Payment and problem reports                                     In progress',
              'P5-03F  Negative Evidence and priority-recheck decision                   Completed #199\nP5-03G  Problem correction and urgent visibility decisions                  In progress\nP5-03   Payment and problem reports                                     In progress',
          )
          replace_if_present(
              'docs/PHASE5_IMPLEMENTATION_SEQUENCE.md',
              'P5-03F — Negative Evidence and priority-recheck decision boundary         In progress\n    ↓\nP5-03G — Problem correction and urgent visibility decision boundaries     Planned',
              'P5-03F — Negative Evidence and priority-recheck decision boundary         Completed #199\n    ↓\nP5-03G — Problem correction and urgent visibility decision boundaries     In progress',
          )
          PY
      - run: npm run format
      - run: git rm .github/workflows/p5-03g-prepare.yml
      - name: Commit prepared branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'P5-03G: finalize problem decision slice'
          git push origin HEAD:p5-03g-problem-decisions
