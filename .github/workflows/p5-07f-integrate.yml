name: P5-07F integrate

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07f-photo-media-receipt-binding' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07f-photo-media-receipt-binding
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/p5-07f-audit-fix.mjs
      - run: node scripts/p5-07f-type-fix.mjs
      - name: Integrate P5-07F slice
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/p5-07f-integrate.mjs
      - run: npm run format
      - run: npm run lint
      - run: node scripts/check-p5-07f-photo-media-receipt-binding.mjs
      - run: npx vitest run tests/submission-application-registration.test.ts
      - run: npm run check
      - name: Commit integrated slice
        shell: bash
        run: |
          rm .github/workflows/p5-07f-integrate.yml .github/workflows/p5-07f-diagnose.yml scripts/p5-07f-integrate.mjs scripts/p5-07f-audit-fix.mjs scripts/p5-07f-type-fix.mjs
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P5-07F bind Photos Media receipts"
          git push origin HEAD:p5-07f-photo-media-receipt-binding
