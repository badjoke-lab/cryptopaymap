name: P3-10E boundary maintenance

on:
  push:
    branches:
      - work/p310e
    paths:
      - .github/workflows/p310e-boundary-maintenance.yml

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p310e
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Harden UI actions and synchronize implementation plan
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          component = Path('src/components/admin/MediaReviewDetail.tsx')
          text = component.read_text()
          old = """  if (media.reviewStatus === 'pending') {
    return ['evidence', 'owner_verification'].includes(media.purpose)
      ? ['approve_private', 'reject']
      : ['approve_public', 'reject'];
  }
"""
          new = """  if (media.reviewStatus === 'pending') {
    if (['evidence', 'owner_verification'].includes(media.purpose)) {
      return ['approve_private', 'reject'];
    }
    if (['public_gallery_candidate', 'canonical_logo'].includes(media.purpose)) {
      return ['approve_public', 'reject'];
    }
    return ['reject'];
  }
"""
          if old not in text:
            raise SystemExit('Expected Media action block was not found.')
          text = text.replace(old, new)
          text = text.replace(
              '              <select\n                name="privacyReview"',
              '              <select\n                key={action}\n                name="privacyReview"',
          )
          component.write_text(text)

          plan = Path('docs/IMPLEMENTATION_PLAN.md')
          text = plan.read_text()
          text = text.replace(
              '| P3-10 | Media review | Protected workspace active | P3-02, P2-10 | #69–#71 complete; P3-10D active |',
              '| P3-10 | Media review | Reviewer UI active | P3-02, P2-10 | #69–#72 complete; P3-10E active |',
          )
          text = text.replace(
              'P3-10C added private staged derivatives, deterministic private and public R2 keys, storage metadata preflight, durable file transitions, replay-safe publication after approval, fail-closed revocation, and R2 adapter boundaries in pull request #71.\n\n### Current delivery',
              'P3-10C added private staged derivatives, deterministic private and public R2 keys, storage metadata preflight, durable file transitions, replay-safe publication after approval, fail-closed revocation, and R2 adapter boundaries in pull request #71.\n\nP3-10D added the protected bounded Media queue, version-pinned detail and complete file-set workspace, isolated read authorization, queue and detail GET endpoints, and the idempotent storage-aware decision POST endpoint in pull request #72.\n\n### Current delivery',
          )
          text = text.replace(
              'P3-10D adds the protected bounded Media queue, version-pinned detail and complete file-set workspace, isolated read authorization, queue and detail GET endpoints, and the idempotent storage-aware decision POST endpoint.',
              'P3-10E adds `/admin/media`, protected private-file previews, the exact Media review detail workspace, state-aware decision controls, rights and privacy fields, component tests, and protected artifact validation.',
          )
          text = text.replace('- `/admin/media` reviewer UI\n', '')
          plan.write_text(text)
          PY
      - name: Format repository
        run: npm run format
      - name: Commit final boundary update and remove workflow
        shell: bash
        run: |
          git rm .github/workflows/p310e-boundary-maintenance.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs functions package.json scripts src tests
          git commit -m "P3-10E: harden final reviewer UI boundaries"
          git push origin HEAD:work/p310e
