name: P5-06D2 scoped formatting

on:
  push:
    branches:
      - p5-06d2-terminal-resolution-ui

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-06d2-terminal-resolution-ui
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format P5-06D2 files
        run: >-
          npx biome format --write
          src/components/admin/SubmissionTerminalResolutionPanel.tsx
          src/pages/admin/submissions/detail.astro
          src/pages/admin/submissions/report-detail.astro
          src/pages/admin/submissions/photo-detail.astro
          tests/submission-terminal-resolution-ui.test.tsx
          scripts/check-report-submission-reviewer-artifact.mjs
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            src/components/admin/SubmissionTerminalResolutionPanel.tsx \
            src/pages/admin/submissions/detail.astro \
            src/pages/admin/submissions/report-detail.astro \
            src/pages/admin/submissions/photo-detail.astro \
            tests/submission-terminal-resolution-ui.test.tsx \
            scripts/check-report-submission-reviewer-artifact.mjs
          git commit -m "P5-06D2 apply repository formatting"
          git push origin HEAD:p5-06d2-terminal-resolution-ui
