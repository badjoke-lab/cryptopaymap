name: P3-11B migration generation

on:
  push:
    branches:
      - work/p311b
    paths:
      - .github/workflows/p311b-migration.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p311b
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate migration
        run: npm run db:generate
      - name: Format repository
        run: npm run format
      - name: Commit generated migration and remove workflow
        shell: bash
        run: |
          git rm .github/workflows/p311b-migration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drizzle docs package.json scripts src tests
          git commit -m "P3-11B: generate export release migration"
          git push origin HEAD:work/p311b
