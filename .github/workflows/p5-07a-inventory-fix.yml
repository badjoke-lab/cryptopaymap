name: P5-07A inventory fix

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'p5-07a-canonical-retention-inventory' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07a-canonical-retention-inventory
          fetch-depth: 0
      - name: Align inventory markers
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/check-p5-07a-canonical-retention-inventory.mjs')
          source = path.read_text()
          source = source.replace("\"visibility: 'temporarily_hidden'\"", "\"toVisibility: 'temporarily_hidden'\"")
          source = source.replace(
              "\"and ${submissions.workflowStatus} = 'resolved'\"",
              "\"and $\" + \"{submissions.workflowStatus} = 'resolved'\"",
          )
          source = source.replace(
              "\"and ${submissions.resolution} = 'approved'\"",
              "\"and $\" + \"{submissions.resolution} = 'approved'\"",
          )
          path.write_text(source)
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx biome format --write scripts/check-p5-07a-canonical-retention-inventory.mjs
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/check-p5-07a-canonical-retention-inventory.mjs
          git commit -m "P5-07A: align inventory markers with canonical backends"
          git push origin HEAD:p5-07a-canonical-retention-inventory
