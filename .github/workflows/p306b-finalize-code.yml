name: P3-06B code finalizer

on:
  push:
    branches:
      - work/p306b
    paths:
      - .github/workflows/p306b-finalize-code.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/p306b
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply bounded fixes
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const endpointPath = 'functions/admin/api/duplicates/[groupId].ts';
          let endpoint = readFileSync(endpointPath, 'utf8');
          endpoint = endpoint.replace(
            'function jsonResponse(status: number, body: Record<string, unknown>): Response {',
            'function jsonResponse(status: number, body: unknown): Response {',
          );
          writeFileSync(endpointPath, endpoint);

          const componentPath = 'src/components/admin/CandidateDuplicateReview.tsx';
          let component = readFileSync(componentPath, 'utf8');
          component = component.replace(
            "import { useCallback, useEffect, useMemo, useState } from 'react';",
            "import { useCallback, useEffect, useState } from 'react';",
          );
          component = component.replace(
            "  const groupId = useMemo(() => new URLSearchParams(window.location.search).get('group'), []);\n  const [state, setState] = useState<State>({ status: 'loading' });",
            "  const [groupId, setGroupId] = useState<string | null | undefined>(undefined);\n  const [state, setState] = useState<State>({ status: 'loading' });",
          );
          component = component.replace(
            "  const loadReview = useCallback(async (signal?: AbortSignal) => {\n    if (!groupId) return setState({ status: 'missing' });",
            "  useEffect(() => {\n    setGroupId(new URLSearchParams(window.location.search).get('group'));\n  }, []);\n\n  const loadReview = useCallback(async (signal?: AbortSignal) => {\n    if (groupId === undefined) return;\n    if (!groupId) return setState({ status: 'missing' });",
          );
          writeFileSync(componentPath, component);

          const packagePath = 'package.json';
          let packageText = readFileSync(packagePath, 'utf8');
          if (!packageText.includes('check-candidate-duplicate-review.ts')) {
            packageText = packageText.replace(
              'tsx scripts/check-candidate-duplicate-decisions.ts"',
              'tsx scripts/check-candidate-duplicate-decisions.ts && tsx scripts/check-candidate-duplicate-review.ts"',
            );
          }
          writeFileSync(packagePath, packageText);

          const artifactPath = 'scripts/check-staging-artifact.mjs';
          let artifact = readFileSync(artifactPath, 'utf8');
          if (!artifact.includes("admin/candidates/duplicates/index.html")) {
            artifact = artifact.replace(
              "  'admin/candidates/detail/index.html',",
              "  'admin/candidates/detail/index.html',\n  'admin/candidates/duplicates/index.html',",
            );
          }
          artifact = artifact.replace("  'Read-only inspection',", "  'Protected inspection',");
          if (!artifact.includes('requiredDuplicateReviewFragments')) {
            const insertion = `
const duplicateReviewPage = readFileSync(
  join(outputDirectory, 'admin/candidates/duplicates/index.html'),
  'utf8',
);
const requiredDuplicateReviewFragments = [
  'Identity review boundary',
  'Persisted signals support review but never make the decision',
  'Explicit decision only',
];
const forbiddenDuplicateReviewFragments = [
  'CPM_ADMIN_CANDIDATE_SUBJECTS',
  'CPM_ADMIN_CANDIDATE_RESOLVE_SUBJECTS',
  'DATABASE_URL',
  'rawPayload',
  'resolutionNote',
  'actorId',
];
for (const fragment of requiredDuplicateReviewFragments) {
  if (!duplicateReviewPage.includes(fragment)) {
    throw new Error(\`Missing duplicate review marker: \${fragment}\`);
  }
}
for (const fragment of forbiddenDuplicateReviewFragments) {
  if (duplicateReviewPage.includes(fragment)) {
    throw new Error(\`Private or server-only marker found in duplicate review HTML: \${fragment}\`);
  }
}

`;
            artifact = artifact.replace('const textExtensions = new Set([', `${insertion}const textExtensions = new Set([`);
          }
          writeFileSync(artifactPath, artifact);
          NODE
      - run: npm run format
      - name: Commit finalized files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const { execFileSync } = require('node:child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'work/p306b';
            const paths = execFileSync('git', ['diff', '--name-only', '--diff-filter=AM'], { encoding: 'utf8' })
              .trim().split('\n').filter(Boolean);
            if (paths.length === 0) return;
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const parentSha = ref.data.object.sha;
            const parent = await github.rest.git.getCommit({ owner, repo, commit_sha: parentSha });
            const tree = [];
            for (const path of paths) {
              const blob = await github.rest.git.createBlob({ owner, repo, content: fs.readFileSync(path, 'utf8'), encoding: 'utf-8' });
              tree.push({ path, mode: '100644', type: 'blob', sha: blob.data.sha });
            }
            const nextTree = await github.rest.git.createTree({ owner, repo, base_tree: parent.data.tree.sha, tree });
            const commit = await github.rest.git.createCommit({ owner, repo, message: 'P3-06B finalize typing, SSR, formatting, and artifact checks', tree: nextTree.data.sha, parents: [parentSha] });
            await github.rest.git.updateRef({ owner, repo, ref: `heads/${branch}`, sha: commit.data.sha, force: false });
