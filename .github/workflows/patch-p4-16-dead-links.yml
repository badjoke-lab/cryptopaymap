name: Patch P4-16 dead links

on:
  push:
    branches:
      - work/p4-16-dead-link-cleanup

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/p4-16-dead-link-cleanup
          fetch-depth: 0

      - name: Remove unavailable Phase 5 submission links
        run: |
          python - <<'PY'
          from pathlib import Path

          replacements = {
            'src/components/places/PlaceResultList.tsx': [
              (
                '''          <p className="mt-2 text-sm leading-6 text-muted">\n            Candidate records are not used as substitutes. Clear filters or suggest a place for\n            review.\n          </p>''',
                '''          <p className="mt-2 text-sm leading-6 text-muted">\n            Candidate records are not used as substitutes. Clear filters or broaden the search area.\n          </p>''',
              ),
              (
                '''            <a\n              className="motion-feedback inline-flex min-h-11 items-center rounded-control bg-brand-600 px-4 py-2 font-semibold text-white no-underline hover:bg-brand-700"\n              href="/suggest"\n            >\n              Suggest a place\n            </a>\n''',
                '',
              ),
            ],
            'src/components/public/OnlineServicesIndex.astro': [
              (
                '''          <a\n            class="motion-feedback mt-5 inline-flex min-h-11 items-center rounded-control bg-brand-600 px-4 py-2 font-semibold text-white no-underline hover:bg-brand-700"\n            href="/suggest"\n          >\n            Suggest a service\n          </a>''',
                '''          <p class="mt-4 text-sm font-semibold text-muted">\n            Public submission tools will open after the review workflow is released.\n          </p>''',
              ),
            ],
            'src/components/places/MobilePlaceSheet.tsx': [
              (
                '''            <div className="mt-4 grid grid-cols-2 gap-2">\n              <a\n                className="motion-feedback inline-flex min-h-11 items-center justify-center rounded-control bg-brand-600 px-3 py-2 text-sm font-semibold text-white no-underline hover:bg-brand-700"\n                href={`/place/${place.placeSlug}`}\n              >\n                Payment details\n              </a>\n              <a\n                className="motion-feedback inline-flex min-h-11 items-center justify-center rounded-control border border-border px-3 py-2 text-sm font-semibold text-ink no-underline hover:bg-brand-50"\n                href="/report"\n              >\n                Report a problem\n              </a>\n            </div>''',
                '''            <div className="mt-4">\n              <a\n                className="motion-feedback inline-flex min-h-11 w-full items-center justify-center rounded-control bg-brand-600 px-3 py-2 text-sm font-semibold text-white no-underline hover:bg-brand-700"\n                href={`/place/${place.placeSlug}`}\n              >\n                Payment details\n              </a>\n              <p className="mt-3 text-center text-xs leading-5 text-muted">\n                Reporting and contribution tools will open with the reviewed submission workflow.\n              </p>\n            </div>''',
              ),
            ],
            'src/components/public/OnlineServiceDetail.astro': [
              (
                '''  <div class="mt-8 flex flex-wrap gap-3 border-t border-border pt-6">\n    <a class="motion-feedback inline-flex min-h-11 items-center rounded-control border border-border px-4 py-2 font-semibold text-ink no-underline hover:bg-brand-50" href="/payment-report">I paid here</a>\n    <a class="motion-feedback inline-flex min-h-11 items-center rounded-control border border-border px-4 py-2 font-semibold text-ink no-underline hover:bg-brand-50" href="/report">Report a problem</a>\n    <a class="motion-feedback inline-flex min-h-11 items-center rounded-control border border-border px-4 py-2 font-semibold text-ink no-underline hover:bg-brand-50" href="/claim">Claim this service</a>\n  </div>''',
                '''  <div class="mt-8 rounded-card border border-border bg-surface p-5 shadow-sm">\n    <h2 class="m-0 text-lg font-semibold text-ink">Community submission tools are planned next</h2>\n    <p class="mt-2 text-sm leading-6 text-muted">\n      Payment confirmations, corrections, and service claims will open after the reviewed submission workflow is released.\n    </p>\n  </div>''',
              ),
            ],
            'src/components/public/PlaceDetail.astro': [
              (
                '''      <section class="rounded-card border border-border bg-surface p-5 shadow-sm" aria-labelledby="contribute-title">\n        <h2 id="contribute-title" class="m-0 text-lg font-semibold text-ink">Help keep this accurate</h2>\n        <p class="mt-2 text-sm leading-6 text-muted">Reports are reviewed before they change the public record.</p>\n        <nav class="mt-4 grid gap-2" aria-label="Contribute to this place">\n          <a class="min-h-11 rounded-control px-3 py-2.5 font-semibold text-brand-700 hover:bg-brand-50" href={`/payment-report?place=${encodeURIComponent(place.placeSlug)}`}>I paid here</a>\n          <a class="min-h-11 rounded-control px-3 py-2.5 font-semibold text-brand-700 hover:bg-brand-50" href={`/report?place=${encodeURIComponent(place.placeSlug)}`}>Report a problem</a>\n          <a class="min-h-11 rounded-control px-3 py-2.5 font-semibold text-brand-700 hover:bg-brand-50" href={`/claim?place=${encodeURIComponent(place.placeSlug)}`}>Claim this business</a>\n          <a class="min-h-11 rounded-control px-3 py-2.5 font-semibold text-brand-700 hover:bg-brand-50" href={`/photos?place=${encodeURIComponent(place.placeSlug)}`}>Add photos</a>\n        </nav>\n      </section>''',
                '''      <section class="rounded-card border border-border bg-surface p-5 shadow-sm" aria-labelledby="contribute-title">\n        <h2 id="contribute-title" class="m-0 text-lg font-semibold text-ink">Help keep this accurate</h2>\n        <p class="mt-2 text-sm leading-6 text-muted">\n          Payment reports, corrections, business claims, and photo submissions will open after the reviewed submission workflow is released.\n        </p>\n        <span class="mt-4 inline-flex rounded-pill bg-canvas px-3 py-1.5 text-xs font-semibold text-muted">\n          Submission tools planned next\n        </span>\n      </section>''',
              ),
            ],
          }

          for filename, pairs in replacements.items():
            path = Path(filename)
            text = path.read_text()
            for old, new in pairs:
              if old not in text:
                raise SystemExit(f'expected fragment not found in {filename}')
              text = text.replace(old, new, 1)
            path.write_text(text)
          PY

      - name: Format changed files
        run: npx biome format --write src/components/places/PlaceResultList.tsx src/components/places/MobilePlaceSheet.tsx src/components/public/OnlineServicesIndex.astro src/components/public/OnlineServiceDetail.astro src/components/public/PlaceDetail.astro

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/places/PlaceResultList.tsx src/components/places/MobilePlaceSheet.tsx src/components/public/OnlineServicesIndex.astro src/components/public/OnlineServiceDetail.astro src/components/public/PlaceDetail.astro
          git commit -m "P4-16C: remove unavailable submission links"
          git push origin HEAD:work/p4-16-dead-link-cleanup
