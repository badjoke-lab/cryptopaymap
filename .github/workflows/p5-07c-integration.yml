name: P5-07C integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07c-suggest-application-binding' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07c-suggest-application-binding
          fetch-depth: 0
      - name: Register Suggest application binding check
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('package.json')
          data = json.loads(path.read_text())
          command = data['scripts']['schema:check']
          marker = ' && tsx scripts/check-submission-application-lifecycle.ts'
          addition = marker + ' && tsx scripts/check-suggest-application-binding.ts'
          if 'check-suggest-application-binding.ts' not in command:
              if marker not in command:
                  raise SystemExit('P5-07B2 schema-check marker is missing')
              data['scripts']['schema:check'] = command.replace(marker, addition, 1)
          path.write_text(json.dumps(data, indent=2) + '\n')
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format P5-07C files
        run: |
          npx biome format --write \
            package.json \
            src/admin/submissions/suggest-application-binding.ts \
            src/admin/submissions/suggest-application-binding-authorization.ts \
            src/admin/submissions/drizzle-suggest-application-binding-backend.ts \
            'functions/admin/api/suggest-applications/[applicationId]/bind-promotion.ts' \
            tests/suggest-application-binding.test.ts \
            tests/suggest-application-binding-api.test.ts \
            scripts/check-suggest-application-binding.ts \
            docs/P5_07C_SUGGEST_APPLICATION_BINDING.md
      - name: Commit integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json src functions tests scripts docs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "P5-07C: register and format Suggest application binding"
          git push origin HEAD:p5-07c-suggest-application-binding
