name: P3-07D format files

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Fix exact optional property and format files
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/candidate-existing-target-link.test.ts')
          text = path.read_text()
          old = "    failBeforeCommit: failBeforeCommit ? () => true : undefined,\n  });"
          new = "    ...(failBeforeCommit ? { failBeforeCommit: () => true } : {}),\n  });"
          if old not in text:
              raise SystemExit('Expected failBeforeCommit statement was not found.')
          path.write_text(text.replace(old, new))
          PY
          npx biome format --write \
            src/admin/promotion/existing-target-link.ts \
            src/admin/promotion/in-memory-existing-target-link-backend.ts \
            tests/candidate-existing-target-link.test.ts
      - name: Commit corrected files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'P3-07D: apply formatter output and type fix'
          file_pattern: 'src/admin/promotion/existing-target-link.ts src/admin/promotion/in-memory-existing-target-link-backend.ts tests/candidate-existing-target-link.test.ts'
