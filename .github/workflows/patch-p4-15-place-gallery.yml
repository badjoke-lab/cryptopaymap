name: Patch P4-15 Place gallery

on:
  push:
    branches:
      - work/p4-15-public-media

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/p4-15-public-media
          fetch-depth: 0
      - name: Reuse shared public gallery on Place detail
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/public/PlaceDetail.astro')
          text = path.read_text()
          import_anchor = "import type { PlaceDetailModel } from '../../public/place-detail';\n"
          import_line = "import PublicMediaGallery from './PublicMediaGallery.astro';\n"
          if import_line not in text:
              if import_anchor not in text:
                  raise SystemExit('Place detail import anchor not found')
              text = text.replace(import_anchor, import_anchor + import_line, 1)

          old = '''  {
    gallery.length > 0 ? (
      <section aria-labelledby="gallery-title">
        <p class="m-0 text-sm font-semibold text-brand-700">Gallery</p>
        <h2 id="gallery-title" class="mt-1 text-2xl font-semibold tracking-tight text-ink">Approved public media</h2>
        <div class="mt-5 grid gap-4 sm:grid-cols-2">
          {gallery.map((media) => (
            <figure class="m-0 overflow-hidden rounded-card border border-border bg-surface shadow-sm">
              <img
                class="aspect-[4/3] w-full object-cover"
                src={media.url}
                alt={media.altText}
                width={media.width}
                height={media.height}
                loading="lazy"
              />
              {media.attribution ? <figcaption class="p-3 text-xs text-muted">{media.attribution}</figcaption> : null}
            </figure>
          ))}
        </div>
      </section>
    ) : null
  }
'''
          new = '''  <PublicMediaGallery media={gallery} title="Approved place media" />\n'''
          if old not in text:
              raise SystemExit('Place gallery block not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - run: npx biome format --write src/components/public/PlaceDetail.astro
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/public/PlaceDetail.astro
          git commit -m "P4-15: reuse shared gallery on Place detail"
          git push origin HEAD:work/p4-15-public-media
