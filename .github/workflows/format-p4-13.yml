name: Format P4-13 changes

on:
  push:
    branches:
      - work/public-release-surfaces

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/public-release-surfaces
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format P4-13 files
        run: |
          npx biome format --write \
            docs/IMPLEMENTATION_PLAN.md \
            docs/PROJECT_STATUS.md \
            src/pages/changelog.astro \
            src/pages/roadmap.astro \
            src/public/release-surfaces.ts \
            tests/public-content-contract.test.mjs \
            tests/release-surfaces-model.test.ts
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/IMPLEMENTATION_PLAN.md docs/PROJECT_STATUS.md src/pages/changelog.astro src/pages/roadmap.astro src/public/release-surfaces.ts tests/public-content-contract.test.mjs tests/release-surfaces-model.test.ts
          if git diff --cached --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git commit -m "P4-13A: format release surface changes"
          git push origin HEAD:work/public-release-surfaces
