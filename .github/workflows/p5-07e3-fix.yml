name: P5-07E3 fix

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'p5-07e3-business-claim-payment-plan' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07e3-business-claim-payment-plan
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply focused E3 fixes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('src/admin/submissions/drizzle-business-claim-payment-preview-backend.ts')
          s = p.read_text()
          if '            isPrimary: claimAssets.isPrimary,\n' not in s:
              s = s.replace('            contractAddress: claimAssets.contractAddress,\n', '            contractAddress: claimAssets.contractAddress,\n            isPrimary: claimAssets.isPrimary,\n', 1)
          p.write_text(s)

          p = Path('tests/business-claim-payment-plan.test.ts')
          s = p.read_text()
          s = s.replace('function proposal(isPrimary = true) {', 'function proposal(isPrimary = true, contractAddress: string | null = null) {', 1)
          s = s.replace('    contractAddress: null,', '    contractAddress,', 1)
          s = s.replace("const proposals = [proposal(true), { ...proposal(false), contractAddress: 'bc1-example' }];", "const proposals = [proposal(true), proposal(false, 'bc1-example')];", 1)
          p.write_text(s)

          p = Path('scripts/check-business-claim-payment-plan.mjs')
          s = p.read_text()
          s = s.replace("assert.ok(route.includes('CPM_ADMIN_BUSINESS_CLAIM_PAYMENT_PLAN_SUBJECTS'));", "const authorization = read('src/admin/submissions/business-claim-payment-plan-authorization.ts');\nassert.ok(authorization.includes('CPM_ADMIN_BUSINESS_CLAIM_PAYMENT_PLAN_SUBJECTS'));", 1)
          p.write_text(s)
          PY
      - run: npm run format
      - run: node scripts/check-business-claim-payment-plan.mjs
      - run: npx vitest run tests/business-claim-payment-plan.test.ts tests/business-claim-payment-plan-api.test.ts tests/business-claim-payment-preview.test.ts
      - run: npm run check
      - name: Commit focused fixes
        shell: bash
        run: |
          git rm .github/workflows/p5-07e3-fix.yml .p5-07e3-fix-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P5-07E3 fix payment plan validation"
          git push origin HEAD:p5-07e3-business-claim-payment-plan
