## Current boundary

P5-07E1 prevents a Business Claim field-application event from completing the common application while accepted private payment drafts remain unconsumed.

It may:

- parse the exact durable field-application event;
- derive whether accepted payment work remains;
- register no-payment work as committed/pending;
- register accepted-payment work as pending/blocked;
- preserve exact replay and existing event ownership;
- add focused tests, runtime audit, and documentation.

It must not:

- create or mutate Acceptance Claims or Claim Assets;
- resolve Asset, Network, Payment Method, or processor registries;
- add Entity or Location provenance;
- rewrite existing common application rows;
- activate export or release;
- execute retention deletion;
- add a database migration;
- claim configured deployment.

