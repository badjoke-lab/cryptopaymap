name: P5-05J guarded chronology patch

on:
  push:
    branches:
      - p5-05j-private-validation-processing-execution

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, 'apply post-intake processing chronology') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: p5-05j-private-validation-processing-execution
          fetch-depth: 0
      - name: Apply exact chronology correction
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/submissions/photo-private-processing.ts')
          text = path.read_text()
          replacements = [
              (
                  "async function assertValidationMatches(\n  request: PhotoPrivateProcessingRequest,\n  context: PhotoProcessingSubmissionContext,\n): Promise<{ normalized: PhotosReviewProjection; objects: Map<string, ValidatedPhotoObject> }> {",
                  "async function assertValidationMatches(\n  request: PhotoPrivateProcessingRequest,\n  context: PhotoProcessingSubmissionContext,\n  processedAt: Date,\n): Promise<{ normalized: PhotosReviewProjection; objects: Map<string, ValidatedPhotoObject> }> {",
              ),
              (
                  "      validationTime > Date.parse(reservation.expiresAt) ||\n      validationTime > Date.parse(reservation.consumedAt)",
                  "      validationTime > processedAt.getTime() ||\n      validationTime > Date.parse(reservation.expiresAt)",
              ),
              (
                  "      const validated = await assertValidationMatches(request, context);",
                  "      const validated = await assertValidationMatches(request, context, processedAt);",
              ),
          ]
          for old, new in replacements:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one exact chronology match, found {count}')
              text = text.replace(old, new)
          path.write_text(text)
          Path('.github/workflows/p5-05j-apply-chronology-patch.yml').unlink()
      - name: Commit guarded patch
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/submissions/photo-private-processing.ts .github/workflows/p5-05j-apply-chronology-patch.yml
          git commit -m "P5-05J apply post-intake processing chronology"
          git push origin HEAD:p5-05j-private-validation-processing-execution
