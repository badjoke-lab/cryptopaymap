name: Diagnose P5-03A types

on:
  push:
    branches:
      - p5-03a-report-contract

permissions:
  contents: write

jobs:
  diagnose:
    if: ${{ !contains(github.event.head_commit.message, 'Record P5-03A type diagnostic') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-03a-report-contract
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture bounded type diagnostics
        run: |
          set +e
          npm run check > p5-03a-type-diagnostic.log 2>&1
          status=$?
          set -e
          tail -n 160 p5-03a-type-diagnostic.log > p5-03a-type-diagnostic.tail
          mv p5-03a-type-diagnostic.tail p5-03a-type-diagnostic.log
          echo "exit_status=$status" >> p5-03a-type-diagnostic.log
      - name: Publish diagnostic
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add p5-03a-type-diagnostic.log
          git commit -m 'Record P5-03A type diagnostic'
          git push origin HEAD:p5-03a-report-contract
