name: Sync P4-15 status

on:
  push:
    branches:
      - work/p4-15-public-media

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/p4-15-public-media
          fetch-depth: 0
      - name: Sync plan and status
        run: |
          python - <<'PY'
          from pathlib import Path

          status = Path('docs/PROJECT_STATUS.md')
          text = status.read_text()
          text = text.replace('- Pull request: pending', '- Pull request: #119')
          status.write_text(text)

          plan = Path('docs/IMPLEMENTATION_PLAN.md')
          text = plan.read_text()
          text = text.replace(
              '| P4-14 | Trust, data, legal, and sustainability pages | In progress | public specifications | #117, #118 |',
              '| P4-14 | Trust, data, legal, and sustainability pages | Completed | public specifications | #117, #118 |',
          )
          text = text.replace(
              '| P4-15 | Public media integration | Planned | P3-10, P4-01 | — |',
              '| P4-15 | Public media integration | In progress | P3-10, P4-01 | #119 |',
          )
          plan.write_text(text)
          PY
      - run: npx biome format --write docs/PROJECT_STATUS.md docs/IMPLEMENTATION_PLAN.md
      - name: Commit sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/PROJECT_STATUS.md docs/IMPLEMENTATION_PLAN.md
          git commit -m "P4-15: sync plan and pull request status"
          git push origin HEAD:work/p4-15-public-media
