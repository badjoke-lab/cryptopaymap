name: P5-05I branch formatter

on:
  push:
    branches:
      - p5-05i-photo-r2-signing-integration

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-05i-photo-r2-signing-integration
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply bounded lint correction
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('scripts/run-p5-05i-fixed-review-probe.ts')
          text = path.read_text()
          old = """    value !== null &&
    value.includes('https://challenges.cloudflare.com') &&
"""
          new = """    value?.includes('https://challenges.cloudflare.com') === true &&
"""
          if old not in text:
              raise SystemExit('expected P5-05I CSP lint pattern not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - run: npm run format
      - name: Remove branch-only maintenance workflows
        run: |
          rm -f .github/workflows/p5-05i-node-types.yml
          rm -f .github/workflows/p5-05i-format.yml
      - name: Commit corrections
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add --all
          git commit -m "chore: format and type-check P5-05I files"
          git push origin HEAD:p5-05i-photo-r2-signing-integration
