name: P5-05I format branch

on:
  push:
    branches:
      - p5-05i-r2-signing-integration-audit

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-05i-r2-signing-integration-audit
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format
      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/submissions/r2-photo-upload-authorizer.ts src/submissions/photo-http-environment.ts scripts/check-photo-r2-direct-upload.ts scripts/check-photo-public-form.ts tests/r2-photo-upload-authorizer.test.ts
          git commit -m "P5-05I format R2 signing files"
          git push origin HEAD:p5-05i-r2-signing-integration-audit
