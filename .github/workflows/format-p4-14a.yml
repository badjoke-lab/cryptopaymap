name: Format P4-14A changes

on:
  push:
    branches:
      - work/public-trust-data-pages

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/public-trust-data-pages
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format P4-14A files
        run: |
          npx biome format --write \
            docs/IMPLEMENTATION_PLAN.md \
            docs/PROJECT_STATUS.md \
            src/components/public/TrustPageShell.astro \
            src/pages/about.astro \
            src/pages/data.astro \
            src/pages/methodology.astro \
            src/pages/sources-and-licenses.astro \
            tests/trust-data-pages-contract.test.mjs
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/IMPLEMENTATION_PLAN.md docs/PROJECT_STATUS.md src/components/public/TrustPageShell.astro src/pages/about.astro src/pages/data.astro src/pages/methodology.astro src/pages/sources-and-licenses.astro tests/trust-data-pages-contract.test.mjs
          if git diff --cached --quiet; then
            echo "No formatting changes required."
            exit 0
          fi
          git commit -m "P4-14A: format trust and data pages"
          git push origin HEAD:work/public-trust-data-pages
