name: P5-06D2 scoped import fix

on:
  push:
    branches:
      - p5-06d2-terminal-resolution-ui

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-06d2-terminal-resolution-ui
      - name: Remove unused import
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/admin/SubmissionTerminalResolutionPanel.tsx')
          content = path.read_text()
          content = content.replace('useEffect, useMemo, useState', 'useEffect, useState')
          path.write_text(content)
          PY
      - name: Commit fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/admin/SubmissionTerminalResolutionPanel.tsx
          git commit -m "P5-06D2 remove unused React import"
          git push origin HEAD:p5-06d2-terminal-resolution-ui
