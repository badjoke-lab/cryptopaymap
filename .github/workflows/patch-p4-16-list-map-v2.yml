name: Patch P4-16 list map integration v2

on:
  push:
    branches:
      - work/p4-16-list-map-integration

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/p4-16-list-map-integration
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Patch source and tests
        run: |
          python - <<'PY'
          from pathlib import Path

          app = Path('src/components/places/PlacesApp.tsx')
          text = app.read_text()
          old = '''  function selectPlace(placeSlug: string) {
    patchDiscoveryUrlState({ selectedPlace: placeSlug });
    setBottomSheet('peek');
  }

  function clearSelection() {'''
          new = '''  function selectPlace(placeSlug: string) {
    patchDiscoveryUrlState({ selectedPlace: placeSlug });
    setBottomSheet('peek');
  }

  function selectPlaceFromList(placeSlug: string) {
    patchDiscoveryUrlState({ selectedPlace: placeSlug, view: 'map' });
    setBottomSheet('peek');
  }

  function clearSelection() {'''
          if old not in text:
              raise SystemExit('PlacesApp selection anchor not found')
          text = text.replace(old, new, 1)
          old = 'onSelectPlace={selectPlace}\n              onClearFilters={clearFilters}'
          new = 'onSelectPlace={selectPlaceFromList}\n              onClearFilters={clearFilters}'
          if old not in text:
              raise SystemExit('PlaceResultList callback anchor not found')
          app.write_text(text.replace(old, new, 1))

          places_map = Path('src/components/places/PlacesMap.tsx')
          text = places_map.read_text()
          old = '''  useEffect(() => {
    const map = mapRef.current;
    if (!map || !committedViewport) return;
    const current = {
      latitude: map.getCenter().lat,
      longitude: map.getCenter().lng,
      zoom: map.getZoom(),
    };
    if (!mapViewportChanged(current, committedViewport)) return;
    const normalized = normalizeMapViewport(committedViewport);
    map.easeTo({
      center: [normalized.longitude, normalized.latitude],
      zoom: normalized.zoom,
    });
  }, [committedViewport]);

  return ('''
          new = '''  useEffect(() => {
    const map = mapRef.current;
    if (!map || !committedViewport) return;
    const current = {
      latitude: map.getCenter().lat,
      longitude: map.getCenter().lng,
      zoom: map.getZoom(),
    };
    if (!mapViewportChanged(current, committedViewport)) return;
    const normalized = normalizeMapViewport(committedViewport);
    map.easeTo({
      center: [normalized.longitude, normalized.latitude],
      zoom: normalized.zoom,
    });
  }, [committedViewport]);

  useEffect(() => {
    const map = mapRef.current;
    if (!map || runtimeState !== 'ready' || !selectedPlace) return;
    const selectedPin = pins.find((pin) => pin.placeSlug === selectedPlace);
    if (!selectedPin) return;

    const current = map.getCenter();
    if (
      Math.abs(current.lat - selectedPin.latitude) < 0.000001 &&
      Math.abs(current.lng - selectedPin.longitude) < 0.000001
    ) {
      return;
    }

    map.easeTo({ center: [selectedPin.longitude, selectedPin.latitude] });
  }, [pins, runtimeState, selectedPlace]);

  return ('''
          if old not in text:
              raise SystemExit('PlacesMap camera anchor not found')
          places_map.write_text(text.replace(old, new, 1))

          app_test = Path('tests/places-app-shell.test.tsx')
          text = app_test.read_text()
          anchor = "  it('moves the mobile selected Place sheet through peek, expanded, and closed states', async () => {"
          addition = '''  it('switches list selection back to Map view and commits the selected Place', async () => {
    window.history.replaceState({}, '', '/places?view=list');
    render(<PlacesApp pins={pins} />);

    await waitFor(() =>
      expect(screen.getByRole('button', { name: 'List' })).toHaveAttribute('aria-pressed', 'true'),
    );
    fireEvent.click(screen.getByRole('button', { name: /Select Example Coffee on map/ }));

    await waitFor(() => {
      expect(screen.getByRole('button', { name: 'Map' })).toHaveAttribute('aria-pressed', 'true');
      expect(window.location.search).toContain('place=example-coffee-tokyo');
      expect(window.location.search).not.toContain('view=list');
    });
  });

'''
          if anchor not in text:
              raise SystemExit('PlacesApp test anchor not found')
          app_test.write_text(text.replace(anchor, addition + anchor, 1))

          map_test = Path('tests/places-map.test.tsx')
          text = map_test.read_text()
          old = '''    rerender(
      <PlacesMap
        pins={pins}
        selectedPlace="example-coffee-tokyo"'''
          new = '''    map.center = { lat: 34.6937, lng: 135.5023 };

    rerender(
      <PlacesMap
        pins={pins}
        selectedPlace="example-coffee-tokyo"'''
          if old not in text:
              raise SystemExit('PlacesMap rerender anchor not found')
          text = text.replace(old, new, 1)
          old = '''    await waitFor(() => {
      const data = source.data as {
        features: Array<{ properties: { selected: boolean } }>;
      };
      expect(data.features[0]?.properties.selected).toBe(true);
    });

    await act(async () =>'''
          new = '''    await waitFor(() => {
      const data = source.data as {
        features: Array<{ properties: { selected: boolean } }>;
      };
      expect(data.features[0]?.properties.selected).toBe(true);
      expect(map.center).toEqual({ lat: 35.681236, lng: 139.767125 });
    });

    await act(async () =>'''
          if old not in text:
              raise SystemExit('PlacesMap selection assertion anchor not found')
          map_test.write_text(text.replace(old, new, 1))
          PY
      - run: npx biome format --write src/components/places/PlacesApp.tsx src/components/places/PlacesMap.tsx tests/places-app-shell.test.tsx tests/places-map.test.tsx
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/places/PlacesApp.tsx src/components/places/PlacesMap.tsx tests/places-app-shell.test.tsx tests/places-map.test.tsx
          git commit -m "P4-16B: synchronize list selection with Map view and camera"
          git push origin HEAD:work/p4-16-list-map-integration
