name: P3-08C finalize workspace

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Synchronize branch
        run: git pull --rebase origin "${GITHUB_HEAD_REF}"
      - name: Connect Evidence workspace quality gates
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('package.json')
          text = path.read_text()
          runtime = ' && tsx scripts/check-evidence-review-workspace.ts'
          if runtime not in text:
              needle = ' && tsx scripts/check-evidence-review-persistence.ts"'
              if needle not in text:
                  raise SystemExit('Evidence runtime insertion point is unavailable.')
              text = text.replace(needle, needle[:-1] + runtime + '"', 1)
          artifact = ' && node scripts/check-evidence-review-artifact.mjs'
          if artifact not in text:
              needle = ' && node scripts/check-candidate-existing-target-artifact.mjs"'
              if needle not in text:
                  raise SystemExit('Evidence artifact insertion point is unavailable.')
              text = text.replace(needle, needle[:-1] + artifact + '"', 1)
          path.write_text(text)
          PY
      - name: Apply Biome formatting
        run: |
          npx biome format --write \
            functions/admin/api/evidence.ts \
            'functions/admin/api/evidence/[evidenceId].ts' \
            src/admin/evidence-review/workspace.ts \
            src/admin/evidence-review/drizzle-workspace-backend.ts \
            src/admin/evidence-review/read-authorization.ts \
            src/components/admin/EvidenceReviewQueue.tsx \
            src/components/admin/EvidenceReviewDetail.tsx \
            src/pages/admin/evidence.astro \
            src/pages/admin/evidence/detail.astro \
            tests/evidence-review-workspace.test.ts \
            tests/evidence-review-queue-api.test.ts \
            tests/evidence-review-detail-api.test.ts \
            tests/evidence-review-components.test.tsx \
            scripts/check-evidence-review-workspace.ts \
            scripts/check-evidence-review-artifact.mjs
      - name: Remove one-time finalizer
        run: rm .github/workflows/p308c-finalize.yml
      - name: Commit finalized workspace
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P3-08C: finalize Evidence review workspace"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
