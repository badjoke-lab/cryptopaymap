name: P3-11E final formatting

on:
  push:
    branches:
      - work/p311e
    paths:
      - .github/workflows/p311e-format.yml

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p311e
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Format repository
        run: npm run format
      - name: Commit formatting and remove workflow
        shell: bash
        run: |
          git rm .github/workflows/p311e-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs functions package.json scripts src tests
          git commit -m "P3-11E: apply final repository formatting"
          git push origin HEAD:work/p311e
