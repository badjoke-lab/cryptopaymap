name: Foundation validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Check Astro and TypeScript
        run: set -o pipefail && npm run check 2>&1 | tee validation-check.log

      - name: Build static site
        if: always()
        run: set -o pipefail && npm run build 2>&1 | tee validation-build.log

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundation-validation-logs
          path: |
            validation-check.log
            validation-build.log
          if-no-files-found: warn
          retention-days: 7
