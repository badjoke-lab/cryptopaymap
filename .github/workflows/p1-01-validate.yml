name: Foundation validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'

permissions:
  contents: write

jobs:
  finalize-p211:
    if: github.head_ref == 'work/p211'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out P2-11 branch
        uses: actions/checkout@v4
        with:
          ref: work/p211
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Fix projection schema and tracking
        run: |
          python - <<'PY'
          from pathlib import Path

          schema = Path('src/schemas/public-exports.ts')
          text = schema.read_text()
          old = "    properties: publicPlacePinSchema.omit({ latitude: true, longitude: true }),"
          new = """    properties: z
              .object({
                placeSlug: publicIdentifierSchema,
                name: z.string().trim().min(1).max(160),
                categorySlug: publicIdentifierSchema,
                countryCode: countryCodeSchema,
                locality: z.string().trim().min(1).max(120).nullable(),
                status: publicPinStatusSchema,
                assetSlugs: z.array(publicIdentifierSchema).min(1).max(100),
                networkSlugs: z.array(publicIdentifierSchema).min(1).max(100),
                routeTypes: z.array(z.enum(routeTypeValues)).min(1).max(routeTypeValues.length),
                lastConfirmedAt: timestampSchema,
                thumbnail: publicMediaSchema.nullable(),
              })
              .strict(),"""
          if old not in text:
              raise SystemExit('GeoJSON property schema target not found')
          schema.write_text(text.replace(old, new, 1))

          plan = Path('docs/IMPLEMENTATION_PLAN.md')
          text = plan.read_text()
          text = text.replace(
              '| P2-10 | Media metadata and legacy identifiers | In progress | P2-04, P2-09 | [#35](https://github.com/badjoke-lab/cryptopaymap/pull/35) |',
              '| P2-10 | Media metadata and legacy identifiers | Completed | P2-04, P2-09 | [#35](https://github.com/badjoke-lab/cryptopaymap/pull/35) |',
              1,
          )
          text = text.replace(
              '| P2-11 | Public export schemas | Planned | P2-05 through P2-10 | — |',
              '| P2-11 | Public export schemas | In progress | P2-05 through P2-10 | [#36](https://github.com/badjoke-lab/cryptopaymap/pull/36) |',
              1,
          )
          plan.write_text(text)

          status = Path('docs/PROJECT_STATUS.md')
          text = status.read_text()
          text = text.replace(
              'P2-10 — Media metadata and legacy identifiers',
              'P2-11 — Public export schemas',
              1,
          )
          text = text.replace(
              '[#35 — P2-10: Add media metadata and legacy identifiers](https://github.com/badjoke-lab/cryptopaymap/pull/35)',
              '[#36 — P2-11: Add explicit public export schemas](https://github.com/badjoke-lab/cryptopaymap/pull/36)',
              1,
          )
          marker = '- P2-09 completed through pull request #34.\n'
          text = text.replace(marker, marker + '- P2-10 completed through pull request #35.\n', 1)
          section_start = text.index('## P2-10 in progress')
          section_end = text.index('## Cloudflare status')
          section = """## P2-11 in progress

- strict schemas for all 12 planned public JSON and GeoJSON files
- canonical-only acceptance-claim projections
- explicit place, map-pin, online-service, registry, stats, update, manifest, and version contracts
- public media and evidence summaries without private storage or review fields
- cross-field rules for location scope, processor routes, ended claims, and payment combinations
- public identifiers that reject internal UUID-shaped values
- runtime examples that reject candidate states, private fields, unknown keys, and invalid coordinates
- no database migration or Cloudflare dependency

"""
          text = text[:section_start] + section + text[section_end:]
          next_start = text.index('## Next')
          next_end = text.index('## Blocked')
          next_section = """## Next

1. Complete CI and merge pull request #36.
2. Start P2-12 export allowlist and leakage validation.
3. Keep live data generation and publication disabled until the fail-closed boundary is complete.

"""
          text = text[:next_start] + next_section + text[next_end:]
          status.write_text(text)
          PY

      - name: Format source and documentation
        run: npm run format

      - name: Restore permanent workflow and commit
        run: |
          git fetch origin main --depth=1
          git show origin/main:.github/workflows/p1-01-validate.yml > .github/workflows/p1-01-validate.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P2-11: finalize schemas and tracking"
          git push origin HEAD:work/p211

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Check formatting
        run: set -o pipefail && npm run format:check 2>&1 | tee validation-format.log

      - name: Lint source
        if: always()
        run: set -o pipefail && npm run lint 2>&1 | tee validation-lint.log

      - name: Check Astro and TypeScript
        if: always()
        run: set -o pipefail && npm run check 2>&1 | tee validation-check.log

      - name: Check runtime schemas
        if: always()
        run: set -o pipefail && npm run schema:check 2>&1 | tee validation-schema.log

      - name: Check migration history
        if: always()
        run: set -o pipefail && npm run db:check 2>&1 | tee validation-database.log

      - name: Run unit and component tests
        if: always()
        run: set -o pipefail && npm run test -- --reporter=verbose 2>&1 | tee validation-test.log

      - name: Build static site
        if: always()
        run: set -o pipefail && npm run build 2>&1 | tee validation-build.log

      - name: Check accessibility foundation
        if: always()
        run: set -o pipefail && npm run accessibility:check 2>&1 | tee validation-accessibility.log

      - name: Check Phase 1 files
        if: always()
        run: set -o pipefail && node scripts/check-phase-1-foundation.mjs 2>&1 | tee validation-phase-1.log

      - name: Check staging artifact
        if: always()
        run: set -o pipefail && npm run staging:check 2>&1 | tee validation-staging.log

      - name: Upload staging artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cryptopaymap-staging-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundation-validation-logs
          path: |
            validation-format.log
            validation-lint.log
            validation-check.log
            validation-schema.log
            validation-database.log
            validation-test.log
            validation-build.log
            validation-accessibility.log
            validation-phase-1.log
            validation-staging.log
          if-no-files-found: warn
          retention-days: 7
