name: Foundation validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'

permissions:
  contents: write

jobs:
  finalize-p210-fix:
    if: github.event_name == 'push' && github.ref == 'refs/heads/fix/p210-deleted-media-public-guard'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out fix branch
        uses: actions/checkout@v4
        with:
          ref: fix/p210-deleted-media-public-guard
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate follow-up migration
        run: npm run db:generate

      - name: Restore permanent workflow and commit
        run: |
          git fetch origin main --depth=1
          git show origin/main:.github/workflows/p1-01-validate.yml > .github/workflows/p1-01-validate.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "FIX-P2-10-001: add deleted media guard migration"
          git push origin HEAD:fix/p210-deleted-media-public-guard

  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Check formatting
        run: set -o pipefail && npm run format:check 2>&1 | tee validation-format.log

      - name: Lint source
        if: always()
        run: set -o pipefail && npm run lint 2>&1 | tee validation-lint.log

      - name: Check Astro and TypeScript
        if: always()
        run: set -o pipefail && npm run check 2>&1 | tee validation-check.log

      - name: Check runtime schemas
        if: always()
        run: set -o pipefail && npm run schema:check 2>&1 | tee validation-schema.log

      - name: Check migration history
        if: always()
        run: set -o pipefail && npm run db:check 2>&1 | tee validation-database.log

      - name: Run unit and component tests
        if: always()
        run: set -o pipefail && npm run test -- --reporter=verbose 2>&1 | tee validation-test.log

      - name: Build static site
        if: always()
        run: set -o pipefail && npm run build 2>&1 | tee validation-build.log

      - name: Check accessibility foundation
        if: always()
        run: set -o pipefail && npm run accessibility:check 2>&1 | tee validation-accessibility.log

      - name: Check Phase 1 files
        if: always()
        run: set -o pipefail && node scripts/check-phase-1-foundation.mjs 2>&1 | tee validation-phase-1.log

      - name: Check staging artifact
        if: always()
        run: set -o pipefail && npm run staging:check 2>&1 | tee validation-staging.log

      - name: Upload staging artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cryptopaymap-staging-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundation-validation-logs
          path: |
            validation-format.log
            validation-lint.log
            validation-check.log
            validation-schema.log
            validation-database.log
            validation-test.log
            validation-build.log
            validation-accessibility.log
            validation-phase-1.log
            validation-staging.log
          if-no-files-found: warn
          retention-days: 7
