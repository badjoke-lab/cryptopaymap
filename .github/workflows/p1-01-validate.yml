name: Foundation validation

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - 'feat/**'
      - 'fix/**'
      - 'docs/**'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: p5-07b1-application-registration
          fetch-depth: 0

      - name: Apply focused P5-07B1 type fixes
        if: github.actor != 'github-actions[bot]' && github.head_ref == 'p5-07b1-application-registration'
        run: |
          python - <<'PY'
          from pathlib import Path

          service = Path('src/admin/submissions/application-registration.ts')
          source = service.read_text()
          old = "? ({ kind: 'submission_event', ids: [event.eventId] } as const)"
          new = "? { kind: 'submission_event', ids: [event.eventId] }"
          if source.count(old) != 1:
              raise SystemExit('Expected readonly application receipt marker was not found exactly once')
          service.write_text(source.replace(old, new, 1))

          backend = Path('src/admin/submissions/drizzle-application-registration-backend.ts')
          source = backend.read_text()
          old = """  kind: SubmissionApplicationRegistrationRecord['applicationReceipt'] extends infer T
    ? T extends SubmissionApplicationReceiptReference
      ? T['kind']
      : never
    : never,
"""
          new = """  kind: SubmissionApplicationReceiptReference['kind'] | null,
"""
          if source.count(old) != 1:
              raise SystemExit('Expected receipt kind type marker was not found exactly once')
          backend.write_text(source.replace(old, new, 1))
          PY

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Format focused P5-07B1 fixes
        if: github.actor != 'github-actions[bot]' && github.head_ref == 'p5-07b1-application-registration'
        run: |
          npx biome format --write \
            src/admin/submissions/application-registration.ts \
            src/admin/submissions/drizzle-application-registration-backend.ts

      - name: Commit focused P5-07B1 fixes
        if: github.actor != 'github-actions[bot]' && github.head_ref == 'p5-07b1-application-registration'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/admin/submissions/application-registration.ts src/admin/submissions/drizzle-application-registration-backend.ts
          git commit -m "P5-07B1: fix application receipt types"
          git push origin HEAD:p5-07b1-application-registration

      - name: Check formatting
        run: set -o pipefail && npm run format:check 2>&1 | tee validation-format.log

      - name: Lint source
        if: always()
        run: set -o pipefail && npm run lint 2>&1 | tee validation-lint.log

      - name: Check Astro and TypeScript
        if: always()
        run: set -o pipefail && npm run check 2>&1 | tee validation-check.log

      - name: Check runtime schemas
        if: always()
        run: set -o pipefail && npm run schema:check 2>&1 | tee validation-schema.log

      - name: Check migration history
        if: always()
        run: set -o pipefail && npm run db:check 2>&1 | tee validation-database.log

      - name: Run unit and component tests
        if: always()
        run: set -o pipefail && npm run test -- --reporter=verbose 2>&1 | tee validation-test.log

      - name: Build static site
        if: always()
        run: set -o pipefail && npm run build 2>&1 | tee validation-build.log

      - name: Check accessibility foundation
        if: always()
        run: set -o pipefail && npm run accessibility:check 2>&1 | tee validation-accessibility.log

      - name: Check Phase 1 files
        if: always()
        run: set -o pipefail && node scripts/check-phase-1-foundation.mjs 2>&1 | tee validation-phase-1.log

      - name: Check staging artifact
        if: always()
        run: set -o pipefail && npm run staging:check 2>&1 | tee validation-staging.log

      - name: Upload staging artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: cryptopaymap-staging-dist
          path: dist
          if-no-files-found: error
          retention-days: 7

      - name: Upload validation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundation-validation-logs
          path: |
            validation-format.log
            validation-lint.log
            validation-check.log
            validation-schema.log
            validation-database.log
            validation-test.log
            validation-build.log
            validation-accessibility.log
            validation-phase-1.log
            validation-staging.log
          if-no-files-found: warn
          retention-days: 7
