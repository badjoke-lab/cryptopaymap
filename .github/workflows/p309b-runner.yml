name: P3-09B branch finalizer

on:
  push:
    branches:
      - work/p309b

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p309b
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Generate migration
        run: npm run db:generate
      - name: Apply formatting
        run: npm run format
      - name: Remove temporary branch workflows
        run: |
          rm -f .github/workflows/p309b-finalize.yml
          rm -f .github/workflows/p309b-runner.yml
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P3-09B: generate migration and finalize formatting"
          git push origin HEAD:work/p309b
