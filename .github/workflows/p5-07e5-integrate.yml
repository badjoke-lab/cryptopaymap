name: P5-07E5 integrate

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07e5-business-claim-field-provenance' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07e5-business-claim-field-provenance
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Integrate E5 slice
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/p5-07e5-integrate.mjs
      - run: npm run format
      - run: npm run lint
      - run: node scripts/check-business-claim-field-provenance.mjs
      - run: npx vitest run tests/business-claim-field-provenance.test.ts tests/business-claim-field-provenance-api.test.ts
      - run: npm run check
      - name: Commit integrated slice
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P5-07E5 integrate field provenance"
          git push origin HEAD:p5-07e5-business-claim-field-provenance
