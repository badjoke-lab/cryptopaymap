name: Fix map semantics

on:
  push:
    branches:
      - work/maplibre-renderer

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out renderer branch
        uses: actions/checkout@v4
        with:
          ref: work/maplibre-renderer
          fetch-depth: 0

      - name: Apply semantic container patch
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/places/PlacesMap.tsx')
          text = path.read_text()
          old = '''      <div
                ref={containerRef}
                className="absolute inset-0"
                role="region"
                aria-label="Interactive places map"
              />'''
          new = '''      <section className="absolute inset-0" aria-label="Interactive places map">
                <div ref={containerRef} className="absolute inset-0" />
              </section>'''
          if old not in text:
              raise SystemExit('expected map container block not found')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Commit semantic patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/places/PlacesMap.tsx
          git commit -m "P4-03B: use semantic map region wrapper"
          git push origin HEAD:work/maplibre-renderer
