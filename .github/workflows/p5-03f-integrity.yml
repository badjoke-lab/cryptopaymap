name: Prepare P5-03F decision integrity hardening

on:
  push:
    branches:
      - p5-03f-negative-evidence-recheck

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-03f-negative-evidence-recheck
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Harden report and queue integrity
        run: |
          python <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'missing expected text in {path}: {old[:160]!r}')
              file.write_text(text.replace(old, new))

          replace(
              'src/admin/submissions/negative-report-evidence.ts',
              """      projectionResult.data.result !== 'failed' ||
      originalResult.data.result !== 'failed' ||
      projectionResult.data.paymentDate !== originalResult.data.paymentDate ||
      projectionResult.data.restrictedEvidence.privateTransactionUrlPresent !==
        (originalResult.data.privateTransactionUrl !== null)""",
              """      projectionResult.data.result !== 'failed' ||
      originalResult.data.result !== 'failed' ||
      projectionResult.data.targetType !== state.targetType ||
      projectionResult.data.targetId !== state.targetId ||
      projectionResult.data.paymentDate !== originalResult.data.paymentDate ||
      JSON.stringify(projectionResult.data.payment) !== JSON.stringify(originalResult.data.payment) ||
      projectionResult.data.notes !== originalResult.data.notes ||
      projectionResult.data.restrictedEvidence.privateTransactionUrlPresent !==
        (originalResult.data.privateTransactionUrl !== null)""",
          )
          replace(
              'src/admin/submissions/negative-report-evidence.ts',
              """      !['no_longer_accepts_crypto', 'payment_failed'].includes(projectionResult.data.reportType) ||
      projectionResult.data.reportType !== originalResult.data.reportType ||
      projectionResult.data.observedAt !== originalResult.data.observedAt ||
      projectionResult.data.explanation !== originalResult.data.explanation ||
      projectionResult.data.restrictedEvidence.privateEvidenceUrlPresent !==
        (originalResult.data.privateEvidenceUrl !== null)""",
              """      !['no_longer_accepts_crypto', 'payment_failed'].includes(projectionResult.data.reportType) ||
      projectionResult.data.targetType !== state.targetType ||
      projectionResult.data.targetId !== state.targetId ||
      projectionResult.data.reportType !== originalResult.data.reportType ||
      projectionResult.data.observedAt !== originalResult.data.observedAt ||
      projectionResult.data.explanation !== originalResult.data.explanation ||
      JSON.stringify(projectionResult.data.proposedCorrection) !==
        JSON.stringify(originalResult.data.proposedCorrection) ||
      JSON.stringify(projectionResult.data.duplicateTarget) !==
        JSON.stringify(originalResult.data.duplicateTarget) ||
      projectionResult.data.restrictedEvidence.privateEvidenceUrlPresent !==
        (originalResult.data.privateEvidenceUrl !== null)""",
          )
          replace(
              'src/admin/reconfirmation/drizzle-protected-workspace-backend.ts',
              """            or(
              hasSignal,
              eq(acceptanceClaims.claimStatus, 'stale'),""",
              """            or(
              and(
                or(
                  eq(acceptanceClaims.claimStatus, 'confirmed'),
                  eq(acceptanceClaims.claimStatus, 'stale'),
                ),
                hasSignal,
              ),
              eq(acceptanceClaims.claimStatus, 'stale'),""",
          )

          marker = """  it('requires restricted source proof for Class A', async () => {"""
          insertion = """  it('rejects stored/normalized target or payment-detail mismatches', async () => {
    const wrongTarget = state();
    wrongTarget.normalizedPayload = {
      ...(wrongTarget.normalizedPayload as Record<string, unknown>),
      targetId: claimId,
    };
    await expect(
      decideNegativeReportEvidence(
        context,
        backend(wrongTarget).adapter,
        submissionId,
        request(),
        decidedAt,
      ),
    ).rejects.toMatchObject({ code: 'invalid_projection' });

    const wrongPayment = state();
    wrongPayment.originalPayload = {
      ...(wrongPayment.originalPayload as Record<string, unknown>),
      payment: {
        ...((wrongPayment.originalPayload as { payment: Record<string, unknown> }).payment),
        networkSlug: 'lightning',
      },
    };
    await expect(
      decideNegativeReportEvidence(
        context,
        backend(wrongPayment).adapter,
        submissionId,
        request(),
        decidedAt,
      ),
    ).rejects.toMatchObject({ code: 'invalid_projection' });
  });

""" + marker
          replace('tests/negative-report-evidence.test.ts', marker, insertion)

          replace(
              'docs/P5_03F_NEGATIVE_EVIDENCE_AND_RECHECK_PRIORITY.md',
              """- strict original and normalized report schemas;
- matching negative result/type, observation date, explanation where applicable, and restricted-evidence presence;""",
              """- strict original and normalized report schemas;
- exact stored/normalized target identity;
- matching negative result/type, payment details, observation date, notes/explanation, correction/duplicate fields where applicable, and restricted-evidence presence;""",
          )
          PY
      - run: npm run format
      - run: git rm .github/workflows/p5-03f-integrity.yml
      - name: Commit integrity hardening
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'P5-03F: harden negative Evidence integrity'
          git push origin HEAD:p5-03f-negative-evidence-recheck
