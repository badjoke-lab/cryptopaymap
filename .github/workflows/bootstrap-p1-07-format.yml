name: Bootstrap P1-07 formatting

on:
  push:
    branches:
      - feat/p1-07-quality

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/p1-07-quality

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply initial lint corrections
        run: |
          node <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const statePath = 'src/components/StateBoundaryDemo.tsx';
          let state = readFileSync(statePath, 'utf8');
          state = state.replace(
            "import { Database, Link2, List, Map, RefreshCw } from 'lucide-react';",
            "import { Database, Link2, List, Map as MapIcon, RefreshCw } from 'lucide-react';",
          );
          state = state.replace('<Map aria-hidden="true"', '<MapIcon aria-hidden="true"');
          state = state.replace(
            '<div className="grid grid-cols-2 gap-3" aria-label="View mode">',
            '<div className="grid grid-cols-2 gap-3" role="group" aria-label="View mode">',
          );
          writeFileSync(statePath, state);

          const uiPath = 'src/components/UIFoundationDemo.tsx';
          let ui = readFileSync(uiPath, 'utf8');
          ui = ui.replace(
            '<div className="grid gap-4 rounded-card border border-border bg-surface p-5 sm:p-6" aria-label="Loading example">',
            '<div className="grid gap-4 rounded-card border border-border bg-surface p-5 sm:p-6" role="status" aria-label="Loading example">',
          );
          writeFileSync(uiPath, ui);
          NODE

      - name: Format supported files
        run: npm run format

      - name: Commit baseline corrections
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src scripts tests biome.json package.json vitest.config.ts
          git commit -m "P1-07: normalize quality baseline"
          git push origin HEAD:feat/p1-07-quality
