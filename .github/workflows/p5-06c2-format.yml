name: P5-06C2 scoped formatting

on:
  push:
    branches:
      - p5-06c2-review-followup-ui

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-06c2-review-followup-ui
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format P5-06C2 files
        run: npx biome format --write src/components/admin/SubmissionReviewFollowupPanel.tsx tests/submission-review-followup-ui.test.tsx
      - name: Commit formatting
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/admin/SubmissionReviewFollowupPanel.tsx tests/submission-review-followup-ui.test.tsx
          git commit -m "P5-06C2 apply repository formatting"
          git push origin HEAD:p5-06c2-review-followup-ui
