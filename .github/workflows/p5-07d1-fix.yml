name: P5-07D1 focused diagnostics

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'p5-07d1-problem-location-correction'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07d1-problem-location-correction
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Capture focused application test output
        run: |
          set +e
          npx vitest run \
            tests/problem-location-correction-application.test.ts \
            tests/problem-location-correction-application-api.test.ts \
            tests/submission-application-registration.test.ts \
            tests/submission-application-lifecycle.test.ts \
            tests/suggest-application-binding.test.ts \
            > p5-07d1-focused-tests.log 2>&1
          status=$?
          echo "exit_status=$status" >> "$GITHUB_ENV"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: p5-07d1-focused-test-log
          path: p5-07d1-focused-tests.log
          if-no-files-found: error
      - name: Report focused test result
        run: |
          if [ "$exit_status" -ne 0 ]; then
            echo "Focused tests failed; see uploaded diagnostic artifact."
            exit 1
          fi
