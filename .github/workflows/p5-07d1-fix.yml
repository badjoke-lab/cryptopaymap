name: P5-07D1 fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'p5-07d1-problem-location-correction' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07d1-problem-location-correction
          fetch-depth: 0
      - name: Fix async and bounded lint issues
        run: |
          python - <<'PY'
          from pathlib import Path

          registration = Path('src/admin/submissions/application-registration.ts')
          content = registration.read_text()
          content = content.replace(
              'function planRegistration(\n',
              'async function planRegistration(\n',
              1,
          )
          registration.write_text(content)

          backend = Path('src/admin/submissions/drizzle-problem-location-correction-application-backend.ts')
          content = backend.read_text().replace(
              'prefixStatements: (command) => [',
              'prefixStatements: () => [',
              1,
          )
          backend.write_text(content)

          test = Path('tests/problem-location-correction-application.test.ts')
          content = test.read_text().replace(
              '  let current = structuredClone(initial);',
              '  const current = structuredClone(initial);',
              1,
          )
          test.write_text(content)
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply Biome fixes to P5-07D1 files
        run: |
          npx biome check --write \
            package.json \
            src/db/schema/submission-applications.ts \
            src/admin/location-correction/drizzle-backend.ts \
            src/admin/submissions/application-registration.ts \
            src/admin/submissions/problem-location-correction-application.ts \
            src/admin/submissions/problem-location-correction-application-authorization.ts \
            src/admin/submissions/drizzle-problem-location-correction-application-backend.ts \
            'functions/admin/api/problem-applications/[applicationId]/apply-location-correction.ts' \
            tests/problem-location-correction-application.test.ts \
            tests/problem-location-correction-application-api.test.ts \
            scripts/check-problem-location-correction-application.ts \
            docs/P5_07D1_PROBLEM_LOCATION_CORRECTION_APPLICATION.md
      - name: Validate TypeScript and runtime contracts
        run: |
          npm run check
          npm run schema:check
      - name: Run focused application tests
        run: |
          npx vitest run \
            tests/problem-location-correction-application.test.ts \
            tests/problem-location-correction-application-api.test.ts \
            tests/submission-application-registration.test.ts \
            tests/submission-application-lifecycle.test.ts \
            tests/suggest-application-binding.test.ts
      - name: Commit fixes
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json src functions tests scripts docs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "P5-07D1: fix and format Problem Location correction application"
          git push origin HEAD:p5-07d1-problem-location-correction
