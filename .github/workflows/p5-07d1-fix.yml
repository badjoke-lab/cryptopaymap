name: P5-07D1 registration repair

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  repair:
    if: github.head_ref == 'p5-07d1-problem-location-correction' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07d1-problem-location-correction
          fetch-depth: 0
      - name: Restore P5-07B1 registration behavior and add only the D1 receipt kind
        run: |
          git show origin/main:src/admin/submissions/application-registration.ts \
            > src/admin/submissions/application-registration.ts
          python - <<'PY'
          from pathlib import Path
          path = Path('src/admin/submissions/application-registration.ts')
          content = path.read_text()
          marker = "  'candidate_promotion_decision',\n"
          addition = marker + "  'location_profile_correction_decision',\n"
          if "'location_profile_correction_decision'" not in content:
              if marker not in content:
                  raise SystemExit('Application receipt enum marker is missing')
              content = content.replace(marker, addition, 1)
          path.write_text(content)
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx biome check --write src/admin/submissions/application-registration.ts
      - name: Validate registration and D1 contracts
        run: |
          npm run check
          npm run schema:check
          npx vitest run \
            tests/submission-application-registration.test.ts \
            tests/submission-application-lifecycle.test.ts \
            tests/suggest-application-binding.test.ts \
            tests/problem-location-correction-application.test.ts \
            tests/problem-location-correction-application-api.test.ts
      - name: Commit registration repair
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/admin/submissions/application-registration.ts
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "P5-07D1: preserve B1 registration behavior"
          git push origin HEAD:p5-07d1-problem-location-correction
