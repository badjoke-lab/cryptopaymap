name: Apply P5-03B test type fix

on:
  push:
    branches:
      - p5-03b-report-private-intake

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, 'Preserve report fixture payload types') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-03b-report-private-intake
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Preserve fixture payload types
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');
          const path = 'tests/report-private-intake-integration.test.ts';
          const before = readFileSync(path, 'utf8');
          const expected = "function commonEnvelope(submissionType: 'payment_report' | 'problem_report', originalPayload: unknown) {";
          if (!before.includes(expected)) throw new Error('Missing commonEnvelope signature.');
          const after = before.replace(
            expected,
            "function commonEnvelope<Payload>(submissionType: 'payment_report' | 'problem_report', originalPayload: Payload) {",
          );
          writeFileSync(path, after);
          NODE
      - run: npm ci
      - run: npm run format
      - name: Commit type fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tests/report-private-intake-integration.test.ts src/submissions/report-intake-service.ts scripts/check-report-private-intake.ts docs/P5_03B_REPORT_PRIVATE_INTAKE_INTEGRATION.md package.json
          git commit -m 'Preserve report fixture payload types'
          git push origin HEAD:p5-03b-report-private-intake
