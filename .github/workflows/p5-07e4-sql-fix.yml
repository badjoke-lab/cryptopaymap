name: P5-07E4 SQL fix

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'p5-07e4-business-claim-payment-application' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07e4-business-claim-payment-application
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/p5-07e4-sql-fix.mjs
      - run: npm run format
      - run: npm run lint
      - run: node scripts/check-business-claim-payment-application.mjs
      - run: npx vitest run tests/business-claim-payment-application.test.ts tests/business-claim-payment-application-api.test.ts
      - run: npm run check
      - name: Commit SQL guard fix
        shell: bash
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P5-07E4 fix verification SQL guards"
          git push origin HEAD:p5-07e4-business-claim-payment-application
