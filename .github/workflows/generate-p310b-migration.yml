name: Generate P3-10B migration

on:
  push:
    branches:
      - work/p310b
    paths:
      - src/db/schema/media-review-decisions.ts
      - src/db/schema/index.ts
      - .github/workflows/generate-p310b-migration.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p310b
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Generate migration
        run: npm run db:generate
      - name: Commit migration artifacts
        shell: bash
        run: |
          if git diff --quiet -- drizzle; then
            echo "No migration changes were generated."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drizzle
          git commit -m "P3-10B: generate media review migration"
          git push origin HEAD:work/p310b
