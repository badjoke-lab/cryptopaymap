name: Prepare P5-03E evidence-policy safety fixes

on:
  push:
    branches:
      - p5-03e-positive-payment-evidence

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: p5-03e-positive-payment-evidence
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Apply Evidence-policy safety corrections
        run: |
          python <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'missing expected text in {path}: {old[:120]!r}')
              file.write_text(text.replace(old, new))

          replace(
              'src/submissions/payment-report-evidence-contract.ts',
              "    summary: safeTextSchema(1_000),\n    reviewerNote: safeTextSchema(1_000).nullable(),",
              "    evidenceSummary: safeTextSchema(1_000),\n    publicSummary: safeTextSchema(1_000).nullable(),\n    reviewerNote: safeTextSchema(1_000).nullable(),",
          )

          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "import { paymentReportReviewProjectionSchema } from './report-detail';",
              "import { paymentReportOriginalPayloadSchema } from '../../submissions/report-contract';\nimport { paymentReportReviewProjectionSchema } from './report-detail';",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "    summary: safeTextSchema(1_000),\n    reviewerNote: safeTextSchema(1_000).nullable(),",
              "    evidenceSummary: safeTextSchema(1_000),\n    publicSummary: safeTextSchema(1_000).nullable(),\n    reviewerNote: safeTextSchema(1_000).nullable(),",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "    if (request.decision === 'accept_and_reconfirm' && request.nextReviewAt === null) {\n      context.addIssue({\n        code: 'custom',\n        path: ['nextReviewAt'],\n        message: 'Reconfirmation requires a future next-review time.',\n      });\n    }\n    if (request.decision === 'accept_evidence' && request.nextReviewAt !== null) {\n      context.addIssue({\n        code: 'custom',\n        path: ['nextReviewAt'],\n        message: 'Evidence-only acceptance cannot assign a next-review time.',\n      });\n    }",
              "    if (request.decision === 'accept_and_reconfirm') {\n      if (request.evidenceClass !== 'a') {\n        context.addIssue({\n          code: 'custom',\n          path: ['evidenceClass'],\n          message: 'A single Class B user report cannot reconfirm a Claim.',\n        });\n      }\n      if (request.nextReviewAt === null) {\n        context.addIssue({\n          code: 'custom',\n          path: ['nextReviewAt'],\n          message: 'Reconfirmation requires a future next-review time.',\n        });\n      }\n      if (request.publicSummary === null) {\n        context.addIssue({\n          code: 'custom',\n          path: ['publicSummary'],\n          message: 'Reconfirmation requires a separate publication-safe summary.',\n        });\n      }\n    }\n    if (request.decision === 'accept_evidence') {\n      if (request.nextReviewAt !== null) {\n        context.addIssue({\n          code: 'custom',\n          path: ['nextReviewAt'],\n          message: 'Evidence-only acceptance cannot assign a next-review time.',\n        });\n      }\n      if (request.publicSummary !== null) {\n        context.addIssue({\n          code: 'custom',\n          path: ['publicSummary'],\n          message: 'Evidence-only acceptance cannot write a public Verification summary.',\n        });\n      }\n    }",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "  normalizedPayload: unknown;\n  payloadUpdatedAt: string;",
              "  originalPayload: unknown;\n  normalizedPayload: unknown;\n  payloadUpdatedAt: string;",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "  summary: string;\n  eventInternalNote: string;",
              "  evidenceSummary: string;\n  publicSummary: string | null;\n  eventInternalNote: string;",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "  if (\n    payment.processor !== null &&\n    state.claim.processorName !== null &&\n    payment.processor.name.toLocaleLowerCase('en-US') !==\n      state.claim.processorName.toLocaleLowerCase('en-US')\n  ) {\n    return false;\n  }",
              "  if (state.claim.routeType === 'processor_checkout') {\n    if (payment.processor === null || state.claim.processorName === null) return false;\n    if (\n      payment.processor.name.toLocaleLowerCase('en-US') !==\n      state.claim.processorName.toLocaleLowerCase('en-US')\n    ) {\n      return false;\n    }\n  } else if (payment.processor !== null || state.claim.processorName !== null) {\n    return false;\n  }",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "  const projection = projectionResult.data;\n  const paymentMatch = exactPaymentMatch(state, projection);",
              "  const projection = projectionResult.data;\n  const originalResult = paymentReportOriginalPayloadSchema.safeParse(state.originalPayload);\n  if (\n    !originalResult.success ||\n    originalResult.data.result !== 'successful' ||\n    originalResult.data.paymentDate !== projection.paymentDate\n  ) {\n    throw new PositivePaymentEvidenceError(\n      'invalid_projection',\n      'The original successful payment report could not be verified.',\n    );\n  }\n  const original = originalResult.data;\n  const paymentMatch = exactPaymentMatch(state, projection);",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "      !projection.restrictedEvidence.privateTransactionUrlPresent ||\n      !paymentMatch ||",
              "      !projection.restrictedEvidence.privateTransactionUrlPresent ||\n      original.privateTransactionUrl === null ||\n      !paymentMatch ||",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "      !paymentMatch ||\n      request.nextReviewAt === null ||\n      Date.parse(request.nextReviewAt) <= decidedAt.getTime()",
              "      request.evidenceClass !== 'a' ||\n      request.publicSummary === null ||\n      !paymentMatch ||\n      request.nextReviewAt === null ||\n      Date.parse(request.nextReviewAt) <= decidedAt.getTime()",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "        'Reconfirmation requires an exact payment match and a future next-review time.',",
              "        'Reconfirmation requires Class A proof, an exact payment match, a publication-safe summary, and a future next-review time.',",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "    summary: request.summary,\n    reviewerNote: request.reviewerNote,",
              "    evidenceSummary: request.evidenceSummary,\n    publicSummary: request.publicSummary,\n    reviewerNote: request.reviewerNote,",
          )
          replace(
              'src/admin/submissions/payment-report-evidence.ts',
              "      sourceUrl: projection.evidenceLinks[0]?.url ?? null,\n      observedAt: new Date(`${projection.paymentDate}T00:00:00.000Z`),\n      summary: request.summary,",
              "      sourceUrl:\n        request.evidenceClass === 'a'\n          ? original.privateTransactionUrl\n          : (projection.evidenceLinks[0]?.url ?? null),\n      observedAt: new Date(`${projection.paymentDate}T00:00:00.000Z`),\n      evidenceSummary: request.evidenceSummary,\n      publicSummary: request.publicSummary,",
          )

          replace(
              'src/admin/submissions/drizzle-payment-report-evidence-backend.ts',
              "          normalizedPayload: submissionPayloads.normalizedPayload,\n          payloadUpdatedAt: submissionPayloads.updatedAt,",
              "          originalPayload: submissionPayloads.originalPayload,\n          normalizedPayload: submissionPayloads.normalizedPayload,\n          payloadUpdatedAt: submissionPayloads.updatedAt,",
          )
          replace(
              'src/admin/submissions/drizzle-payment-report-evidence-backend.ts',
              "        normalizedPayload: row.normalizedPayload,\n        payloadUpdatedAt: row.payloadUpdatedAt.toISOString(),",
              "        originalPayload: row.originalPayload,\n        normalizedPayload: row.normalizedPayload,\n        payloadUpdatedAt: row.payloadUpdatedAt.toISOString(),",
          )
          replace(
              'src/admin/submissions/drizzle-payment-report-evidence-backend.ts',
              "          summary: command.summary,",
              "          summary: command.evidenceSummary,",
          )
          replace(
              'src/admin/submissions/drizzle-payment-report-evidence-backend.ts',
              "      if (command.decision === 'accept_and_reconfirm' && command.verificationEventId !== null) {\n        const eventType = command.expectedClaimStatus === 'stale' ? 'restored' : 'reconfirmed';",
              "      if (command.decision === 'accept_and_reconfirm' && command.verificationEventId !== null) {\n        if (command.publicSummary === null || command.nextReviewAt === null) {\n          throw new SubmissionPersistenceError(\n            'invalid_input',\n            'Reconfirmation persistence requires a public summary and next-review time.',\n          );\n        }\n        const eventType = command.expectedClaimStatus === 'stale' ? 'restored' : 'reconfirmed';",
          )
          replace(
              'src/admin/submissions/drizzle-payment-report-evidence-backend.ts',
              "            publicSummary: command.summary,",
              "            publicSummary: command.publicSummary,",
          )

          replace(
              'tests/positive-payment-evidence.test.ts',
              "    normalizedPayload: {",
              "    originalPayload: {\n      schemaVersion: 'payment-report-v1',\n      result: 'successful',\n      paymentDate: '2026-07-12',\n      payment: {\n        assetSlug: 'btc',\n        networkSlug: 'bitcoin',\n        routeType: 'direct_wallet',\n        paymentMethod: 'onchain',\n        processor: null,\n        context: 'hosted_checkout',\n        observedSteps: 'Scanned the displayed wallet QR code.',\n      },\n      privateTransactionUrl: null,\n      notes: null,\n    },\n    normalizedPayload: {",
          )
          replace(
              'tests/positive-payment-evidence.test.ts',
              "    summary: 'A successful BTC payment was reported on 2026-07-12.',\n    reviewerNote: null,",
              "    evidenceSummary: 'A successful BTC payment was reported on 2026-07-12.',\n    publicSummary: null,\n    reviewerNote: null,",
          )
          replace(
              'tests/positive-payment-evidence.test.ts',
              "    current.normalizedPayload = {\n      ...(current.normalizedPayload as Record<string, unknown>),\n      restrictedEvidence: { privateTransactionUrlPresent: true },\n    };",
              "    current.originalPayload = {\n      ...(current.originalPayload as Record<string, unknown>),\n      privateTransactionUrl: 'https://explorer.example/tx/restricted-proof',\n    };\n    current.normalizedPayload = {\n      ...(current.normalizedPayload as Record<string, unknown>),\n      restrictedEvidence: { privateTransactionUrlPresent: true },\n    };",
          )
          replace(
              'tests/positive-payment-evidence.test.ts',
              "        independenceKey: null,\n        nextReviewAt: '2027-01-09T05:00:00.000Z',",
              "        independenceKey: null,\n        publicSummary: 'The payment method was reconfirmed from restricted proof.',\n        nextReviewAt: '2027-01-09T05:00:00.000Z',",
          )
          replace(
              'tests/positive-payment-evidence.test.ts',
              "    const current = state();\n    if (current.claim) current.claim.claimStatus = 'stale';\n    const harness = backend(current);",
              "    const current = state();\n    if (current.claim) current.claim.claimStatus = 'stale';\n    current.originalPayload = {\n      ...(current.originalPayload as Record<string, unknown>),\n      privateTransactionUrl: 'https://explorer.example/tx/stale-restoration-proof',\n    };\n    current.normalizedPayload = {\n      ...(current.normalizedPayload as Record<string, unknown>),\n      restrictedEvidence: { privateTransactionUrlPresent: true },\n    };\n    const harness = backend(current);",
          )
          replace(
              'tests/positive-payment-evidence.test.ts',
              "        expectedClaimStatus: 'stale',\n        decision: 'accept_and_reconfirm',\n        nextReviewAt: '2027-01-09T05:00:00.000Z',",
              "        expectedClaimStatus: 'stale',\n        decision: 'accept_and_reconfirm',\n        evidenceClass: 'a',\n        evidenceVisibility: 'restricted',\n        independenceKey: null,\n        publicSummary: 'The stale Claim was restored from restricted payment proof.',\n        nextReviewAt: '2027-01-09T05:00:00.000Z',",
          )
          replace(
              'tests/positive-payment-evidence.test.ts',
              "    const mismatched = state();\n    const mismatchedOption = mismatched.claim?.options[0];",
              "    const mismatched = state();\n    mismatched.originalPayload = {\n      ...(mismatched.originalPayload as Record<string, unknown>),\n      privateTransactionUrl: 'https://explorer.example/tx/mismatch-proof',\n    };\n    mismatched.normalizedPayload = {\n      ...(mismatched.normalizedPayload as Record<string, unknown>),\n      restrictedEvidence: { privateTransactionUrlPresent: true },\n    };\n    const mismatchedOption = mismatched.claim?.options[0];",
          )
          replace(
              'tests/positive-payment-evidence.test.ts',
              "          decision: 'accept_and_reconfirm',\n          nextReviewAt: '2027-01-09T05:00:00.000Z',",
              "          decision: 'accept_and_reconfirm',\n          evidenceClass: 'a',\n          evidenceVisibility: 'restricted',\n          independenceKey: null,\n          publicSummary: 'A publication-safe mismatch test summary.',\n          nextReviewAt: '2027-01-09T05:00:00.000Z',",
          )
          replace(
              'tests/positive-payment-evidence.test.ts',
              "        request({ summary: 'Changed summary under the same request UUID.' }),",
              "        request({ evidenceSummary: 'Changed summary under the same request UUID.' }),",
          )
          marker = "  it('replays an identical request and rejects changed-content UUID reuse', async () => {"
          insertion = "  it('does not allow a single Class B report to reconfirm a Claim', async () => {\n    await expect(\n      decidePositivePaymentEvidence(\n        context,\n        backend().adapter,\n        submissionId,\n        request({\n          decision: 'accept_and_reconfirm',\n          publicSummary: 'This must not be accepted from one Class B report.',\n          nextReviewAt: '2027-01-09T05:00:00.000Z',\n        }),\n        decidedAt,\n      ),\n    ).rejects.toMatchObject({ code: 'invalid_request' });\n  });\n\n"
          replace('tests/positive-payment-evidence.test.ts', marker, insertion + marker)

          replace(
              'scripts/check-positive-payment-evidence.ts',
              "  summary: 'A successful payment report supports the reviewed Claim.',\n  reviewerNote: 'Restricted transaction proof was reviewed privately.',",
              "  evidenceSummary: 'Restricted payment proof supports the reviewed Claim.',\n  publicSummary: 'The payment method was reconfirmed from restricted proof.',\n  reviewerNote: 'Restricted transaction proof was reviewed privately.',",
          )
          replace(
              'scripts/check-positive-payment-evidence.ts',
              "  summary: 'A successful payment report supports the reviewed Claim.',\n  reviewerNote: 'Restricted transaction proof was reviewed privately.',",
              "  evidenceSummary: 'Restricted payment proof supports the reviewed Claim.',\n  publicSummary: 'The payment method was reconfirmed from restricted proof.',\n  reviewerNote: 'Restricted transaction proof was reviewed privately.',",
          )

          replace(
              'docs/P5_03E_POSITIVE_PAYMENT_EVIDENCE.md',
              "Reconfirmation additionally requires:\n\n- submitted route, Asset, Network, and payment method to be present;",
              "Reconfirmation additionally requires:\n\n- Class A restricted payment proof;\n- a separate publication-safe Verification summary;\n- submitted route, Asset, Network, and payment method to be present;",
          )
          replace(
              'docs/P5_03E_POSITIVE_PAYMENT_EVIDENCE.md',
              "Class B user-report Evidence requires:\n\n- a bounded reviewer-supplied independence key;\n- `visibility = private` or `restricted`.\n\nP5-03E never creates public Evidence directly.",
              "Class B user-report Evidence requires:\n\n- a bounded reviewer-supplied independence key;\n- `visibility = private` or `restricted`;\n- Evidence-only acceptance. A single Class B report cannot reconfirm a Claim.\n\nFor Class A, the restricted transaction URL is read from the original private Submission payload and retained only on restricted Evidence. The normalized reviewer projection continues to expose presence only.\n\nP5-03E never creates public Evidence directly. Evidence summary and public Verification summary are separate fields so restricted review detail cannot become public by reuse.",
          )
          PY

      - name: Format repository changes
        run: npm run format

      - name: Remove one-shot workflow
        run: git rm .github/workflows/p5-03e-safety-fix.yml

      - name: Commit safety corrections
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'P5-03E: enforce Evidence policy and summary privacy'
          git push origin HEAD:p5-03e-positive-payment-evidence
