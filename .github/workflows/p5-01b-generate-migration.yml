name: P5-01B migration artifact generator

on:
  pull_request:
    paths:
      - 'src/db/schema/**'
      - '.github/workflows/p5-01b-generate-migration.yml'

permissions:
  contents: read

jobs:
  generate-migration-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Drizzle migration
        run: npm run db:generate

      - name: Upload generated Drizzle directory
        uses: actions/upload-artifact@v4
        with:
          name: p5-01b-generated-drizzle
          path: drizzle
          if-no-files-found: error
