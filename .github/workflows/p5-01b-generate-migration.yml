name: P5-01B migration artifact generator

on:
  pull_request:
    paths:
      - 'src/db/schema/**'
      - '.github/workflows/p5-01b-generate-migration.yml'

permissions:
  contents: write

jobs:
  generate-migration-artifact:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Drizzle migration
        run: npm run db:generate

      - name: Commit generated migration when needed
        shell: bash
        run: |
          if git diff --quiet -- drizzle && git diff --cached --quiet -- drizzle; then
            echo 'Drizzle migration artifacts are already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add drizzle
          git commit -m 'P5-01B: generate submission persistence migration'
          git push origin HEAD:${{ github.head_ref }}

      - name: Upload generated Drizzle directory
        uses: actions/upload-artifact@v4
        with:
          name: p5-01b-generated-drizzle
          path: drizzle
          if-no-files-found: error
