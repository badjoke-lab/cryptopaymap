name: P3-08B fix replay types

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Synchronize branch
        run: git pull --rebase origin "${GITHUB_HEAD_REF}"
      - name: Narrow durable replay values
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/admin/evidence-review/drizzle-state.ts')
          text = path.read_text()
          marker = "import { InMemoryEvidenceReviewBackend } from './in-memory-backend';\n"
          helpers = """

          function durableEvidenceReviewStatus(
            value: string,
          ): EvidenceReviewDecisionReceipt['evidenceReviewStatus'] {
            if (value === 'pending' || value === 'accepted' || value === 'rejected') return value;
            throw new EvidenceReviewDecisionError(
              'backend_failure',
              'The durable Evidence review receipt contains an unsupported Evidence status.',
            );
          }

          function durableVerificationEventType(
            value: string | null,
          ): EvidenceReviewDecisionReceipt['verificationEventType'] {
            if (
              value === null ||
              value === 'confirmed' ||
              value === 'reconfirmed' ||
              value === 'restored' ||
              value === 'marked_stale' ||
              value === 'ended' ||
              value === 'rejected'
            ) {
              return value;
            }
            throw new EvidenceReviewDecisionError(
              'backend_failure',
              'The durable Evidence review receipt contains an unsupported verification event.',
            );
          }
          """
          if 'function durableEvidenceReviewStatus' not in text:
            if marker not in text:
              raise SystemExit('Replay helper insertion point is unavailable.')
            text = text.replace(marker, marker + helpers, 1)
          text = text.replace(
            'evidenceReviewStatus: row.evidenceReviewStatus,',
            'evidenceReviewStatus: durableEvidenceReviewStatus(row.evidenceReviewStatus),',
            1,
          )
          text = text.replace(
            'verificationEventType: row.verificationEventType,',
            'verificationEventType: durableVerificationEventType(row.verificationEventType),',
            1,
          )
          path.write_text(text)
          PY
          npx biome format --write src/admin/evidence-review/drizzle-state.ts
          rm .github/workflows/p308b-fix-types.yml
      - name: Commit type fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P3-08B: narrow durable replay values"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
