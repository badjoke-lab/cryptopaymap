name: Bootstrap P1-06 migration

on:
  push:
    branches:
      - feat/p1-06-schema-migrations
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  migration:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: feat/p1-06-schema-migrations

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Check runtime schemas
        run: set -o pipefail && npm run schema:check 2>&1 | tee migration-schema.log

      - name: Generate reviewable migration
        run: set -o pipefail && npm run db:generate 2>&1 | tee migration-generate.log

      - name: Commit migration files
        run: |
          if [ -z "$(git status --porcelain -- drizzle)" ]; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add drizzle
          git commit -m "P1-06: add initial Drizzle migration"
          git push origin HEAD:feat/p1-06-schema-migrations

      - name: Upload generation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: p1-06-migration-generation
          path: |
            migration-schema.log
            migration-generate.log
          if-no-files-found: warn
          retention-days: 7
