name: P2-10 finalize

on:
  push:
    branches:
      - work/p210

permissions:
  contents: write

jobs:
  finalize:
    if: github.event.head_commit.message != 'P2-10: format and generate migration'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p210
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Format source
        run: npm run format

      - name: Generate database files
        run: npm run db:generate

      - name: Remove one-time workflow and commit
        run: |
          rm -f .github/workflows/p210-finalize.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P2-10: format and generate migration"
          git push origin HEAD:work/p210
