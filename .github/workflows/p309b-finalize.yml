name: P3-09B finalize persistence

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Synchronize branch
        run: git pull --rebase origin "${GITHUB_HEAD_REF}"
      - name: Restore persistence runtime check
        run: |
          echo '' | base64 --decode > scripts/check-reconfirmation-persistence.ts
      - name: Synchronize public development tracking
        run: |
          python - <<'PY'
          from pathlib import Path

          plan = Path('docs/IMPLEMENTATION_PLAN.md')
          text = plan.read_text()
          text = text.replace('**Last updated:** 2026-07-02', '**Last updated:** 2026-07-03', 1)
          text = text.replace(
              '| P3-08 | Evidence review and verification decisions | Integration audit | P3-07 | #59, #60, #62, #63 active |',
              '| P3-08 | Evidence review and verification decisions | Completed | P3-07 | #59, #60, #62, #63 |',
              1,
          )
          text = text.replace(
              '| P3-09 | Status transitions and reconfirmation queue | Planned | P3-07, P3-08 | — |',
              '| P3-09 | Status transitions and reconfirmation queue | In progress | P3-07, P3-08 | #64, P3-09B active |',
              1,
          )
          old = '''### Current delivery

P3-08D performs the final cross-layer repository integration and handoff audit. It verifies the queue-to-detail-to-decision path, exact Evidence and Claim versions, the complete accepted Evidence set, Claim visibility preservation, strict rejection of visibility mutation fields, durable replay and conflict behavior, resulting Evidence and Claim state, verification events, runtime validation, and deferred live-verification boundaries.

### Remaining P3-08 delivery

- merge the successful P3-08D integration audit and hand off to P3-09
'''
          new = '''P3-08D completed the cross-layer repository integration and handoff audit through pull request #63.

### Completed P3-09 deliveries

P3-09A established pure queue evaluation for overdue, missing-deadline, stale, and due-soon Claims, plus a separate guarded and idempotent system-only `confirmed → stale` expiration contract. It completed through pull request #64.

### Current delivery

P3-09B adds durable expiration receipts, Drizzle and Neon transaction guards, atomic Claim and verification-event persistence, deterministic replay, and a bounded database reconfirmation queue.

### Remaining P3-09 deliveries

- protected recheck queue and execution workspace
- scheduled execution boundary and repository integration audit
- live scheduler, Access, database, and production verification remain deferred
'''
          if old not in text:
              raise SystemExit('Implementation plan handoff block was not found.')
          plan.write_text(text.replace(old, new, 1))

          status = Path('docs/PROJECT_STATUS.md')
          status.write_text('''# CryptoPayMap project status

**Last verified:** 2026-07-03

## Current phase

Phase 3 — Administration and review

## Current implementation item

P3-09 — Status transitions and reconfirmation queue

## Active work

- P3-09B — durable expiration persistence and bounded database queue.
- Branch: `work/p309b`.
- Pull request: active draft.

## Latest completed work

- Phase 2 completed through pull request #40.
- P3-01 completed through pull request #41.
- P3-02 completed through pull request #42.
- P3-03 completed through pull request #43.
- P3-04 completed through pull request #44.
- P3-05 completed through pull request #45.
- P3-06 completed through pull requests #46 and #47.
- P3-07 completed through pull request #58.
- P3-08 completed through pull request #63.
- P3-09A completed through pull request #64.

## P3-09B in progress

- add durable `reconfirmation_expirations` receipts
- preserve request fingerprints for deterministic replay
- guard exact Claim version, confirmed status, visibility, and review deadline
- update the Claim and create the `marked_stale` verification event atomically
- add a bounded database reconfirmation queue
- add migration, persistence tests, and runtime checks
- keep scheduler, protected UI, and live verification out of this delivery

## Deferred within P3-09

- protected recheck queue and execution workspace
- scheduled execution boundary
- final P3-09 integration audit
- live scheduler, Access, database, and production verification

## Next

1. Complete P3-09B migration and CI.
2. Merge the durable persistence delivery.
3. Build the protected recheck workspace in P3-09C.

## Blocked

No repository blocker. Live deployment and database verification remain deferred.

## Verification rule

The actual main branch, merged pull requests, and CI results are authoritative.
''')
          PY
      - name: Generate Drizzle migration
        run: npm run db:generate
      - name: Apply Biome formatting
        run: |
          npx biome format --write \
            src/db/schema/index.ts \
            src/db/schema/reconfirmation-expirations.ts \
            src/admin/reconfirmation/drizzle-state.ts \
            src/admin/reconfirmation/drizzle-guards.ts \
            src/admin/reconfirmation/drizzle-backend.ts \
            src/admin/reconfirmation/drizzle-queue-backend.ts \
            src/admin/reconfirmation/workspace.ts \
            tests/reconfirmation-persistence.test.ts \
            scripts/check-reconfirmation-persistence.ts
      - name: Remove one-time finalizer
        run: rm .github/workflows/p309b-finalize.yml
      - name: Commit finalized persistence delivery
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P3-09B: finalize durable reconfirmation persistence"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
