name: P5-07D7 format branch

on:
  push:
    branches:
      - p5-07d7-claim-asset-replacement-application

permissions:
  contents: write

concurrency:
  group: p5-07d7-format
  cancel-in-progress: false

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out implementation branch
        uses: actions/checkout@v4
        with:
          ref: p5-07d7-claim-asset-replacement-application
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Apply repository formatter
        run: npm run format
      - name: Remove temporary formatter workflow
        run: rm .github/workflows/p5-07d7-format.yml
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "P5-07D7 format bounded files"
          git push origin HEAD:p5-07d7-claim-asset-replacement-application
