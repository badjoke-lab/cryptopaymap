name: Prepare P5-03E internal invariant type fix

on:
  push:
    branches:
      - p5-03e-positive-payment-evidence

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-03e-positive-payment-evidence
          fetch-depth: 0
      - name: Correct impossible-state error type
        run: |
          python <<'PY'
          from pathlib import Path
          path = Path('src/admin/submissions/drizzle-payment-report-evidence-backend.ts')
          text = path.read_text()
          old = """          throw new SubmissionPersistenceError(
            'invalid_input',
            'Reconfirmation persistence requires a public summary and next-review time.',
          );"""
          new = """          throw new Error(
            'Reconfirmation persistence requires a public summary and next-review time.',
          );"""
          if old not in text:
              raise SystemExit('expected invalid internal error code was not found')
          path.write_text(text.replace(old, new))
          PY
      - name: Remove one-shot workflow
        run: git rm .github/workflows/p5-03e-type-fix.yml
      - name: Commit correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'P5-03E: correct internal invariant error type'
          git push origin HEAD:p5-03e-positive-payment-evidence
