name: Staging review deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: staging-review-deploy
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Build validated staging review artifact
        run: npm run staging:review:build

      - name: Verify Cloudflare deployment credentials
        id: credentials
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "Missing CLOUDFLARE_API_TOKEN"; exit 1; }
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "Missing CLOUDFLARE_ACCOUNT_ID"; exit 1; }

      - name: Verify configured Suggest deployment inputs
        id: suggest_config
        continue-on-error: true
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CPM_REVIEW_SECRET_SEED_BASE64URL: ${{ secrets.CPM_REVIEW_SECRET_SEED_BASE64URL }}
        run: |
          set -euo pipefail
          required=(
            DATABASE_URL
            CPM_REVIEW_SECRET_SEED_BASE64URL
          )
          missing=()
          for key in "${required[@]}"; do
            if [ -z "${!key:-}" ]; then
              missing+=("$key")
            fi
          done
          printf '%s\n' "${missing[@]}" > missing-configured-inputs.txt
          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing configured input: %s\n' "${missing[@]}"
            exit 1
          fi

          CPM_REVIEW_SECRET_SEED_BASE64URL="$CPM_REVIEW_SECRET_SEED_BASE64URL" \
            node scripts/derive-suggest-review-secrets.mjs review-derived-secrets-preflight.json
          rm -f review-derived-secrets-preflight.json

      - name: Deploy Submission rate-limit Durable Object Worker
        id: worker_deploy
        if: steps.credentials.outcome == 'success' && steps.suggest_config.outcome == 'success'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler deploy --config workers/submission-rate-limit/wrangler.jsonc \
            2>&1 | tee worker-deployment-output.log

      - name: Prepare Worker deployment diagnostic summary
        if: always() && steps.worker_deploy.outcome == 'failure'
        run: |
          node scripts/summarize-worker-deployment-log.mjs \
            worker-deployment-output.log \
            worker-deployment-diagnostic.json

      - name: Upload Worker deployment diagnostics
        if: always() && steps.worker_deploy.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: staging-review-worker-deployment-log
          path: |
            worker-deployment-output.log
            worker-deployment-diagnostic.json
          if-no-files-found: error
          retention-days: 30

      - name: Synchronize configured Suggest Pages secrets
        id: pages_secrets
        if: steps.credentials.outcome == 'success' && steps.suggest_config.outcome == 'success' && steps.worker_deploy.outcome == 'success'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CPM_REVIEW_SECRET_SEED_BASE64URL: ${{ secrets.CPM_REVIEW_SECRET_SEED_BASE64URL }}
        run: |
          set -euo pipefail
          trap 'rm -f review-derived-secrets.json pages-secrets.json' EXIT

          node scripts/derive-suggest-review-secrets.mjs review-derived-secrets.json

          node <<'NODE'
          const { appendFileSync, readFileSync, writeFileSync } = require('node:fs');
          const derived = JSON.parse(readFileSync('review-derived-secrets.json', 'utf8'));
          for (const value of Object.values(derived)) {
            console.log(`::add-mask::${value}`);
          }
          const values = {
            DATABASE_URL: process.env.DATABASE_URL,
            ...derived,
            CPM_SUBMISSION_CONTACT_ENCRYPTION_KEY_ID: 'review-v1',
            CPM_SUBMISSION_CONTACT_RETENTION_DAYS: '180',
            CPM_SUBMISSION_RATE_LIMIT_MAX_REQUESTS: '5',
            CPM_SUBMISSION_RATE_LIMIT_WINDOW_SECONDS: '600',
            CPM_TURNSTILE_SECRET_KEY: '1x0000000000000000000000000000000AA',
            PUBLIC_TURNSTILE_SITE_KEY: '1x00000000000000000000AA',
            CPM_TURNSTILE_EXPECTED_HOSTNAME: 'review.cryptopaymap-staging.pages.dev',
            CPM_TURNSTILE_EXPECTED_ACTION: 'submission_intake',
          };
          writeFileSync('pages-secrets.json', `${JSON.stringify(values)}\n`, { mode: 0o600 });
          appendFileSync(
            process.env.GITHUB_ENV,
            `CPM_SUGGEST_READINESS_TOKEN=${derived.CPM_SUGGEST_READINESS_TOKEN}\n`,
          );
          NODE

          npx wrangler pages secret bulk pages-secrets.json \
            --project-name cryptopaymap-staging \
            --env preview

      - name: Deploy staging review to Cloudflare Pages
        id: deploy
        if: steps.credentials.outcome == 'success' && steps.suggest_config.outcome == 'success' && steps.worker_deploy.outcome == 'success' && steps.pages_secrets.outcome == 'success'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          npx wrangler pages deploy dist \
            --project-name cryptopaymap-staging \
            --branch review \
            --config wrangler.jsonc 2>&1 | tee deployment-output.log

      - name: Prepare Pages deployment diagnostic summary
        if: always() && steps.deploy.outcome == 'failure'
        run: |
          node scripts/summarize-worker-deployment-log.mjs \
            deployment-output.log \
            pages-deployment-diagnostic.json

      - name: Upload Pages deployment diagnostics
        if: always() && steps.deploy.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: staging-review-pages-deployment-log
          path: |
            deployment-output.log
            pages-deployment-diagnostic.json
          if-no-files-found: error
          retention-days: 30

      - name: Verify configured Suggest review path
        id: configured_verify
        if: steps.deploy.outcome == 'success'
        continue-on-error: true
        run: |
          set -euo pipefail
          base_url='https://review.cryptopaymap-staging.pages.dev'
          verified='false'

          for attempt in $(seq 1 18); do
            config_status="$(curl -sS -o suggest-config-response.json -w '%{http_code}' "$base_url/api/suggest/config" || true)"
            readiness_status="$(curl -sS -o suggest-readiness-response.json -w '%{http_code}' \
              -H "Authorization: Bearer $CPM_SUGGEST_READINESS_TOKEN" \
              "$base_url/api/suggest/readiness" || true)"
            if [ "$config_status" = '200' ] && [ "$readiness_status" = '200' ]; then
              verified='true'
              break
            fi
            echo "Configured Suggest verification attempt $attempt not ready: config=$config_status readiness=$readiness_status"
            sleep 5
          done

          test "$verified" = 'true'

          node <<'NODE'
          const { readFileSync } = require('node:fs');
          const config = JSON.parse(readFileSync('suggest-config-response.json', 'utf8'));
          if (config.siteKey !== '1x00000000000000000000AA') process.exit(1);
          if (config.action !== 'submission_intake') process.exit(1);
          const readiness = JSON.parse(readFileSync('suggest-readiness-response.json', 'utf8'));
          if (readiness.ready !== true) process.exit(1);
          NODE

          headers="$(curl -sSI "$base_url/suggest")"
          printf '%s\n' "$headers" | grep -Eqi '^content-security-policy:.*https://challenges\.cloudflare\.com'
          printf '%s\n' "$headers" | grep -Eqi '^content-security-policy:.*frame-src https://challenges\.cloudflare\.com'

          rm -f suggest-config-response.json suggest-readiness-response.json

      - name: Write deployment receipt
        if: always()
        env:
          CREDENTIALS_OUTCOME: ${{ steps.credentials.outcome }}
          CONFIG_OUTCOME: ${{ steps.suggest_config.outcome }}
          WORKER_OUTCOME: ${{ steps.worker_deploy.outcome }}
          SECRET_SYNC_OUTCOME: ${{ steps.pages_secrets.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          VERIFY_OUTCOME: ${{ steps.configured_verify.outcome }}
          DEPLOY_COMMIT: ${{ github.sha }}
        run: |
          node <<'NODE'
          const { existsSync, readFileSync, mkdirSync, writeFileSync } = require('node:fs');
          const checks = {
            credentials: process.env.CREDENTIALS_OUTCOME,
            configuredInputs: process.env.CONFIG_OUTCOME,
            durableObjectWorker: process.env.WORKER_OUTCOME,
            pagesSecrets: process.env.SECRET_SYNC_OUTCOME,
            pagesDeployment: process.env.DEPLOY_OUTCOME,
            configuredVerification: process.env.VERIFY_OUTCOME,
          };
          let status = 'deployed';
          if (checks.credentials !== 'success') status = 'missing_credentials';
          else if (checks.configuredInputs !== 'success') status = 'missing_configuration';
          else if (checks.durableObjectWorker !== 'success') status = 'worker_deploy_failed';
          else if (checks.pagesSecrets !== 'success') status = 'secret_sync_failed';
          else if (checks.pagesDeployment !== 'success') status = 'deploy_failed';
          else if (checks.configuredVerification !== 'success') status = 'verification_failed';

          const missingConfiguredInputs = existsSync('missing-configured-inputs.txt')
            ? readFileSync('missing-configured-inputs.txt', 'utf8').split(/\r?\n/).filter(Boolean)
            : [];
          const workerDeploymentDiagnostic = existsSync('worker-deployment-diagnostic.json')
            ? JSON.parse(readFileSync('worker-deployment-diagnostic.json', 'utf8'))
            : null;
          const pagesDeploymentDiagnostic = existsSync('pages-deployment-diagnostic.json')
            ? JSON.parse(readFileSync('pages-deployment-diagnostic.json', 'utf8'))
            : null;
          const output = existsSync('deployment-output.log') ? readFileSync('deployment-output.log', 'utf8') : '';
          const urls = output.match(/https:\/\/[^\s]+\.pages\.dev/g) ?? [];
          const receipt = {
            status,
            commit: process.env.DEPLOY_COMMIT,
            url: urls.at(-1) ?? 'https://review.cryptopaymap-staging.pages.dev',
            generatedAt: new Date().toISOString(),
            checks,
            reviewConfiguration: {
              manualSecrets: ['DATABASE_URL', 'CPM_REVIEW_SECRET_SEED_BASE64URL'],
              derivedSecretsVersion: 'cryptopaymap:review-suggest:v1',
              turnstileMode: 'cloudflare_official_always_pass_test_keys',
              contactRetentionDays: 180,
              rateLimit: { maximumRequests: 5, windowSeconds: 600 },
            },
            ...(checks.durableObjectWorker === 'failure'
              ? { diagnosticsArtifact: 'staging-review-worker-deployment-log' }
              : {}),
            ...(checks.pagesDeployment === 'failure'
              ? { pagesDiagnosticsArtifact: 'staging-review-pages-deployment-log' }
              : {}),
            ...(workerDeploymentDiagnostic ? { workerDeploymentDiagnostic } : {}),
            ...(pagesDeploymentDiagnostic ? { pagesDeploymentDiagnostic } : {}),
            ...(missingConfiguredInputs.length > 0 ? { missingConfiguredInputs } : {}),
          };
          mkdirSync('staging-review-receipt', { recursive: true });
          writeFileSync('staging-review-receipt/deployment-receipt.json', `${JSON.stringify(receipt, null, 2)}\n`);
          NODE

      - name: Upload deployment receipt
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-review-deployment-receipt
          path: staging-review-receipt/deployment-receipt.json
          if-no-files-found: error
          retention-days: 30

      - name: Publish deployment receipt to status branch
        if: always()
        env:
          STATUS_WORKTREE: ${{ runner.temp }}/cryptopaymap-staging-review-status
        run: |
          set -euo pipefail
          rm -rf "$STATUS_WORKTREE"
          git fetch origin staging-review:refs/remotes/origin/staging-review
          git worktree add --detach "$STATUS_WORKTREE" refs/remotes/origin/staging-review
          trap 'git worktree remove --force "$STATUS_WORKTREE" >/dev/null 2>&1 || true' EXIT

          mkdir -p "$STATUS_WORKTREE/config/staging-review"
          cp staging-review-receipt/deployment-receipt.json \
            "$STATUS_WORKTREE/config/staging-review/deployment-receipt.json"

          git -C "$STATUS_WORKTREE" config user.name 'github-actions[bot]'
          git -C "$STATUS_WORKTREE" config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git -C "$STATUS_WORKTREE" add config/staging-review/deployment-receipt.json
          if git -C "$STATUS_WORKTREE" diff --cached --quiet; then
            echo 'Deployment receipt is unchanged.'
            exit 0
          fi
          git -C "$STATUS_WORKTREE" commit -m 'P5-02Q: record configured review deployment result'
          git -C "$STATUS_WORKTREE" push origin HEAD:staging-review

      - name: Enforce successful configured deployment
        if: always()
        env:
          CREDENTIALS_OUTCOME: ${{ steps.credentials.outcome }}
          CONFIG_OUTCOME: ${{ steps.suggest_config.outcome }}
          WORKER_OUTCOME: ${{ steps.worker_deploy.outcome }}
          SECRET_SYNC_OUTCOME: ${{ steps.pages_secrets.outcome }}
          DEPLOY_OUTCOME: ${{ steps.deploy.outcome }}
          VERIFY_OUTCOME: ${{ steps.configured_verify.outcome }}
        run: |
          test "$CREDENTIALS_OUTCOME" = 'success' || exit 1
          test "$CONFIG_OUTCOME" = 'success' || exit 1
          test "$WORKER_OUTCOME" = 'success' || exit 1
          test "$SECRET_SYNC_OUTCOME" = 'success' || exit 1
          test "$DEPLOY_OUTCOME" = 'success' || exit 1
          test "$VERIFY_OUTCOME" = 'success' || exit 1
