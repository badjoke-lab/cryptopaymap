name: P3-07C format artifact

on:
  push:
    branches:
      - work/p307c

permissions:
  contents: read

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Fix indexed primary row and format files
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/admin/CandidatePromotionEditor.tsx')
          text = path.read_text()
          old = "if (!next.some((row) => row.isPrimary)) next[0] = { ...next[0], isPrimary: true };"
          new = "const first = next[0];\n      if (!next.some((row) => row.isPrimary) && first !== undefined) {\n        next[0] = { ...first, isPrimary: true };\n      }"
          if old not in text:
              raise SystemExit('Expected primary-row statement was not found.')
          path.write_text(text.replace(old, new))
          PY
          npx biome format --write \
            src/admin/promotion/workspace.ts \
            src/components/admin/CandidatePromotionEditor.tsx \
            tests/candidate-promotion-api.test.ts \
            tests/candidate-promotion-workspace.test.ts
      - name: Upload formatted files
        uses: actions/upload-artifact@v4
        with:
          name: p307c-formatted-files
          path: |
            src/admin/promotion/workspace.ts
            src/components/admin/CandidatePromotionEditor.tsx
            tests/candidate-promotion-api.test.ts
            tests/candidate-promotion-workspace.test.ts
          if-no-files-found: error
          retention-days: 1
