name: P5-06E2 copy fix

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'p5-06e2-photo-parent-resolution-ui' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-06e2-photo-parent-resolution-ui
      - name: Fix singular pending copy
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/admin/PhotoParentResolutionPanel.tsx')
          content = path.read_text()
          old = "return `${preview.pendingCount} child Media decision${preview.pendingCount === 1 ? '' : 's'} remain pending. The parent cannot be resolved yet.`;"
          new = "return preview.pendingCount === 1\n      ? '1 child Media decision remains pending. The parent cannot be resolved yet.'\n      : `${preview.pendingCount} child Media decisions remain pending. The parent cannot be resolved yet.`;"
          if old not in content:
              raise SystemExit('pending copy insertion point was not found')
          path.write_text(content.replace(old, new))
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx biome format --write src/components/admin/PhotoParentResolutionPanel.tsx
      - name: Commit fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/admin/PhotoParentResolutionPanel.tsx
          git commit -m "P5-06E2 fix singular pending copy"
          git push origin HEAD:p5-06e2-photo-parent-resolution-ui
