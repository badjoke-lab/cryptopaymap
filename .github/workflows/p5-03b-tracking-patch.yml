name: Apply P5-03B tracking patch

on:
  push:
    branches:
      - p5-03b-report-private-intake

permissions:
  contents: write

jobs:
  update:
    if: ${{ !contains(github.event.head_commit.message, 'Advance tracking to P5-03B') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out P5-03B branch
        uses: actions/checkout@v4
        with:
          ref: p5-03b-report-private-intake

      - name: Update tracking documents
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');

          function update(path, transform) {
            const before = readFileSync(path, 'utf8');
            const after = transform(before);
            if (after === before) throw new Error(`No changes produced for ${path}`);
            writeFileSync(path, after);
          }

          function replaceRequired(text, pattern, replacement, label) {
            if (!pattern.test(text)) throw new Error(`Missing expected block: ${label}`);
            pattern.lastIndex = 0;
            return text.replace(pattern, replacement);
          }

          update('docs/PROJECT_STATUS.md', (input) => {
            let text = input;
            text = replaceRequired(
              text,
              /P5-03A — Payment and problem report contract and review-safe normalization/,
              'P5-03B — Idempotent payment and problem report private intake integration',
              'current implementation item',
            );
            text = replaceRequired(
              text,
              /- P5-03A payment\/problem report contract and review-safe normalization is in progress\./,
              '- P5-03A payment/problem report contract and review-safe normalization is complete through #194.\n- P5-03B idempotent payment/problem report private intake integration is in progress.',
              'repository state',
            );
            text = text.replace(
              '3. P5-03 — Payment and problem reports — In progress at P5-03A',
              '3. P5-03 — Payment and problem reports — In progress at P5-03B',
            );
            text = text.replace(
              'P5-03A  Payment/problem report contract and normalization                 In progress',
              'P5-03A  Payment/problem report contract and normalization                 Completed #194\nP5-03B  Idempotent payment/problem report private intake                   In progress',
            );
            text = replaceRequired(
              text,
              /## Current active scope — P5-03A report contract and normalization[\s\S]*?## Next\n\n[\s\S]*?\n\n## Blocked/,
              `## Current active scope — P5-03B report private intake integration\n\nP5-03B composes the strict P5-03A payment/problem report parser with the P5-01 private Submission service. It owns private original-payload persistence, review-safe normalized payload persistence, deterministic replay/conflict behavior, contact separation, and existing abuse-control ordering. It adds no public route, target lookup, reviewer decision, Evidence acceptance, priority change, temporary hiding, canonical mutation, export, or publication behavior.\n\n## Next\n\nComplete P5-03B private-intake service, focused integration tests, schema-check integration, and non-mutation proof. Then proceed to P5-03C canonical target snapshot and Claim-context signals.\n\n## Blocked`,
              'active scope and next',
            );
            text = text.replace(
              'No P5-03A blocker is known.',
              'No P5-03B blocker is known.',
            );
            return text;
          });

          update('docs/IMPLEMENTATION_PLAN.md', (input) => {
            let text = input;
            text = text.replace(
              '| P5-03 | Payment and problem reports | In progress at P5-03A | P5-01, P5-02 target conventions |',
              '| P5-03 | Payment and problem reports | In progress at P5-03B | P5-01, P5-02 target conventions |',
            );
            text = text.replace('**Status:** In progress at P5-03A', '**Status:** In progress at P5-03B');
            text = text.replace(
              'P5-03A — Payment/problem report contract and review-safe normalization     In progress',
              'P5-03A — Payment/problem report contract and review-safe normalization     Completed #194',
            );
            text = text.replace(
              'P5-03B — Idempotent private report intake integration                     Planned',
              'P5-03B — Idempotent private report intake integration                     In progress',
            );
            text = replaceRequired(
              text,
              /P5-03A owns only strict type-specific parsing and review-safe normalization\. It does not add public routes\/forms, target lookup, Evidence acceptance, recheck priority mutation, temporary hiding, canonical mutation, export, or publication\./,
              'P5-03A is complete through #194. P5-03B owns only private report persistence integration, deterministic replay/conflict behavior, contact separation, and abuse-control composition through the P5-01 service boundary. It does not add public routes/forms, target lookup, Evidence acceptance, recheck priority mutation, temporary hiding, canonical mutation, export, or publication.',
              'P5-03 current slice',
            );
            return text;
          });

          update('docs/PHASE5_IMPLEMENTATION_SEQUENCE.md', (input) => {
            let text = input;
            text = replaceRequired(
              text,
              /\*\*Status:\*\* Active — P5-03A in progress/,
              '**Status:** Active — P5-03B in progress',
              'Phase status',
            );
            text = text.replace(
              'P5-03A  Payment/problem report contract and normalization                 In progress',
              'P5-03A  Payment/problem report contract and normalization                 Completed #194\nP5-03B  Idempotent payment/problem report private intake                   In progress',
            );
            text = text.replace('**Status:** In progress at P5-03A', '**Status:** In progress at P5-03B');
            text = text.replace(
              'P5-03A — Payment/problem report contract and review-safe normalization     In progress',
              'P5-03A — Payment/problem report contract and review-safe normalization     Completed #194',
            );
            text = text.replace(
              'P5-03B — Idempotent private report intake integration                     Planned',
              'P5-03B — Idempotent private report intake integration                     In progress',
            );
            return text;
          });

          update('docs/P5_03A_REPORT_CONTRACT_AND_NORMALIZATION.md', (input) => {
            let text = input;
            text = text.replace('**Status:** Active', '**Status:** Completed through #194');
            text = replaceRequired(
              text,
              /## Next\n\nProceed to P5-03B/,
              '## Completion result\n\nP5-03A is complete through #194. Strict payment/problem report parsing, JSON-safe review normalization, privacy separation, focused tests, schema-check integration, and the bounded P5-03 sequence passed repository validation.\n\n## Next\n\nProceed to P5-03B',
              'P5-03A completion',
            );
            return text;
          });
          NODE

      - name: Commit tracking update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/PROJECT_STATUS.md docs/IMPLEMENTATION_PLAN.md docs/PHASE5_IMPLEMENTATION_SEQUENCE.md docs/P5_03A_REPORT_CONTRACT_AND_NORMALIZATION.md
          git commit -m 'Advance tracking to P5-03B'
          git push origin HEAD:p5-03b-report-private-intake
