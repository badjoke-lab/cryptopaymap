name: P5-06E final type fix

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'p5-06e-photo-parent-resolution' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-06e-photo-parent-resolution
      - name: Make test identifier lists fixed tuples
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/photo-parent-resolution.test.ts')
          content = path.read_text()
          content = content.replace(
              "const mediaIds = ['50000000-0000-4000-8000-000000000001', '50000000-0000-4000-8000-000000000002'];",
              "const mediaIds = ['50000000-0000-4000-8000-000000000001', '50000000-0000-4000-8000-000000000002'] as const;",
          )
          content = content.replace(
              "const decisionIds = [\n  '60000000-0000-4000-8000-000000000001',\n  '60000000-0000-4000-8000-000000000002',\n];",
              "const decisionIds = [\n  '60000000-0000-4000-8000-000000000001',\n  '60000000-0000-4000-8000-000000000002',\n] as const;",
          )
          path.write_text(content)
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx biome format --write tests/photo-parent-resolution.test.ts
      - name: Commit fix
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/photo-parent-resolution.test.ts
          git commit -m "P5-06E fix fixed test identifier types"
          git push origin HEAD:p5-06e-photo-parent-resolution
