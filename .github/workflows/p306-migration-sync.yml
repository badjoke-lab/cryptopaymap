name: P3-06 migration sync

on:
  push:
    branches:
      - work/p306
    paths:
      - .github/workflows/p306-migration-sync.yml

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p306

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Reset incomplete generated migration
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync, rmSync } from 'node:fs';
          const journalPath = 'drizzle/meta/_journal.json';
          const journal = JSON.parse(readFileSync(journalPath, 'utf8'));
          if (journal.entries.at(-1)?.tag === '0013_yummy_terror') journal.entries.pop();
          writeFileSync(journalPath, `${JSON.stringify(journal, null, 2)}\n`);
          rmSync('drizzle/0013_yummy_terror.sql', { force: true });
          rmSync('drizzle/meta/0013_snapshot.json', { force: true });
          NODE

      - name: Generate Drizzle migration
        run: npm run db:generate

      - name: Commit exact generated files through GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'work/p306';
            const paths = [
              'drizzle/0013_yummy_terror.sql',
              'drizzle/meta/0013_snapshot.json',
              'drizzle/meta/_journal.json',
            ];
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const parentSha = ref.data.object.sha;
            const parent = await github.rest.git.getCommit({ owner, repo, commit_sha: parentSha });
            const tree = [];
            for (const path of paths) {
              const blob = await github.rest.git.createBlob({
                owner,
                repo,
                content: fs.readFileSync(path, 'utf8'),
                encoding: 'utf-8',
              });
              tree.push({ path, mode: '100644', type: 'blob', sha: blob.data.sha });
            }
            const nextTree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: parent.data.tree.sha,
              tree,
            });
            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: 'P3-06A generate duplicate decision migration',
              tree: nextTree.data.sha,
              parents: [parentSha],
            });
            await github.rest.git.updateRef({
              owner,
              repo,
              ref: `heads/${branch}`,
              sha: commit.data.sha,
              force: false,
            });
