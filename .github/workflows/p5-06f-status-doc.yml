name: P5-06F status document

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize

permissions:
  contents: write

jobs:
  update:
    if: github.head_ref == 'p5-06f-status-handoff' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-06f-status-handoff
          fetch-depth: 0
      - name: Mark P5-06F complete
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/P5_06F_CROSS_SUBMISSION_INTEGRATION_AUDIT.md')
          source = path.read_text()
          old = '**Status:** Active — repository audit  '
          new = '**Status:** Completed in PR #241  '
          if old not in source:
              raise SystemExit('P5-06F status marker is missing')
          path.write_text(source.replace(old, new, 1))
          PY
      - name: Commit status document
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/P5_06F_CROSS_SUBMISSION_INTEGRATION_AUDIT.md
          git commit -m "P5-06F: mark integration audit complete"
          git push origin HEAD:p5-06f-status-handoff
