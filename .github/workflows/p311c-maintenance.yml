name: P3-11C maintenance

on:
  push:
    branches:
      - work/p311c
    paths:
      - .github/workflows/p311c-maintenance.yml

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p311c
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Connect workspace runtime checks and synchronize plan
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          package = Path('package.json')
          text = package.read_text()
          text = text.replace(
              'tsx scripts/check-export-release-contract.ts && tsx scripts/check-export-release-persistence.ts",',
              'tsx scripts/check-export-release-contract.ts && tsx scripts/check-export-release-persistence.ts && tsx scripts/check-export-release-workspace.ts",',
          )
          package.write_text(text)

          plan = Path('docs/IMPLEMENTATION_PLAN.md')
          text = plan.read_text()
          text = text.replace(
              '| P3-11 | Export controls and release workflow | Persistence active | P3-07 through P3-10 | #75 complete; #76 active |',
              '| P3-11 | Export controls and release workflow | Protected workspace active | P3-07 through P3-10 | #75–#76 complete; P3-11C active |',
          )
          text = text.replace(
              'P3-11A established the isolated `export:release` authorization, internally prepared eligible or blocked release candidates, exact snapshot and release-metadata guards, approve and reject decisions, validation issue capture, deterministic replay, and the durable backend contract in pull request #75.\n\n### Current P3-11 delivery',
              'P3-11A established the isolated `export:release` authorization, internally prepared eligible or blocked release candidates, exact snapshot and release-metadata guards, approve and reject decisions, validation issue capture, deterministic replay, and the durable backend contract in pull request #75.\n\nP3-11B added durable `export_release_decisions` receipts, generated migration `0018_clumsy_drax.sql`, request replay, approved snapshot and dataset-version uniqueness, candidate and action constraints, and database conflict classification in pull request #76.\n\n### Current P3-11 delivery',
          )
          text = text.replace(
              'P3-11B adds durable `export_release_decisions` receipts, generated migration `0018_clumsy_drax.sql`, request replay, approved snapshot and dataset-version uniqueness, candidate and action constraints, and database conflict classification.',
              'P3-11C adds the private R2 candidate source, server-side revalidation, bounded release history, exact artifact detail, protected queue and detail GET endpoints, and the idempotent approve or reject POST endpoint.',
          )
          text = text.replace('- protected export queue and detail workspace\n', '')
          plan.write_text(text)
          PY
      - name: Format repository
        run: npm run format
      - name: Commit final delivery and remove workflow
        shell: bash
        run: |
          git rm .github/workflows/p311c-maintenance.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs functions package.json scripts src tests
          git commit -m "P3-11C: finalize protected export release workspace"
          git push origin HEAD:work/p311c
