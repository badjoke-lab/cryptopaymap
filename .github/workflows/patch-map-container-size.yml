name: Patch map container size

on:
  push:
    branches:
      - work/map-container-sizing-fix

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/map-container-sizing-fix
          fetch-depth: 0
      - name: Patch map container sizing
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/places/PlacesMap.tsx')
          text = path.read_text()
          old = '<div ref={containerRef} className="absolute inset-0" />'
          new = '<div ref={containerRef} className="h-full w-full" />'
          if old not in text:
              raise SystemExit('expected map container class not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/places/PlacesMap.tsx
          git commit -m "Fix MapLibre container height"
          git push origin HEAD:work/map-container-sizing-fix
