name: Finalize P5-02R tracking details

on:
  push:
    branches:
      - tracking/close-p5-02r-handoff

permissions:
  contents: write

jobs:
  update:
    if: ${{ !contains(github.event.head_commit.message, 'Finalize P5-02R tracking') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out tracking branch
        uses: actions/checkout@v4
        with:
          ref: tracking/close-p5-02r-handoff

      - name: Finalize tracking details
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');

          function replaceRequired(path, pattern, replacement, label) {
            const before = readFileSync(path, 'utf8');
            if (!pattern.test(before)) throw new Error(`Missing expected block: ${label}`);
            pattern.lastIndex = 0;
            writeFileSync(path, before.replace(pattern, replacement));
          }

          replaceRequired(
            'docs/PROJECT_STATUS.md',
            /The successful P5-02Q deployment receipt for main commit:\n\n`513dc7f543ac27fe512319a3cc24cc16c3de4302`\n\nrecords `status: deployed` and success for credentials, configured inputs, Durable Object Worker deployment, Pages secret synchronization, Pages deployment, and configured verification\./,
            'The current fixed-review deployment receipt for main commit:\n\n`699cff048fa80113d3b05bcdf4f385c229a4d41d`\n\nrecords `status: deployed` and success for credentials, configured inputs, Durable Object Worker deployment, Pages secret synchronization, Pages deployment, and configured verification. The bounded P5-02R live-audit receipt for the same commit records `status: complete`.',
            'current fixed-review receipt',
          );

          replaceRequired(
            'docs/PROJECT_STATUS.md',
            /Before P5-02 implementation or review, read:/,
            'Before P5-03 implementation or review, read:',
            'current required-reference wording',
          );

          replaceRequired(
            'docs/PHASE5_IMPLEMENTATION_SEQUENCE.md',
            /## P5-03 — Payment and problem reports\n\n### Goal/,
            '## P5-03 — Payment and problem reports\n\n**Status:** Ready to begin\n\n### Goal',
            'P5-03 status',
          );
          NODE

      - name: Commit final tracking details
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/PROJECT_STATUS.md docs/PHASE5_IMPLEMENTATION_SEQUENCE.md
          git commit -m 'Finalize P5-02R tracking details'
          git push origin HEAD:tracking/close-p5-02r-handoff
