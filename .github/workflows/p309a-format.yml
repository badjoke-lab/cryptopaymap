name: P3-09A finalize formatting

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Synchronize branch
        run: git pull --rebase origin "${GITHUB_HEAD_REF}"
      - name: Apply Biome formatting
        run: |
          npx biome format --write \
            src/admin/reconfirmation/queue.ts \
            src/admin/reconfirmation/expiration.ts \
            src/admin/reconfirmation/in-memory-backend.ts \
            tests/reconfirmation-contract.test.ts \
            scripts/check-reconfirmation-contract.ts
      - name: Remove one-time workflow
        run: rm .github/workflows/p309a-format.yml
      - name: Commit formatted files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P3-09A: finalize reconfirmation formatting"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
