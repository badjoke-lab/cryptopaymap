name: Guard bounds read

on:
  push:
    branches:
      - work/bounded-viewport-results

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/bounded-viewport-results
          fetch-depth: 0
      - name: Guard bounds read
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/components/places/PlacesMap.tsx')
          text = path.read_text()
          old = '''          if (mapViewportChanged(committedViewportRef.current, nextViewport)) {
            const visibleBounds = map.getBounds();
            viewportRef.current(nextViewport);
            boundsRef.current?.(
              normalizeMapBounds({
                west: visibleBounds.getWest(),
                south: visibleBounds.getSouth(),
                east: visibleBounds.getEast(),
                north: visibleBounds.getNorth(),
              }),
            );
          }'''
          new = '''          if (mapViewportChanged(committedViewportRef.current, nextViewport)) {
            viewportRef.current(nextViewport);
            if (boundsRef.current) {
              const visibleBounds = map.getBounds();
              boundsRef.current(
                normalizeMapBounds({
                  west: visibleBounds.getWest(),
                  south: visibleBounds.getSouth(),
                  east: visibleBounds.getEast(),
                  north: visibleBounds.getNorth(),
                }),
              );
            }
          }'''
          if old not in text:
              raise SystemExit('expected moveend block not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit source patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/places/PlacesMap.tsx
          git commit -m "P4-06B: guard optional bounds reads"
          git push origin HEAD:work/bounded-viewport-results
