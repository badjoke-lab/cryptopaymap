name: P5-06F audit fix

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'p5-06f-cross-submission-integration-audit' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-06f-cross-submission-integration-audit
          fetch-depth: 0
      - name: Fix audit typing and Claim replay evidence
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/check-p5-06-cross-submission-audit.ts')
          source = path.read_text()
          import_line = "import { readFileSync } from 'node:fs';"
          replacement = "// @ts-expect-error Node built-ins are available to the tsx schema-check runtime.\n" + import_line
          if '@ts-expect-error Node built-ins' not in source:
              if import_line not in source:
                  raise SystemExit('node:fs import marker is missing')
              source = source.replace(import_line, replacement, 1)
          old = "['replays an identical transition', 'idempotency_conflict']"
          new = "['replays an identical transition', 'changed replay content', \"code: 'invalid_request'\"]"
          if old not in source:
              raise SystemExit('Claim replay marker is missing')
          source = source.replace(old, new, 1)
          path.write_text(source)
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx biome format --write scripts/check-p5-06-cross-submission-audit.ts
      - name: Commit fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/check-p5-06-cross-submission-audit.ts
          git commit -m "P5-06F: fix audit typing and Claim evidence"
          git push origin HEAD:p5-06f-cross-submission-integration-audit
