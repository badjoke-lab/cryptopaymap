name: MapLibre lockfile generation

on:
  push:
    branches:
      - work/maplibre-renderer

permissions:
  contents: write

jobs:
  generate-lockfile:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out renderer branch
        uses: actions/checkout@v4
        with:
          ref: work/maplibre-renderer
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Generate MapLibre dependency lockfile
        run: npm install maplibre-gl@5.24.0 --save-exact --package-lock-only --ignore-scripts

      - name: Commit generated dependency files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "P4-03B: add MapLibre renderer dependency"
          git push origin HEAD:work/maplibre-renderer
