name: P3-10F maintenance

on:
  push:
    branches:
      - work/p310f
    paths:
      - .github/workflows/p310f-maintenance.yml

permissions:
  contents: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p310f
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Connect exact UI action contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/components/admin/MediaReviewDetail.tsx')
          text = path.read_text()
          text = text.replace(
              "import type { MediaReviewAction } from '../../admin/media-review/decision';\n",
              "import type { MediaReviewAction } from '../../admin/media-review/decision';\nimport { availableMediaReviewActions } from '../../admin/media-review/ui-actions';\n",
          )
          block = """function availableActions(detail: MediaReviewDetailResponse): MediaReviewAction[] {
  const media = detail.media;
  if (media.reviewStatus === 'pending') {
    return ['evidence', 'owner_verification'].includes(media.purpose)
      ? ['approve_private', 'reject']
      : ['approve_public', 'reject'];
  }
  if (
    media.reviewStatus === 'accepted' &&
    ['public_gallery', 'canonical_logo'].includes(media.purpose)
  ) {
    if (media.visibility === 'public') return ['restrict', 'supersede'];
    if (media.visibility === 'restricted') return ['supersede'];
  }
  return [];
}

"""
          if block not in text:
            raise SystemExit('Expected local Media action block was not found.')
          text = text.replace(block, '')
          text = text.replace(
              'const actions = useMemo(() => availableActions(detail), [detail]);',
              'const actions = useMemo(() => availableMediaReviewActions(detail.media), [detail.media]);',
          )
          path.write_text(text)
          PY
      - name: Format repository
        run: npm run format
      - name: Commit integration wiring and remove workflow
        shell: bash
        run: |
          git rm .github/workflows/p310f-maintenance.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs package.json scripts src tests
          git commit -m "P3-10F: connect final Media integration contract"
          git push origin HEAD:work/p310f
