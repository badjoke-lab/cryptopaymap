name: Tighten P5-03C target identity

on:
  push:
    branches:
      - p5-03c-report-target-context

permissions:
  contents: write

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, 'Tighten report target identity') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-03c-report-target-context
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Patch identity validation and coverage
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');

          function replaceRequired(path, pattern, replacement, label) {
            const before = readFileSync(path, 'utf8');
            if (!pattern.test(before)) throw new Error(`Missing expected block: ${label}`);
            pattern.lastIndex = 0;
            writeFileSync(path, before.replace(pattern, replacement));
          }

          replaceRequired(
            'src/submissions/report-target-context.ts',
            /if \(material\.targetType === 'entity'\) \{[\s\S]*?if \(material\.targetType === 'location'\) \{/,
            `if (material.targetType === 'entity') {\n      if (\n        material.targetId !== material.entity.id ||\n        material.location !== null ||\n        material.selectedClaimId !== null\n      ) {\n        context.addIssue({\n          code: 'custom',\n          message: 'Entity target identity does not match the returned material.',\n        });\n      }\n    }\n    if (material.targetType === 'location') {`,
            'entity identity block',
          );

          replaceRequired(
            'src/submissions/report-target-context.ts',
            /if \(material\.targetType === 'claim'\) \{[\s\S]*?\n    \}\n  \}\);\n\nexport const reportTargetContextSignalReasonValues/,
            `if (material.targetType === 'claim') {\n      const selectedClaim = material.claims.find(\n        (claim) => claim.id === material.selectedClaimId,\n      );\n      const selectedLocationMatches =\n        selectedClaim !== undefined &&\n        (selectedClaim.locationId === null\n          ? material.location === null\n          : material.location !== null && material.location.id === selectedClaim.locationId);\n      if (\n        material.selectedClaimId !== material.targetId ||\n        selectedClaim === undefined ||\n        !selectedLocationMatches\n      ) {\n        context.addIssue({\n          code: 'custom',\n          message: 'Claim target identity does not match the returned Claim set.',\n        });\n      }\n    }\n  });\n\nexport const reportTargetContextSignalReasonValues`,
            'claim identity block',
          );

          const testPath = 'tests/report-target-context.test.ts';
          const before = readFileSync(testPath, 'utf8');
          const anchor = `    const wrongOwner = locationMaterial({\n      claims: [claim(claimId, { entityId: otherClaimId })],\n    });`;
          if (!before.includes(anchor)) throw new Error('Missing identity-test anchor.');
          const addition = `    const ambiguousEntity: ReportCanonicalTargetMaterial = {\n      ...locationMaterial(),\n      targetType: 'entity',\n      targetId: entityId,\n      selectedClaimId: null,\n    };\n    await expect(\n      generateReportTargetContext(\n        paymentReport('entity', entityId),\n        backend(ambiguousEntity),\n        generatedAt,\n      ),\n    ).rejects.toMatchObject({ code: 'invalid_response' });\n\n    const brandClaimWithLocation: ReportCanonicalTargetMaterial = {\n      ...locationMaterial({\n        claims: [\n          claim(claimId, {\n            locationId: null,\n            claimScope: 'brand_global',\n          }),\n        ],\n      }),\n      targetType: 'claim',\n      targetId: claimId,\n      selectedClaimId: claimId,\n    };\n    await expect(\n      generateReportTargetContext(\n        problemReport('claim', claimId),\n        backend(brandClaimWithLocation),\n        generatedAt,\n      ),\n    ).rejects.toMatchObject({ code: 'invalid_response' });\n\n${anchor}`;
          writeFileSync(testPath, before.replace(anchor, addition));
          NODE
      - run: npm ci
      - run: npm run format
      - name: Commit identity fix
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/submissions/report-target-context.ts tests/report-target-context.test.ts
          git commit -m 'Tighten report target identity'
          git push origin HEAD:p5-03c-report-target-context
