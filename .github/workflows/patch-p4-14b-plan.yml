name: Patch P4-14B implementation status

on:
  push:
    branches:
      - work/public-legal-sustainability-pages

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/public-legal-sustainability-pages
          fetch-depth: 0
      - name: Patch Phase 4 table
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/IMPLEMENTATION_PLAN.md')
          text = path.read_text()
          old = '| P4-14 | Trust, data, legal, and sustainability pages | In progress | public specifications | #117 |'
          new = '| P4-14 | Trust, data, legal, and sustainability pages | In progress | public specifications | #117, #118 |'
          if old not in text:
              raise SystemExit('Expected P4-14 plan row not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Commit plan status
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/IMPLEMENTATION_PLAN.md
          git commit -m "P4-14B: record legal surface pull request"
          git push origin HEAD:work/public-legal-sustainability-pages
