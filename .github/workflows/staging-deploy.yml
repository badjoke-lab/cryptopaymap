name: Deploy staging

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cryptopaymap-staging
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run full quality gate
        run: npm run quality

      - name: Upload deployable artifact
        uses: actions/upload-artifact@v4
        with:
          name: cryptopaymap-staging-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 14

      - name: Deploy Cloudflare Pages staging
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          npx wrangler pages deploy dist
          --project-name cryptopaymap-staging
          --branch staging
          --commit-hash "${GITHUB_SHA}"
          --commit-message "Manual staging deployment ${GITHUB_SHA}"
