name: Prepare P5-03F branch

on:
  push:
    branches:
      - p5-03f-negative-evidence-recheck

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-03f-negative-evidence-recheck
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Synchronize validation and tracking
        run: |
          python <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'missing expected text in {path}: {old!r}')
              file.write_text(text.replace(old, new))

          replace(
              'package.json',
              'tsx scripts/check-positive-payment-evidence.ts && tsx scripts/check-suggest-private-intake.ts',
              'tsx scripts/check-positive-payment-evidence.ts && tsx scripts/check-negative-report-evidence.ts && tsx scripts/check-suggest-private-intake.ts',
          )

          replace(
              'docs/PROJECT_STATUS.md',
              'P5-03E — Positive payment Evidence and reconfirmation decision boundary',
              'P5-03F — Negative Evidence and priority-recheck decision boundary',
          )
          replace(
              'docs/PROJECT_STATUS.md',
              '- P5-03E positive payment Evidence and reconfirmation decision boundary is in progress.',
              '- P5-03E positive payment Evidence and reconfirmation decision boundary is complete through #198.\n- P5-03F negative Evidence and priority-recheck decision boundary is in progress.',
          )
          replace(
              'docs/PROJECT_STATUS.md',
              '3. P5-03 — Payment and problem reports — In progress at P5-03E',
              '3. P5-03 — Payment and problem reports — In progress at P5-03F',
          )
          replace(
              'docs/PROJECT_STATUS.md',
              'P5-03E  Positive payment Evidence and reconfirmation decision             In progress',
              'P5-03E  Positive payment Evidence and reconfirmation decision             Completed #198\nP5-03F  Negative Evidence and priority-recheck decision                   In progress',
          )
          replace(
              'docs/PROJECT_STATUS.md',
              '34. `docs/P5_03E_POSITIVE_PAYMENT_EVIDENCE.md`;\n35. `docs/P4_18_E_LIVE_REVIEW_AND_HANDOFF_AUDIT.md`.',
              '34. `docs/P5_03E_POSITIVE_PAYMENT_EVIDENCE.md`;\n35. `docs/P5_03F_NEGATIVE_EVIDENCE_AND_RECHECK_PRIORITY.md`;\n36. `docs/P4_18_E_LIVE_REVIEW_AND_HANDOFF_AUDIT.md`.',
          )
          replace(
              'docs/PROJECT_STATUS.md',
              '## Current active scope — P5-03E positive payment Evidence\n\nP5-03E adds a separately authorized, idempotent, atomic decision for a reviewed successful payment report to become accepted private or restricted supporting Evidence. Evidence-only acceptance resolves the Submission without changing the Claim. Reconfirmation is limited to Class A restricted payment proof with an exact current Claim payment match, a separate publication-safe summary, and a future next-review time.\n\nA single Class B user report can become private or restricted supporting Evidence but cannot reconfirm a Claim. Restricted transaction URLs remain private and are retained only on restricted Evidence linked back to the Submission. Evidence summaries and public Verification summaries are separate.\n\nRepository implementation and GitHub validation proceed without Cloudflare or Neon operator actions. Configured Access, deployed Functions, atomic live Neon execution, and integrated audit remain assigned to P5-03I.\n\n## Next\n\nComplete P5-03E authorization, request and event contracts, atomic Evidence and optional reconfirmation persistence, idempotent replay, protected API, focused tests, schema validation, and tracking. Then proceed to P5-03F negative Evidence and priority-recheck decision boundary.\n\n## Blocked\n\nNo repository blocker to P5-03E is known. Configured Cloudflare/Neon execution is intentionally deferred to P5-03I; retained Launch work remains unchanged and launch readiness is not claimed.',
              '## Current active scope — P5-03F negative Evidence and recheck priority\n\nP5-03F adds a separately authorized, idempotent, atomic decision for reviewed failed-payment and no-longer-accepts reports to become accepted private or restricted contradicting Evidence. Reviewers may also create a durable recheck-priority signal without changing Claim status, visibility, canonical fields, publication, or `nextReviewAt`.\n\nThe protected reconfirmation queue derives priority from accepted contradicting Evidence plus its durable Submission decision event. A later Verification Event resolves the priority signal without deleting Evidence or rewriting history.\n\nRepository implementation and GitHub validation proceed without Cloudflare or Neon operator actions. Configured Access, deployed Functions, live Neon execution, and integrated audit remain assigned to P5-03I.\n\n## Next\n\nComplete P5-03F authorization, request and event contracts, atomic negative Evidence persistence, recheck-priority integration, idempotent replay, protected API, focused tests, schema validation, and tracking. Then proceed to P5-03G correction and urgent visibility decision boundaries.\n\n## Blocked\n\nNo repository blocker to P5-03F is known. Configured Cloudflare/Neon execution is intentionally deferred to P5-03I; retained Launch work remains unchanged and launch readiness is not claimed.',
          )

          replace('docs/IMPLEMENTATION_PLAN.md', '**Status:** In progress at P5-03E', '**Status:** In progress at P5-03F')
          replace(
              'docs/IMPLEMENTATION_PLAN.md',
              'P5-03E — Positive payment Evidence and reconfirmation decision boundary   In progress\n    ↓\nP5-03F — Negative Evidence and priority-recheck decision boundary         Planned',
              'P5-03E — Positive payment Evidence and reconfirmation decision boundary   Completed #198\n    ↓\nP5-03F — Negative Evidence and priority-recheck decision boundary         In progress',
          )
          replace(
              'docs/IMPLEMENTATION_PLAN.md',
              'P5-03A is complete through #194, P5-03B through #195, P5-03C through #196, and P5-03D through #197. P5-03E owns the separately authorized, idempotent, atomic positive-payment Evidence decision. Evidence-only acceptance leaves the Claim unchanged. Reconfirmation requires Class A restricted payment proof, exact current Claim payment context, a separate publication-safe summary, and a future next-review time. A single Class B report cannot reconfirm a Claim. Configured Cloudflare Access and live Neon execution remain deferred to P5-03I.',
              'P5-03A is complete through #194, P5-03B through #195, P5-03C through #196, P5-03D through #197, and P5-03E through #198. P5-03F owns the separately authorized, idempotent, atomic negative-Evidence decision and the non-mutating recheck-priority signal derived by the protected reconfirmation queue. It accepts only failed payment reports or `payment_failed` / `no_longer_accepts_crypto` problem reports, creates no public Evidence, and does not change Claim status, visibility, `nextReviewAt`, canonical fields, export, or publication. Configured Cloudflare Access and live Neon execution remain deferred to P5-03I.',
          )

          replace('docs/PHASE5_IMPLEMENTATION_SEQUENCE.md', '**Status:** Active — P5-03E in progress', '**Status:** Active — P5-03F in progress')
          replace('docs/PHASE5_IMPLEMENTATION_SEQUENCE.md', '**Status:** In progress at P5-03E', '**Status:** In progress at P5-03F')
          replace(
              'docs/PHASE5_IMPLEMENTATION_SEQUENCE.md',
              'P5-03E — Positive payment Evidence and reconfirmation decision boundary   In progress\n    ↓\nP5-03F — Negative Evidence and priority-recheck decision boundary         Planned',
              'P5-03E — Positive payment Evidence and reconfirmation decision boundary   Completed #198\n    ↓\nP5-03F — Negative Evidence and priority-recheck decision boundary         In progress',
          )
          replace(
              'docs/PHASE5_IMPLEMENTATION_SEQUENCE.md',
              'P5-03E  Positive payment Evidence and reconfirmation decision              In progress\nP5-03   Payment and problem reports                                     In progress',
              'P5-03E  Positive payment Evidence and reconfirmation decision              Completed #198\nP5-03F  Negative Evidence and priority-recheck decision                   In progress\nP5-03   Payment and problem reports                                     In progress',
          )
          PY
      - run: npm run format
      - run: git rm .github/workflows/p5-03f-prepare.yml
      - name: Commit prepared branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m 'P5-03F: finalize negative Evidence slice'
          git push origin HEAD:p5-03f-negative-evidence-recheck
