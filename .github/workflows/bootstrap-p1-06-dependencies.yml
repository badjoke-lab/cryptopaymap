name: Bootstrap P1-06 dependencies

on:
  push:
    branches:
      - feat/p1-06-schema-migrations

permissions:
  contents: write

jobs:
  dependencies:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/p1-06-schema-migrations

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0

      - name: Install runtime dependencies
        run: npm install --save-exact --no-audit --no-fund zod@latest drizzle-orm@latest @neondatabase/serverless@latest

      - name: Install development dependencies
        run: npm install --save-dev --save-exact --no-audit --no-fund drizzle-kit@latest tsx@latest

      - name: Commit dependency graph
        run: |
          if git diff --quiet -- package.json package-lock.json; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json package-lock.json
          git commit -m "P1-06: pin schema and migration dependencies"
          git push origin HEAD:feat/p1-06-schema-migrations
