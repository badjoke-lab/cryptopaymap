name: P3-07E format backend

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Format backend
        run: npx biome format --write src/admin/promotion/drizzle-existing-target-link-backend.ts
      - name: Commit formatter output
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'P3-07E: apply formatter output'
          file_pattern: 'src/admin/promotion/drizzle-existing-target-link-backend.ts'
