name: P5-05H focused lint fix

on:
  push:
    branches:
      - p5-05h-browser-photos-direct-upload

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-05h-browser-photos-direct-upload
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply exact P5-05H lint fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          form = Path('src/components/submissions/PhotoForm.tsx')
          text = form.read_text()
          text = text.replace(
              "  type PhotoBrowserMediaValues,\n  type PhotoUploadedReservation,",
              "  type PhotoBrowserMediaValues,\n  type PhotoSubmissionIntake,\n  type PhotoUploadAuthorization,\n  type PhotoUploadedReservation,",
          )
          text = text.replace(
              "  return {\n    file,\n    role: 'gallery',",
              "  return {\n    browserId: crypto.randomUUID(),\n    file,\n    role: 'gallery',",
          )
          text = text.replace('    let authorization;\n', '    let authorization: PhotoUploadAuthorization;\n')
          text = text.replace('    let submission;\n', '    let submission: PhotoSubmissionIntake;\n')
          text = text.replace('key={`${item.file.name}-${index}`}', 'key={item.browserId}')
          form.write_text(text)

          contract = Path('src/submissions/photo-browser-contract.ts')
          text = contract.read_text()
          text = text.replace(
              'export interface PhotoBrowserMediaValues {\n  file: PhotoBrowserFile;',
              'export interface PhotoBrowserMediaValues {\n  browserId: string;\n  file: PhotoBrowserFile;',
          )
          contract.write_text(text)

          tests = Path('tests/photo-browser-contract.test.ts')
          text = tests.read_text()
          text = text.replace(
              "    {\n      file: { name: 'shop.jpg', type: 'image/jpeg', size: 1_024 },",
              "    {\n      browserId: 'browser-photo-1',\n      file: { name: 'shop.jpg', type: 'image/jpeg', size: 1_024 },",
          )
          tests.write_text(text)
          PY
          npm run format
      - name: Commit focused fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/submissions/PhotoForm.tsx src/submissions/photo-browser-contract.ts tests/photo-browser-contract.test.ts
          git commit -m "P5-05H fix Photos browser lint errors"
          git push origin HEAD:p5-05h-browser-photos-direct-upload
