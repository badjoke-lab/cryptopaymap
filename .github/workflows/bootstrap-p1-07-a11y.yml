name: Bootstrap P1-07 accessibility fixes

on:
  push:
    branches:
      - feat/p1-07-quality

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feat/p1-07-quality

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply semantic corrections
        run: |
          node <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';

          const statePath = 'src/components/StateBoundaryDemo.tsx';
          let state = readFileSync(statePath, 'utf8');
          state = state.replace(
            '<div className="grid grid-cols-2 gap-3" role="group" aria-label="View mode">',
            '<fieldset className="grid grid-cols-2 gap-3">\n              <legend className="sr-only">View mode</legend>',
          );
          state = state.replace(
            '                List\n              </Button>\n            </div>\n\n            <div className="rounded-control',
            '                List\n              </Button>\n            </fieldset>\n\n            <div className="rounded-control',
          );
          writeFileSync(statePath, state);

          const uiPath = 'src/components/UIFoundationDemo.tsx';
          let ui = readFileSync(uiPath, 'utf8');
          ui = ui.replace(
            '              aria-label="Loading example"\n            >',
            '              role="status"\n              aria-label="Loading example"\n            >',
          );
          writeFileSync(uiPath, ui);
          NODE

      - name: Format corrected files
        run: npm run format

      - name: Commit corrections
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/components/StateBoundaryDemo.tsx src/components/UIFoundationDemo.tsx
          git commit -m "P1-07: fix semantic test surfaces"
          git push origin HEAD:feat/p1-07-quality
