name: P201

on:
  pull_request:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npm run db:generate
      - uses: actions/upload-artifact@v4
        with:
          name: p201-drizzle
          path: drizzle
