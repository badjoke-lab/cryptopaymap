name: Migration drift

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Generate database files
        run: npm run db:generate
      - name: Check committed database files
        run: git diff --exit-code -- drizzle
      - name: Save generated database files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: generated-database-files
          path: drizzle
          retention-days: 1
