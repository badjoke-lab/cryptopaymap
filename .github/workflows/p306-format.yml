name: P3-06 branch format

on:
  push:
    branches:
      - work/p306

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p306

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Apply Biome formatting
        run: npm run format

      - name: Commit formatting through GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const { execFileSync } = require('node:child_process');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'work/p306';
            const paths = execFileSync('git', ['diff', '--name-only', '--diff-filter=AM'], {
              encoding: 'utf8',
            })
              .trim()
              .split('\n')
              .filter(Boolean);
            if (paths.length === 0) {
              core.info('No formatting changes to commit.');
              return;
            }
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const parentSha = ref.data.object.sha;
            const parent = await github.rest.git.getCommit({ owner, repo, commit_sha: parentSha });
            const tree = [];
            for (const path of paths) {
              const blob = await github.rest.git.createBlob({
                owner,
                repo,
                content: fs.readFileSync(path, 'utf8'),
                encoding: 'utf-8',
              });
              tree.push({ path, mode: '100644', type: 'blob', sha: blob.data.sha });
            }
            const nextTree = await github.rest.git.createTree({
              owner,
              repo,
              base_tree: parent.data.tree.sha,
              tree,
            });
            const commit = await github.rest.git.createCommit({
              owner,
              repo,
              message: 'P3-06A apply Biome formatting',
              tree: nextTree.data.sha,
              parents: [parentSha],
            });
            await github.rest.git.updateRef({
              owner,
              repo,
              ref: `heads/${branch}`,
              sha: commit.data.sha,
              force: false,
            });
