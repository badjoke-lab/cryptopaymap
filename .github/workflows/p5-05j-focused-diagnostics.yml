name: P5-05J focused diagnostics

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Capture focused diagnostics
        shell: bash
        run: |
          set +e
          npx biome format --max-diagnostics=200 src/submissions/cloudflare-images-photo-processor.ts src/submissions/photo-post-intake-object-validation.ts > p5-05j-format.log 2>&1
          echo "$?" > p5-05j-format.exit
          npx biome lint --max-diagnostics=200 src/submissions/cloudflare-images-photo-processor.ts src/submissions/photo-post-intake-object-validation.ts > p5-05j-lint.log 2>&1
          echo "$?" > p5-05j-lint.exit
          npm run check > p5-05j-check.log 2>&1
          echo "$?" > p5-05j-check.exit
          exit 0
      - name: Upload focused diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: p5-05j-focused-diagnostics
          path: p5-05j-*.log
          if-no-files-found: error
