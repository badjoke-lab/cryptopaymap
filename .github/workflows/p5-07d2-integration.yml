name: P5-07D2 integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07d2-negative-recheck-application' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07d2-negative-recheck-application
          fetch-depth: 0
      - name: Fix non-null decision payload type
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/admin/submissions/negative-recheck-application.ts')
          content = path.read_text()
          content = content.replace(
              "import { parseNegativeReportEvidenceEvent } from '../../submissions/negative-report-evidence-contract';",
              "import {\n  parseNegativeReportEvidenceEvent,\n  type NegativeReportEvidenceEvent,\n} from '../../submissions/negative-report-evidence-contract';",
              1,
          )
          content = content.replace(
              "): ReturnType<typeof parseNegativeReportEvidenceEvent> {",
              "): NegativeReportEvidenceEvent {",
              1,
          )
          path.write_text(content)
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format and lint corrected service
        run: npx biome check --write src/admin/submissions/negative-recheck-application.ts
      - name: Validate TypeScript, runtime contracts, and focused tests
        run: |
          npm run check
          npm run schema:check
          npx vitest run \
            tests/negative-recheck-application.test.ts \
            tests/negative-recheck-application-api.test.ts \
            tests/negative-report-evidence.test.ts \
            tests/submission-application-registration.test.ts \
            tests/submission-application-lifecycle.test.ts
      - name: Commit correction
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add src/admin/submissions/negative-recheck-application.ts
          if ! git diff --cached --quiet; then
            git commit -m "P5-07D2: narrow priority decision event type"
            git push origin HEAD:p5-07d2-negative-recheck-application
          fi
