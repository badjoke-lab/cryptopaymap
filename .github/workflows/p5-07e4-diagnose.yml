name: P5-07E4 diagnose

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'p5-07e4-business-claim-payment-application'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format
      - name: Capture Astro and TypeScript diagnostics
        shell: bash
        run: npm run check > e4-check.log 2>&1 || true
      - uses: actions/upload-artifact@v4
        with:
          name: p5-07e4-type-diagnostics
          path: e4-check.log
          retention-days: 1
