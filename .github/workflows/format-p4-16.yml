name: Format P4-16 files

on:
  push:
    branches:
      - work/p4-16-staging-acceptance

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/p4-16-staging-acceptance
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx biome format --write scripts/materialize-staging-review-data.mjs scripts/check-staging-review-artifact.mjs docs/PROJECT_STATUS.md docs/IMPLEMENTATION_PLAN.md
      - name: Commit formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/materialize-staging-review-data.mjs scripts/check-staging-review-artifact.mjs docs/PROJECT_STATUS.md docs/IMPLEMENTATION_PLAN.md
          git diff --cached --quiet && exit 0
          git commit -m "P4-16A: format staging acceptance files"
          git push origin HEAD:work/p4-16-staging-acceptance
