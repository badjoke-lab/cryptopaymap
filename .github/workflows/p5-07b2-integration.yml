name: P5-07B2 integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07b2-application-lifecycle' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07b2-application-lifecycle
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Format P5-07B2 files
        run: |
          npx biome format --write \
            package.json \
            src/admin/submissions/application-lifecycle.ts \
            src/admin/submissions/application-lifecycle-authorization.ts \
            src/admin/submissions/drizzle-application-lifecycle-backend.ts \
            'functions/admin/api/application-lifecycle/[applicationId].ts' \
            tests/submission-application-lifecycle.test.ts \
            tests/submission-application-lifecycle-api.test.ts \
            scripts/check-submission-application-lifecycle.ts \
            docs/P5_07B2_APPLICATION_LIFECYCLE.md
      - name: Commit formatting
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json src functions tests scripts docs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "P5-07B2: format application lifecycle boundary"
          git push origin HEAD:p5-07b2-application-lifecycle
