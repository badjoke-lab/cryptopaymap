name: Patch Home validation

on:
  push:
    branches:
      - work/public-home

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/public-home
          fetch-depth: 0
      - name: Apply bounded validation fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          home = Path('src/public/home.ts')
          text = home.read_text()
          old = """import {
            buildOnlineServiceDetailModel,
            type PublicOnlineService,
          } from './online-services';"""
          new = "import { buildOnlineServiceDetailModel, type PublicOnlineService } from './online-services';"
          if old not in text:
              raise SystemExit('expected Home import block not found')
          home.write_text(text.replace(old, new, 1))

          test = Path('tests/home-model.test.ts')
          text = test.read_text()
          text = text.replace('} as PublicPlace;', '} as unknown as PublicPlace;', 1)
          text = text.replace('} as PublicOnlineService;', '} as unknown as PublicOnlineService;', 1)
          test.write_text(text)
          PY
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/public/home.ts tests/home-model.test.ts
          git commit -m "P4-10A: fix Home validation boundaries"
          git push origin HEAD:work/public-home
