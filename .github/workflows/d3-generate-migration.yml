name: D3 generate Evidence migration

on:
  push:
    branches:
      - p4-18d3-guards-retry-integration

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out D3 branch
        uses: actions/checkout@v4
        with:
          ref: p4-18d3-guards-retry-integration
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Generate Drizzle migration
        run: npm run db:generate

      - name: Apply repository formatter
        run: npm run format

      - name: Remove temporary workflow
        run: rm -f .github/workflows/d3-generate-migration.yml

      - name: Commit generated migration and formatting
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "db: add Evidence decision Claim Asset set migration"
          git push origin HEAD:p4-18d3-guards-retry-integration
