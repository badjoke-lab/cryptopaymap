name: P5-07E3 integrate

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07e3-business-claim-payment-plan' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07e3-business-claim-payment-plan
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply E3 source integration
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('src/admin/submissions/business-claim-payment-preview.ts')
          s = p.read_text()
          if '  contractAddress: string | null;\n  isPrimary: boolean;\n' not in s:
              s = s.replace('  contractAddress: string | null;\n', '  contractAddress: string | null;\n  isPrimary: boolean;\n', 1)
          p.write_text(s)

          p = Path('src/admin/submissions/drizzle-business-claim-payment-preview-backend.ts')
          s = p.read_text()
          if '                isPrimary: claimAssets.isPrimary,\n' not in s:
              s = s.replace('                contractAddress: claimAssets.contractAddress,\n', '                contractAddress: claimAssets.contractAddress,\n                isPrimary: claimAssets.isPrimary,\n', 1)
          p.write_text(s)

          p = Path('package.json')
          s = p.read_text()
          marker = 'node scripts/check-business-claim-payment-preview.mjs && '
          addition = 'node scripts/check-business-claim-payment-plan.mjs && '
          if addition not in s:
              s = s.replace(marker, marker + addition, 1)
          p.write_text(s)

          p = Path('src/admin/submissions/business-claim-payment-plan.ts')
          s = p.read_text()
          s = s.replace('  actorId: string,\n  requestFingerprint: string,', "  actorId: string,\n  actorType: 'human' | 'system',\n  requestFingerprint: string,", 1)
          s = s.replace("    event.actorType !== 'reviewer' ||", "    event.actorType !== (actorType === 'human' ? 'reviewer' : 'system') ||", 1)
          s = s.replace('      context.actorId,\n      requestFingerprint,\n      existing,', '      context.actorId,\n      context.actorType,\n      requestFingerprint,\n      existing,', 1)
          s = s.replace('          context.actorId,\n          requestFingerprint,\n          raced,', '          context.actorId,\n          context.actorType,\n          requestFingerprint,\n          raced,', 1)
          s = s.replace('    context.actorId,\n    requestFingerprint,\n    {', '    context.actorId,\n    context.actorType,\n    requestFingerprint,\n    {', 1)
          p.write_text(s)

          p = Path('docs/PROJECT_STATUS.md')
          s = p.read_text()
          s = s.replace('P5-07E2 — Protected Business Claim payment-draft preview', 'P5-07E3 — Durable Business Claim payment application plan', 1)
          s = s.replace('- P5-07E2 is active in PR #256 on `p5-07e2-business-claim-payment-preview`.', '- P5-07E2 protected Business Claim payment-draft preview completed in #256.\n- P5-07E3 is active on `p5-07e3-business-claim-payment-plan`.', 1)
          s = s.replace('482a99252019be34e11f1fb2ef6a0499d481cb4e', '60d0881778aaf04e1cdd1d408d60be609cc7bd77', 1)
          s = s.replace('The final P5-07E1 head passed all four normal workflow groups.', 'The final P5-07E2 head passed all four normal workflow groups.', 1)
          s = s.replace('#256 — P5-07E2 Business Claim payment preview', 'p5-07e3-business-claim-payment-plan — Business Claim payment plan', 1)
          if '- `docs/P5_07E3_BUSINESS_CLAIM_PAYMENT_PLAN.md`' not in s:
              s = s.replace('- `docs/P5_07E2_BUSINESS_CLAIM_PAYMENT_PREVIEW.md`', '- `docs/P5_07E2_BUSINESS_CLAIM_PAYMENT_PREVIEW.md`\n- `docs/P5_07E3_BUSINESS_CLAIM_PAYMENT_PLAN.md`', 1)
          p.write_text(s)
          PY
      - run: npm run format
      - run: node scripts/check-business-claim-payment-plan.mjs
      - run: npx vitest run tests/business-claim-payment-plan.test.ts tests/business-claim-payment-plan-api.test.ts tests/business-claim-payment-preview.test.ts
      - run: npm run check
      - name: Commit integrated slice
        shell: bash
        run: |
          git rm .github/workflows/p5-07e3-integrate.yml scripts/p5-07e3-integrate.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P5-07E3 integrate payment plan"
          git push origin HEAD:p5-07e3-business-claim-payment-plan
