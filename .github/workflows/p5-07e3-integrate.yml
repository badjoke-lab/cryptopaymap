name: P5-07E3 integrate

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07e3-business-claim-payment-plan' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07e3-business-claim-payment-plan
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply bounded E3 integration edits
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          def insert_after(path: str, anchor: str, addition: str) -> None:
              file = Path(path)
              text = file.read_text()
              if addition.strip() in text:
                  return
              if anchor not in text:
                  raise RuntimeError(f'{path}: missing anchor {anchor!r}')
              file.write_text(text.replace(anchor, anchor + addition, 1))

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              if new in text:
                  return
              if old not in text:
                  raise RuntimeError(f'{path}: missing replacement source')
              file.write_text(text.replace(old, new, 1))

          insert_after(
              'src/admin/submissions/business-claim-payment-preview.ts',
              '  contractAddress: string | null;\n',
              '  isPrimary: boolean;\n',
          )
          insert_after(
              'src/admin/submissions/drizzle-business-claim-payment-preview-backend.ts',
              '                contractAddress: claimAssets.contractAddress,\n',
              '                isPrimary: claimAssets.isPrimary,\n',
          )
          insert_after(
              'package.json',
              'node scripts/check-business-claim-payment-preview.mjs && ',
              'node scripts/check-business-claim-payment-plan.mjs && ',
          )

          service = Path('src/admin/submissions/business-claim-payment-plan.ts')
          text = service.read_text()
          if "  actorType: 'human' | 'system',\n  requestFingerprint: string," not in text:
              text = text.replace(
                  '  actorId: string,\n  requestFingerprint: string,',
                  "  actorId: string,\n  actorType: 'human' | 'system',\n  requestFingerprint: string,",
                  1,
              )
          text = text.replace(
              "    event.actorType !== 'reviewer' ||",
              "    event.actorType !== (actorType === 'human' ? 'reviewer' : 'system') ||",
              1,
          )
          for old, new in [
              (
                  '      context.actorId,\n      requestFingerprint,\n      existing,',
                  '      context.actorId,\n      context.actorType,\n      requestFingerprint,\n      existing,',
              ),
              (
                  '          context.actorId,\n          requestFingerprint,\n          raced,',
                  '          context.actorId,\n          context.actorType,\n          requestFingerprint,\n          raced,',
              ),
              (
                  '    context.actorId,\n    requestFingerprint,\n    {',
                  '    context.actorId,\n    context.actorType,\n    requestFingerprint,\n    {',
              ),
          ]:
              if new not in text:
                  if old not in text:
                      raise RuntimeError('payment plan service call marker is missing')
                  text = text.replace(old, new, 1)
          service.write_text(text)

          status = Path('docs/PROJECT_STATUS.md')
          text = status.read_text()
          replacements = [
              (
                  'P5-07E2 — Protected Business Claim payment-draft preview',
                  'P5-07E3 — Durable Business Claim payment application plan',
              ),
              (
                  '- P5-07E2 is active in PR #256 on `p5-07e2-business-claim-payment-preview`.',
                  '- P5-07E2 protected Business Claim payment-draft preview completed in #256.\n- P5-07E3 is active on `p5-07e3-business-claim-payment-plan`.',
              ),
              (
                  '482a99252019be34e11f1fb2ef6a0499d481cb4e',
                  '60d0881778aaf04e1cdd1d408d60be609cc7bd77',
              ),
              (
                  'The final P5-07E1 head passed all four normal workflow groups.',
                  'The final P5-07E2 head passed all four normal workflow groups.',
              ),
              (
                  '#256 — P5-07E2 Business Claim payment preview',
                  'p5-07e3-business-claim-payment-plan — Business Claim payment plan',
              ),
          ]
          for old, new in replacements:
              if new not in text:
                  if old not in text:
                      raise RuntimeError(f'PROJECT_STATUS missing {old!r}')
                  text = text.replace(old, new, 1)
          start = text.index('## Current boundary')
          end = text.index('## Blocked')
          text = text[:start] + '''## Current boundary

          P5-07E3 may persist one exact private payment plan bound to the E2 `draftSetHash`, current target versions, selected existing Claim versions, complete selected Claim Asset set hashes, and explicit reviewer selections for ambiguous drafts.

          It derives candidate Claim IDs, Claim Asset row IDs, registries, processors, duplicate rows, and primary-row safety on the server. It must not mutate canonical Claims, Claim Assets, provenance, verification history, lifecycle, export, or release.

          ## Next

          Implement P5-07E4 as the atomic consumer of one exact E3 plan. It should create planned hidden candidate Claims, insert planned Claim Asset rows, preserve already-present rows, write payment provenance and verification history, and commit the common application with replay-safe recovery. Entity and Location field-level provenance remains a separate atomic owner.

          ''' + text[end:]
          reference = '- `docs/P5_07E3_BUSINESS_CLAIM_PAYMENT_PLAN.md`'
          if reference not in text:
              text = text.replace(
                  '- `docs/P5_07E2_BUSINESS_CLAIM_PAYMENT_PREVIEW.md`',
                  '- `docs/P5_07E2_BUSINESS_CLAIM_PAYMENT_PREVIEW.md`\n' + reference,
                  1,
              )
          status.write_text(text)
          PY
      - run: npm run format
      - run: node scripts/check-business-claim-payment-plan.mjs
      - run: npx vitest run tests/business-claim-payment-plan.test.ts tests/business-claim-payment-plan-api.test.ts tests/business-claim-payment-preview.test.ts
      - run: npm run check
      - name: Commit integrated slice
        shell: bash
        run: |
          git rm .github/workflows/p5-07e3-integrate.yml scripts/p5-07e3-integrate.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P5-07E3 integrate payment plan"
          git push origin HEAD:p5-07e3-business-claim-payment-plan
