name: P206 DB

on:
  push:
    branches:
      - work/p206

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/p206
      - uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: bash scripts/commit-p206-db.sh
