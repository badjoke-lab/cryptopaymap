name: C2 apply formatter

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/components/places/MobilePlaceSheet.tsx'
      - 'src/components/places/PlaceFilterPanel.tsx'
      - 'tests/p4-18c-c2-mobile-priority.test.tsx'
      - 'tests/place-filter-panel-focus.test.tsx'
      - '.github/workflows/c2-apply-format.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.head_ref == 'p4-18c2-clean'
    runs-on: ubuntu-latest
    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Apply repository formatter
        run: npm run format

      - name: Commit formatter output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No formatter changes."
            exit 0
          fi
          git commit -m "style: apply C2 formatter output"
          git push origin HEAD:${{ github.head_ref }}
