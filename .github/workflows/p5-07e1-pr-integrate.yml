name: P5-07E1 PR integrate

on:
  pull_request:
    branches:
      - main
    types: [opened, reopened, synchronize]

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07e1-business-claim-application-order' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07e1-business-claim-application-order
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: python scripts/p5-07e1-integrate.py
      - run: npm run format
      - run: node scripts/check-business-claim-application-order.mjs
      - run: npx vitest run tests/business-claim-application-order.test.ts tests/submission-application-registration.test.ts
      - run: npm run check
      - name: Commit integrated slice
        shell: bash
        run: |
          rm scripts/p5-07e1-integrate.py
          rm .github/workflows/p5-07e1-integrate.yml
          rm .github/workflows/p5-07e1-pr-integrate.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P5-07E1: correct Business Claim application ordering"
          git push origin HEAD:p5-07e1-business-claim-application-order
