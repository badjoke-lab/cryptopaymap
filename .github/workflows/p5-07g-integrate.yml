name: P5-07G integrate

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07g-private-retention-execution' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07g-private-retention-execution
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: node scripts/p5-07g-fix-recovered.mjs
      - run: npm run format
      - run: npm run lint
      - name: Capture TypeScript diagnostics
        shell: bash
        run: |
          set +e
          npm run check > p5-07g-recovered-check.txt 2>&1
          status=$?
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P5-07G validate recovered types"
          git push origin HEAD:p5-07g-private-retention-execution
          exit "$status"
