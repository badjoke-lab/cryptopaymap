name: P5-07G integrate

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07g-private-retention-execution' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07g-private-retention-execution
          fetch-depth: 0
      - name: Recover complete generated files
        shell: bash
        run: |
          python - <<'PY'
          import base64
          import re
          from pathlib import Path

          text = Path('scripts/p5-07g-integrate.mjs').read_text()
          matches = re.findall(r'"([^"]+)": "([A-Za-z0-9+/=]+)"', text)
          paths = []
          for path, encoded in matches:
              destination = Path(path)
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_bytes(base64.b64decode(encoded))
              paths.append(path)
          Path('p5-07g-recovered-files.txt').write_text('\n'.join(paths) + '\n')
          if not paths:
              raise SystemExit('No complete generated file entries were recovered.')
          PY
          rm -f p5-07g-integration-error.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "P5-07G recover generated source files"
          git push origin HEAD:p5-07g-private-retention-execution
