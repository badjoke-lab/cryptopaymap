name: P5-05I focused diagnostics fix

on:
  push:
    branches:
      - p5-05i-r2-signing-integration-audit

permissions:
  contents: write

jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-05i-r2-signing-integration-audit
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply focused lint and TypeScript fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          signer = Path('src/submissions/r2-photo-upload-authorizer.ts')
          text = signer.read_text()
          text = text.replace(
          "const metadataValueSchema = z\n  .string()\n  .min(1)\n  .max(1_024)\n  .refine((value) => !/[\\u0000-\\u001f\\u007f]/.test(value));",
          "const metadataValueSchema = z\n  .string()\n  .min(1)\n  .max(1_024)\n  .refine((value) => {\n    for (const character of value) {\n      const code = character.charCodeAt(0);\n      if (code < 32 || code === 127) return false;\n    }\n    return true;\n  });"
          )
          text = text.replace(
          "CPM_R2_SECRET_ACCESS_KEY: z.string().min(32).max(256).regex(/^\\S+$/),",
          "CPM_R2_SECRET_ACCESS_KEY: z\n      .string()\n      .min(32)\n      .max(256)\n      .refine((value) => {\n        for (const character of value) {\n          const code = character.charCodeAt(0);\n          if (code < 33 || code > 126) return false;\n        }\n        return true;\n      }),"
          )
          text = text.replace(
          "async function hmacSha256(keyBytes: Uint8Array, value: string): Promise<Uint8Array> {\n  const key = await crypto.subtle.importKey(\n    'raw',\n    keyBytes,",
          "function copyArrayBuffer(bytes: Uint8Array): ArrayBuffer {\n  const copy = new Uint8Array(bytes.byteLength);\n  copy.set(bytes);\n  return copy.buffer;\n}\n\nasync function hmacSha256(keyBytes: Uint8Array, value: string): Promise<Uint8Array> {\n  const key = await crypto.subtle.importKey(\n    'raw',\n    copyArrayBuffer(keyBytes),"
          )
          text = text.replace(
          "const signature = await crypto.subtle.sign('HMAC', key, textEncoder.encode(value));",
          "const signature = await crypto.subtle.sign(\n    'HMAC',\n    key,\n    copyArrayBuffer(textEncoder.encode(value)),\n  );"
          )
          signer.write_text(text)

          tests = Path('tests/r2-photo-upload-authorizer.test.ts')
          text = tests.read_text()
          text = text.replace("  R2PhotoUploadAuthorizationError,\n", "")
          text = text.replace(
          "async function hmac(keyBytes: Uint8Array, value: string): Promise<Uint8Array> {\n  const key = await crypto.subtle.importKey(\n    'raw',\n    keyBytes,",
          "function copyArrayBuffer(bytes: Uint8Array): ArrayBuffer {\n  const copy = new Uint8Array(bytes.byteLength);\n  copy.set(bytes);\n  return copy.buffer;\n}\n\nasync function hmac(keyBytes: Uint8Array, value: string): Promise<Uint8Array> {\n  const key = await crypto.subtle.importKey(\n    'raw',\n    copyArrayBuffer(keyBytes),"
          )
          text = text.replace(
          "return new Uint8Array(await crypto.subtle.sign('HMAC', key, new TextEncoder().encode(value)));",
          "return new Uint8Array(\n    await crypto.subtle.sign(\n      'HMAC',\n      key,\n      copyArrayBuffer(new TextEncoder().encode(value)),\n    ),\n  );"
          )
          text = text.replace(".toMatchObject<R2PhotoUploadAuthorizationError>", ".toMatchObject")
          tests.write_text(text)

          audit = Path('scripts/check-photo-r2-direct-upload.ts')
          text = audit.read_text()
          text = text.replace(
          "const bytes = new Uint8Array([0xff, 0xd8, 0xff, 0xd9]);",
          "const bytes = new Uint8Array([0xff, 0xd8, 0xff, 0xd9]);\nconst uploadBuffer = new ArrayBuffer(bytes.byteLength);\nnew Uint8Array(uploadBuffer).set(bytes);"
          )
          text = text.replace("let uploadedObject:\n  | {", "const uploadedObjects: Array<{")
          text = text.replace("    }\n  | undefined;", "}> = [];")
          text = text.replace("body: new Blob([bytes], { type: declaredMimeType }),", "body: new Blob([uploadBuffer], { type: declaredMimeType }),")
          text = text.replace("      uploadedObject = {", "      uploadedObjects.push({")
          text = text.replace("        reservationId: headers.get('x-amz-meta-cpm-reservation-id'),\n      };", "        reservationId: headers.get('x-amz-meta-cpm-reservation-id'),\n      });")
          text = text.replace(
          "const reservation = reservationPersistence.list()[0];\nconst upload = authorization.uploads[0];\nif (reservation === undefined || upload === undefined || uploadedObject === undefined) {",
          "const reservation = reservationPersistence.list()[0];\nconst upload = authorization.uploads[0];\nconst uploadedObject = uploadedObjects[0];\nif (reservation === undefined || upload === undefined || uploadedObject === undefined) {"
          )
          audit.write_text(text)
          PY
          npm run format
      - name: Commit focused fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/submissions/r2-photo-upload-authorizer.ts tests/r2-photo-upload-authorizer.test.ts scripts/check-photo-r2-direct-upload.ts
          git commit -m "P5-05I fix signer diagnostics"
          git push origin HEAD:p5-05i-r2-signing-integration-audit
