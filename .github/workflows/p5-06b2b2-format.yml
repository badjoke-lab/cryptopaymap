name: P5-06B2B2 focused formatting

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: p5-06b2b2-photos-parent-ui
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install locked dependencies
        run: npm ci
      - name: Replace unstable React keys
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('src/components/admin/PhotoSubmissionReview.tsx')
          text = path.read_text()
          text = text.replace('detail.projection.media.map((item, index) => (', 'detail.projection.media.map((item) => (')
          text = text.replace('key={`${item.role}-${index}`}', 'key={item.quarantineUploadId}')
          text = text.replace('detail.events.map((event, index) => (', 'detail.events.map((event) => (')
          text = text.replace('key={`${event.createdAt}-${event.action}-${index}`}', 'key={`${event.createdAt}-${event.action}-${event.toStatus}`}')
          path.write_text(text)
          PY
      - name: Apply focused Biome fixes
        run: |
          npx biome check --write --unsafe \
            src/components/admin/PhotoSubmissionQueue.tsx \
            src/components/admin/PhotoSubmissionReview.tsx \
            src/pages/admin/submissions.astro \
            src/pages/admin/submissions/photo-detail.astro \
            tests/photo-parent-review-ui.test.tsx \
            scripts/check-report-submission-reviewer-artifact.mjs
      - name: Remove temporary workflow and commit fixes
        run: |
          rm .github/workflows/p5-06b2b2-format.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add \
            src/components/admin/PhotoSubmissionQueue.tsx \
            src/components/admin/PhotoSubmissionReview.tsx \
            src/pages/admin/submissions.astro \
            src/pages/admin/submissions/photo-detail.astro \
            tests/photo-parent-review-ui.test.tsx \
            scripts/check-report-submission-reviewer-artifact.mjs \
            .github/workflows/p5-06b2b2-format.yml
          git commit -m "P5-06B2B2 apply focused UI checks"
          git push origin HEAD:p5-06b2b2-photos-parent-ui
