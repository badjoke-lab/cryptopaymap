name: Patch responsive map UX

on:
  push:
    branches:
      - work/mobile-desktop-separation

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/mobile-desktop-separation
          fetch-depth: 0

      - name: Apply bounded responsive map patches
        run: |
          python - <<'PY'
          from pathlib import Path

          result_list = Path('src/components/places/PlaceResultList.tsx')
          text = result_list.read_text()
          old = 'className="m-0 max-h-[42rem] list-none overflow-y-auto p-3"'
          new = 'className="m-0 list-none p-3 lg:max-h-[42rem] lg:overflow-y-auto"'
          if old not in text:
              raise SystemExit('result list class not found')
          result_list.write_text(text.replace(old, new, 1))

          places_map = Path('src/components/places/PlacesMap.tsx')
          text = places_map.read_text()
          old = """    let loaded = false;
    let map: MapLibreMap | null = null;"""
          new = """    let loaded = false;
    let userViewportChangePending = false;
    let map: MapLibreMap | null = null;"""
          if old not in text:
              raise SystemExit('map lifecycle anchor not found')
          text = text.replace(old, new, 1)

          old = """    function reportMovedViewport() {
      if (!map || !loaded) return;
      const center = map.getCenter();"""
          new = """    function reportMovedViewport() {
      if (!map || !loaded || !userViewportChangePending) return;
      userViewportChangePending = false;
      const center = map.getCenter();"""
          if old not in text:
              raise SystemExit('moveend reporter anchor not found')
          text = text.replace(old, new, 1)

          old = """          map.on('click', clusterLayerId, async (event) => {
            if (!map) return;"""
          new = """          map.on('click', clusterLayerId, async (event) => {
            if (!map) return;
            userViewportChangePending = true;"""
          if old not in text:
              raise SystemExit('cluster click anchor not found')
          text = text.replace(old, new, 1)

          old = """          map.on('moveend', reportMovedViewport);

          setRuntimeState('ready');"""
          new = """          const markUserViewportChange = (event: { originalEvent?: unknown }) => {
            if (event.originalEvent) userViewportChangePending = true;
          };
          map.on('dragstart', markUserViewportChange);
          map.on('zoomstart', markUserViewportChange);
          map.on('rotatestart', markUserViewportChange);
          map.on('pitchstart', markUserViewportChange);
          map.on('moveend', reportMovedViewport);

          setRuntimeState('ready');"""
          if old not in text:
              raise SystemExit('move handler anchor not found')
          text = text.replace(old, new, 1)

          old = '<div className="relative min-h-[38rem] w-full">'
          new = '<div className="relative h-[58svh] min-h-[28rem] max-h-[42rem] w-full lg:h-auto lg:max-h-none lg:min-h-[38rem]">'
          if old not in text:
              raise SystemExit('map size class not found')
          text = text.replace(old, new, 1)
          places_map.write_text(text)

          test = Path('tests/places-map.test.tsx')
          text = test.read_text()
          old = """    map.center = { lat: 34.6937, lng: 135.5023 };
    map.zoom = 10.25;
    await act(async () => map.trigger('moveend'));
    expect(onViewportChange).toHaveBeenCalledWith({"""
          new = """    await act(async () => map.trigger('moveend'));
    expect(onViewportChange).not.toHaveBeenCalled();

    map.center = { lat: 34.6937, lng: 135.5023 };
    map.zoom = 10.25;
    await act(async () => map.trigger('dragstart', { originalEvent: {} }));
    await act(async () => map.trigger('moveend'));
    expect(onViewportChange).toHaveBeenCalledWith({"""
          if old not in text:
              raise SystemExit('places map test anchor not found')
          test.write_text(text.replace(old, new, 1))
          PY

      - name: Format changed files
        run: npx biome format --write src/components/places/PlaceResultList.tsx src/components/places/PlacesMap.tsx tests/places-map.test.tsx

      - name: Commit patches
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/places/PlaceResultList.tsx src/components/places/PlacesMap.tsx tests/places-map.test.tsx
          git commit -m "UX-01: refine responsive map and list behavior"
          git push origin HEAD:work/mobile-desktop-separation
