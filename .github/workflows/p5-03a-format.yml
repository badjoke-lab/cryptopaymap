name: Format P5-03A branch

on:
  push:
    branches:
      - p5-03a-report-contract

permissions:
  contents: write

jobs:
  format:
    if: ${{ !contains(github.event.head_commit.message, 'Format P5-03A files') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-03a-report-contract
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format
      - run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add src/submissions/report-contract.ts tests/report-submission-contract.test.ts scripts/check-report-submission-contract.ts docs/P5_03A_REPORT_CONTRACT_AND_NORMALIZATION.md docs/PROJECT_STATUS.md docs/IMPLEMENTATION_PLAN.md docs/PHASE5_IMPLEMENTATION_SEQUENCE.md package.json
          if git diff --cached --quiet; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git commit -m 'Format P5-03A files'
          git push origin HEAD:p5-03a-report-contract
