name: P3-07H format files

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Synchronize branch
        run: git pull --rebase origin "${GITHUB_HEAD_REF}"
      - name: Apply Biome formatting
        run: |
          npx biome format --write \
            src/admin/promotion/field-source-selection.ts \
            src/components/admin/CandidatePromotionEditor.tsx \
            src/components/admin/CandidatePromotionForm.tsx \
            src/components/admin/PromotionAssetRowEditor.tsx \
            src/components/admin/PromotionAssetSection.tsx \
            src/components/admin/PromotionClaimSection.tsx \
            src/components/admin/PromotionFieldSourceControls.tsx \
            src/components/admin/PromotionLocationSection.tsx \
            tests/candidate-promotion-field-source-selection.test.ts
          rm .github/workflows/p307h-format.yml
      - name: Commit formatter output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P3-07H: apply formatter output"
          git push origin "HEAD:${GITHUB_HEAD_REF}"
