name: P3-11B regenerate migration

on:
  push:
    branches:
      - work/p311b
    paths:
      - .github/workflows/p311b-regenerate-migration.yml

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: work/p311b
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Remove unmerged migration
        shell: bash
        run: |
          rm drizzle/0018_spotty_thunderbolts.sql
          rm drizzle/meta/0018_snapshot.json
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('drizzle/meta/_journal.json')
          data = json.loads(path.read_text())
          data['entries'] = [entry for entry in data['entries'] if entry['idx'] != 18]
          path.write_text(json.dumps(data, indent=2) + '\n')
          PY
      - name: Generate hardened migration
        run: npm run db:generate
      - name: Format repository
        run: npm run format
      - name: Commit regenerated migration and remove workflow
        shell: bash
        run: |
          git rm .github/workflows/p311b-regenerate-migration.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add drizzle docs package.json scripts src tests
          git commit -m "P3-11B: regenerate hardened export release migration"
          git push origin HEAD:work/p311b
