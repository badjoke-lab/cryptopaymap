name: Patch Phase 4 implementation plan

on:
  push:
    branches:
      - work/public-updates

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/public-updates
          fetch-depth: 0
      - name: Synchronize Phase 4 table
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('docs/IMPLEMENTATION_PLAN.md')
          text = path.read_text()
          replacements = {
            '| P4-03 | MapLibre map | In progress | P4-02 | #98, #99 |': '| P4-03 | MapLibre map | Completed | P4-02 | #98, #100 |',
            '| P4-04 | Result list | Planned | P4-02 | — |': '| P4-04 | Result list | Completed | P4-02 | #101 |',
            '| P4-05 | Pin and list synchronization | Planned | P4-03, P4-04 | — |': '| P4-05 | Pin and list synchronization | Completed | P4-03, P4-04 | #102 |',
            '| P4-06 | Filters and bounded result updates | Planned | P4-02 | — |': '| P4-06 | Filters and bounded result updates | Completed | P4-02 | #103, #104 |',
            '| P4-07 | URL state and back restoration | Planned | P4-05, P4-06 | — |': '| P4-07 | URL state and back restoration | Completed | P4-05, P4-06 | #105 |',
            '| P4-08 | Mobile bottom sheet | Planned | P4-05 | — |': '| P4-08 | Mobile bottom sheet | Completed | P4-05 | #106 |',
            '| P4-09 | Online Services discovery and detail | Planned | public data layer | — |': '| P4-09 | Online Services discovery and detail | Completed | public data layer | #107 |',
            '| P4-10 | Home | Planned | public discovery surfaces | — |': '| P4-10 | Home | Completed | public discovery surfaces | #108 |',
            '| P4-11 | Stats | Planned | public stats export | — |': '| P4-11 | Stats | Completed | public stats export | #109 |',
            '| P4-12 | Updates | Planned | public updates export | — |': '| P4-12 | Updates | In progress | public updates export | #115 |',
            'P4-03B adds the MapLibre renderer to the coordinated PlacesApp shell in pull request #99.': 'P4-03B added the MapLibre renderer to the coordinated PlacesApp shell in pull request #100.',
          }
          for old, new in replacements.items():
              if old not in text:
                  raise SystemExit(f'Expected implementation plan text not found: {old}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          PY
      - name: Commit synchronized plan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/IMPLEMENTATION_PLAN.md
          git commit -m "P4-12A: synchronize Phase 4 implementation plan"
          git push origin HEAD:work/public-updates
