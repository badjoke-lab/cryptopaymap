name: P3-07G finalize field provenance

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out source branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Synchronize source branch
        run: git pull --rebase origin "${GITHUB_HEAD_REF}"
      - name: Add field-path persistence and replay compatibility
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              if old not in text:
                  raise SystemExit(f'{label} was not found.')
              return text.replace(old, new, 1)

          candidate = Path('src/admin/promotion/candidate-promotion.ts')
          text = candidate.read_text()
          text = replace_once(
              text,
              "      claimAssets,\n      provenanceAssignments,\n      canonicalPath,",
              "      claimAssets,\n      ...(provenanceAssignments.length > 0 ? { provenanceAssignments } : {}),\n      canonicalPath,",
              'New-target fingerprint provenance block',
          )
          candidate.write_text(text)

          existing = Path('src/admin/promotion/existing-target-link.ts')
          text = existing.read_text()
          text = replace_once(
              text,
              "      sourceRecordIds,\n      claimAssets,\n      provenanceAssignments,",
              "      sourceRecordIds,\n      claimAssets,\n      ...(provenanceAssignments.length > 0 ? { provenanceAssignments } : {}),",
              'Existing-target fingerprint provenance block',
          )
          existing.write_text(text)

          backend = Path('src/admin/promotion/drizzle-candidate-promotion-backend.ts')
          text = backend.read_text()
          text = replace_once(
              text,
              "} from './candidate-promotion';\n\ntype DatabaseBatchInput",
              "} from './candidate-promotion';\nimport { expandPromotionProvenanceAssignments } from './provenance-plan';\n\ntype DatabaseBatchInput",
              'New-target backend provenance import',
          )
          start = text.index('      const subjects: Array<{')
          end = text.index('        database\n          .update(legacyPlaceIds)', start)
          replacement = """      const subjects: Array<{
        subjectType: 'entity' | 'location' | 'acceptance_claim' | 'claim_asset';
        subjectId: string;
      }> = [
        { subjectType: 'entity', subjectId: command.entity.id },
        { subjectType: 'acceptance_claim', subjectId: command.claim.id },
        ...command.claimAssets.map((row) => ({
          subjectType: 'claim_asset' as const,
          subjectId: row.id,
        })),
      ];
      if (command.location !== null) {
        subjects.push({ subjectType: 'location', subjectId: command.location.id });
      }
      const provenanceRows =
        command.provenanceAssignments.length > 0
          ? expandPromotionProvenanceAssignments(
              command.provenanceAssignments,
              command.promotedAt,
            )
          : subjects.flatMap((subject) =>
              command.sourceRecordIds.map((sourceRecordId) => ({
                subjectType: subject.subjectType,
                subjectId: subject.subjectId,
                sourceRecordId,
                provenanceRole: 'origin' as const,
                effectiveFrom: command.promotedAt,
              })),
            );
      statements.push(
        database.insert(provenanceLinks).values(provenanceRows),
"""
          backend.write_text(text[:start] + replacement + text[end:])

          backend = Path('src/admin/promotion/drizzle-existing-target-link-backend.ts')
          text = backend.read_text()
          text = replace_once(
              text,
              "} from './existing-target-link';\n\ntype DatabaseBatchInput",
              "} from './existing-target-link';\nimport { expandPromotionProvenanceAssignments } from './provenance-plan';\n\ntype DatabaseBatchInput",
              'Existing-target backend provenance import',
          )
          start = text.index('      const identitySubjects: Array<{')
          end = text.index('        database\n          .update(legacyPlaceIds)', start)
          replacement = """      const identitySubjects: Array<{
        subjectType: 'entity' | 'location';
        subjectId: string;
      }> = [{ subjectType: 'entity', subjectId: command.target.entityId }];
      if (command.target.locationId !== null) {
        identitySubjects.push({
          subjectType: 'location',
          subjectId: command.target.locationId,
        });
      }
      const originSubjects: Array<{
        subjectType: 'acceptance_claim' | 'claim_asset';
        subjectId: string;
      }> = [
        { subjectType: 'acceptance_claim', subjectId: command.claim.id },
        ...command.claimAssets.map((row) => ({
          subjectType: 'claim_asset' as const,
          subjectId: row.id,
        })),
      ];
      const provenanceRows =
        command.provenanceAssignments.length > 0
          ? expandPromotionProvenanceAssignments(
              command.provenanceAssignments,
              command.linkedAt,
            )
          : [
              ...identitySubjects.flatMap((subject) =>
                command.sourceRecordIds.map((sourceRecordId) => ({
                  subjectType: subject.subjectType,
                  subjectId: subject.subjectId,
                  sourceRecordId,
                  provenanceRole: 'attribution' as const,
                  effectiveFrom: command.linkedAt,
                })),
              ),
              ...originSubjects.flatMap((subject) =>
                command.sourceRecordIds.map((sourceRecordId) => ({
                  subjectType: subject.subjectType,
                  subjectId: subject.subjectId,
                  sourceRecordId,
                  provenanceRole: 'origin' as const,
                  effectiveFrom: command.linkedAt,
                })),
              ),
            ];

      statements.push(
        database
          .insert(provenanceLinks)
          .values(provenanceRows)
          .onConflictDoNothing(),
"""
          backend.write_text(text[:start] + replacement + text[end:])
          PY
      - name: Format P3-07G files
        run: |
          npx biome format --write \
            src/admin/promotion/provenance-plan.ts \
            src/admin/promotion/candidate-promotion.ts \
            src/admin/promotion/existing-target-link.ts \
            src/admin/promotion/drizzle-candidate-promotion-backend.ts \
            src/admin/promotion/drizzle-existing-target-link-backend.ts \
            tests/candidate-promotion-provenance.test.ts \
            scripts/check-candidate-promotion-provenance.ts
      - name: Remove one-time finalizer
        run: rm .github/workflows/p307g-finalize.yml
      - name: Commit finalized branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P3-07G: persist field provenance plans"
          if ! git push origin "HEAD:${GITHUB_HEAD_REF}"; then
            git pull --rebase origin "${GITHUB_HEAD_REF}"
            git push origin "HEAD:${GITHUB_HEAD_REF}"
          fi
