name: Apply P5-03A tracking patch

on:
  push:
    branches:
      - p5-03a-report-contract

permissions:
  contents: write

jobs:
  update:
    if: ${{ !contains(github.event.head_commit.message, 'Advance tracking to P5-03A') }}
    runs-on: ubuntu-24.04
    steps:
      - name: Check out P5-03A branch
        uses: actions/checkout@v4
        with:
          ref: p5-03a-report-contract

      - name: Update tracking documents
        run: |
          node <<'NODE'
          const { readFileSync, writeFileSync } = require('node:fs');

          function update(path, transform) {
            const before = readFileSync(path, 'utf8');
            const after = transform(before);
            if (after === before) throw new Error(`No changes produced for ${path}`);
            writeFileSync(path, after);
          }

          function replaceRequired(text, pattern, replacement, label) {
            if (!pattern.test(text)) throw new Error(`Missing expected block: ${label}`);
            pattern.lastIndex = 0;
            return text.replace(pattern, replacement);
          }

          update('docs/PROJECT_STATUS.md', (input) => {
            let text = input;
            text = replaceRequired(
              text,
              /P5-03 — Payment and problem reports \(bounded sequence definition next\)/,
              'P5-03A — Payment and problem report contract and review-safe normalization',
              'current implementation item',
            );
            text = replaceRequired(
              text,
              /- P5-02 Suggest Place and Online Service is complete and handed off to P5-03\./,
              '- P5-02 Suggest Place and Online Service is complete and handed off to P5-03.\n- P5-03A payment/problem report contract and review-safe normalization is in progress.',
              'repository state',
            );
            text = text.replace(
              '3. P5-03 — Payment and problem reports — Ready to begin',
              '3. P5-03 — Payment and problem reports — In progress at P5-03A',
            );
            text = replaceRequired(
              text,
              /P5-02R  Suggest integration and handoff audit\s+Completed #185–#192\n/,
              '$&P5-03A  Payment/problem report contract and normalization                 In progress\n',
              'current position',
            );
            text = replaceRequired(
              text,
              /## Next\n\n[\s\S]*?\n\n## Blocked/,
              `## Current active scope — P5-03A report contract and normalization\n\nP5-03A defines strict target-aware \`payment_report\` and \`problem_report\` payloads on top of P5-01. It requires an existing Entity, Location, or Claim target, preserves explicit payment uncertainty, separates restricted evidence URLs from review-safe projections, defines bounded correction proposals, and adds no route, reviewer decision, canonical mutation, export, or publication behavior.\n\n## Next\n\nComplete P5-03A contract, normalization, focused tests, and schema-check integration. Then proceed to P5-03B private report intake integration.\n\n## Blocked`,
              'active scope and next',
            );
            text = text.replace(
              'No P5-02R blocker remains. P5-03 may begin. Retained Launch work remains unchanged and launch readiness is not claimed.',
              'No P5-03A blocker is known. Retained Launch work remains unchanged and launch readiness is not claimed.',
            );
            return text;
          });

          update('docs/IMPLEMENTATION_PLAN.md', (input) => {
            let text = input;
            text = text.replace(
              '| P5-03 | Payment and problem reports | Ready to begin | P5-01, P5-02 target conventions |',
              '| P5-03 | Payment and problem reports | In progress at P5-03A | P5-01, P5-02 target conventions |',
            );
            text = replaceRequired(
              text,
              /### P5-03 — Payment and problem reports\n\n\*\*Status:\*\* Ready to begin\n\nAdd target-aware positive and negative payment reports plus factual, privacy, rights, duplicate, and other problem reports\. Reports create review material and may trigger recheck priority; they do not automatically change Claim state\./,
              `### P5-03 — Payment and problem reports\n\n**Status:** In progress at P5-03A\n\nAdd target-aware positive and negative payment reports plus factual, privacy, rights, duplicate, and other problem reports. Reports create review material and may trigger recheck priority; they do not automatically change Claim state.\n\nCurrent bounded sequence:\n\n\`\`\`text\nP5-03A — Payment/problem report contract and review-safe normalization     In progress\n    ↓\nP5-03B — Idempotent private report intake integration                     Planned\n    ↓\nP5-03C — Canonical target snapshot and Claim-context signals              Planned\n    ↓\nP5-03D — Protected report reviewer queue and detail entry                 Planned\n    ↓\nP5-03E — Positive payment Evidence and reconfirmation decision boundary   Planned\n    ↓\nP5-03F — Negative Evidence and priority-recheck decision boundary         Planned\n    ↓\nP5-03G — Problem correction and urgent visibility decision boundaries     Planned\n    ↓\nP5-03H — Public payment/problem report routes and forms                   Planned\n    ↓\nP5-03I — Configured review and integration audit                          Planned\n\`\`\`\n\nP5-03A owns only strict type-specific parsing and review-safe normalization. It does not add public routes/forms, target lookup, Evidence acceptance, recheck priority mutation, temporary hiding, canonical mutation, export, or publication.`,
              'P5-03 implementation section',
            );
            return text;
          });

          update('docs/PHASE5_IMPLEMENTATION_SEQUENCE.md', (input) => {
            let text = input;
            text = replaceRequired(
              text,
              /\*\*Status:\*\* Active — P5-03 ready to begin/,
              '**Status:** Active — P5-03A in progress',
              'Phase 5 status',
            );
            text = text.replace(
              'P5-03   Payment and problem reports                                     Ready to begin',
              'P5-03A  Payment/problem report contract and normalization                 In progress\nP5-03   Payment and problem reports                                     In progress',
            );
            text = replaceRequired(
              text,
              /## P5-03 — Payment and problem reports\n\n\*\*Status:\*\* Ready to begin\n\n### Goal/,
              '## P5-03 — Payment and problem reports\n\n**Status:** In progress at P5-03A\n\n### Goal',
              'P5-03 section status',
            );
            text = replaceRequired(
              text,
              /### Scope\n\n- preselected Place or Online Service targets;/,
              `### Current bounded sequence\n\n\`\`\`text\nP5-03A — Payment/problem report contract and review-safe normalization     In progress\n    ↓\nP5-03B — Idempotent private report intake integration                     Planned\n    ↓\nP5-03C — Canonical target snapshot and Claim-context signals              Planned\n    ↓\nP5-03D — Protected report reviewer queue and detail entry                 Planned\n    ↓\nP5-03E — Positive payment Evidence and reconfirmation decision boundary   Planned\n    ↓\nP5-03F — Negative Evidence and priority-recheck decision boundary         Planned\n    ↓\nP5-03G — Problem correction and urgent visibility decision boundaries     Planned\n    ↓\nP5-03H — Public payment/problem report routes and forms                   Planned\n    ↓\nP5-03I — Configured review and integration audit                          Planned\n\`\`\`\n\n### Scope\n\n- preselected Place or Online Service targets;`,
              'P5-03 bounded sequence',
            );
            return text;
          });
          NODE

      - name: Commit tracking update
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/PROJECT_STATUS.md docs/IMPLEMENTATION_PLAN.md docs/PHASE5_IMPLEMENTATION_SEQUENCE.md
          git commit -m 'Advance tracking to P5-03A'
          git push origin HEAD:p5-03a-report-contract
