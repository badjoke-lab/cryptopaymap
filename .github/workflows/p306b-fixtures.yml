name: P3-06B fixture alignment

on:
  push:
    branches:
      - work/p306b
    paths:
      - .github/workflows/p306b-fixtures.yml

permissions:
  contents: write

jobs:
  align:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/p306b
      - name: Add duplicate group fixture field
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from 'node:fs';
          const paths = [
            'tests/candidate-detail-contract.test.ts',
            'tests/candidate-detail-api.test.ts',
            'tests/candidate-detail-component.test.tsx',
          ];
          for (const path of paths) {
            let content = readFileSync(path, 'utf8');
            content = content.replace(
              '      duplicateSignal: false,\n      duplicateGroupStatus: null,',
              '      duplicateSignal: false,\n      duplicateGroupId: null,\n      duplicateGroupStatus: null,',
            );
            writeFileSync(path, content);
          }
          NODE
      - name: Commit aligned fixtures
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('node:fs');
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = 'work/p306b';
            const paths = [
              'tests/candidate-detail-contract.test.ts',
              'tests/candidate-detail-api.test.ts',
              'tests/candidate-detail-component.test.tsx',
            ];
            const ref = await github.rest.git.getRef({ owner, repo, ref: `heads/${branch}` });
            const parentSha = ref.data.object.sha;
            const parent = await github.rest.git.getCommit({ owner, repo, commit_sha: parentSha });
            const tree = [];
            for (const path of paths) {
              const blob = await github.rest.git.createBlob({ owner, repo, content: fs.readFileSync(path, 'utf8'), encoding: 'utf-8' });
              tree.push({ path, mode: '100644', type: 'blob', sha: blob.data.sha });
            }
            const nextTree = await github.rest.git.createTree({ owner, repo, base_tree: parent.data.tree.sha, tree });
            const commit = await github.rest.git.createCommit({ owner, repo, message: 'P3-06B align Candidate detail fixtures', tree: nextTree.data.sha, parents: [parentSha] });
            await github.rest.git.updateRef({ owner, repo, ref: `heads/${branch}`, sha: commit.data.sha, force: false });
