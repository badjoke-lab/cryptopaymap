name: P5-07B1 integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07b1-application-registration' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07b1-application-registration
          fetch-depth: 0
      - name: Register application schema check
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          path = Path('package.json')
          data = json.loads(path.read_text())
          command = data['scripts']['schema:check']
          marker = ' && node scripts/check-p5-07a-canonical-retention-inventory.mjs'
          addition = marker + ' && tsx scripts/check-submission-application-registration.ts'
          if 'check-submission-application-registration.ts' not in command:
              if marker not in command:
                  raise SystemExit('P5-07A schema-check marker is missing')
              data['scripts']['schema:check'] = command.replace(marker, addition, 1)
          path.write_text(json.dumps(data, indent=2) + '\n')
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Generate Drizzle migration
        run: npm run db:generate
      - name: Format P5-07B1 files
        run: |
          npx biome format --write \
            package.json \
            src/db/schema/index.ts \
            src/db/schema/submission-applications.ts \
            src/admin/submissions/application-registration.ts \
            src/admin/submissions/application-registration-authorization.ts \
            src/admin/submissions/drizzle-application-registration-backend.ts \
            'functions/admin/api/application-registration/[submissionId].ts' \
            tests/submission-application-registration.test.ts \
            tests/submission-application-registration-api.test.ts \
            scripts/check-submission-application-registration.ts \
            docs/P5_07B1_APPLICATION_REGISTRATION.md
      - name: Commit generated migration and integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json drizzle src functions tests scripts docs
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "P5-07B1: register and generate application lifecycle schema"
          git push origin HEAD:p5-07b1-application-registration
