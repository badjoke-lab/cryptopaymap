name: P5-07D1 integration

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  integrate:
    if: github.head_ref == 'p5-07d1-problem-location-correction' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-07d1-problem-location-correction
          fetch-depth: 0
      - name: Finalize replay guards and checker registration
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          service_path = Path('src/admin/submissions/problem-location-correction-application.ts')
          service = service_path.read_text()
          service = service.replace(
              "    locationId: string;\n    changedFieldPaths: string[];",
              "    locationId: string;\n    expectedLocationUpdatedAt: string;\n    changedFieldPaths: string[];",
              1,
          )
          service = service.replace(
              "    location === null ||\n    location.locationId !== submission.targetId ||\n    location.deletedAt !== null ||\n    location.updatedAt !== request.expectedLocationUpdatedAt",
              "    location === null ||\n    location.locationId !== submission.targetId ||\n    location.deletedAt !== null ||\n    (state.correctionDecision === null\n      ? location.updatedAt !== request.expectedLocationUpdatedAt\n      : state.correctionDecision.requestId !== request.requestId ||\n        state.correctionDecision.locationId !== location.locationId ||\n        state.correctionDecision.expectedLocationUpdatedAt !== request.expectedLocationUpdatedAt ||\n        location.updatedAt !== state.correctionDecision.decidedAt)",
              1,
          )
          service_path.write_text(service)

          backend_path = Path('src/admin/submissions/drizzle-problem-location-correction-application-backend.ts')
          backend = backend_path.read_text()
          backend = backend.replace(
              "          locationId: locationProfileCorrectionDecisions.locationId,\n          changedFieldPaths:",
              "          locationId: locationProfileCorrectionDecisions.locationId,\n          expectedLocationUpdatedAt:\n            locationProfileCorrectionDecisions.expectedLocationUpdatedAt,\n          changedFieldPaths:",
              1,
          )
          backend = backend.replace(
              "                locationId: correction.locationId,\n                changedFieldPaths:",
              "                locationId: correction.locationId,\n                expectedLocationUpdatedAt:\n                  correction.expectedLocationUpdatedAt.toISOString(),\n                changedFieldPaths:",
              1,
          )
          backend_path.write_text(backend)

          package_path = Path('package.json')
          package_data = json.loads(package_path.read_text())
          command = package_data['scripts']['schema:check']
          checker = 'tsx scripts/check-problem-location-correction-application.ts'
          if checker not in command:
              marker = 'tsx scripts/check-suggest-application-binding.ts'
              if marker not in command:
                  raise SystemExit('P5-07C schema-check marker is missing')
              package_data['scripts']['schema:check'] = command.replace(
                  marker,
                  marker + ' && ' + checker,
                  1,
              )
          package_path.write_text(json.dumps(package_data, indent=2) + '\n')
          PY
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Generate receipt enum migration
        run: npm run db:generate
      - name: Format P5-07D1 files
        run: |
          npx biome format --write \
            package.json \
            src/db/schema/submission-applications.ts \
            src/admin/location-correction/drizzle-backend.ts \
            src/admin/submissions/application-registration.ts \
            src/admin/submissions/problem-location-correction-application.ts \
            src/admin/submissions/problem-location-correction-application-authorization.ts \
            src/admin/submissions/drizzle-problem-location-correction-application-backend.ts \
            'functions/admin/api/problem-applications/[applicationId]/apply-location-correction.ts' \
            tests/problem-location-correction-application.test.ts \
            tests/problem-location-correction-application-api.test.ts \
            scripts/check-problem-location-correction-application.ts \
            docs/P5_07D1_PROBLEM_LOCATION_CORRECTION_APPLICATION.md
      - name: Commit integration
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json src functions tests scripts docs drizzle
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "P5-07D1: integrate Problem Location correction application"
          git push origin HEAD:p5-07d1-problem-location-correction
