name: P2-14 format

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  format:
    if: github.head_ref == 'work/p214'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out P2-14 branch
        uses: actions/checkout@v4
        with:
          ref: work/p214
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.18.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Format changed files
        run: npm run format

      - name: Remove one-time workflow and commit
        run: |
          rm -f .github/workflows/p214-format.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "P2-14: apply canonical formatting"
          git push origin HEAD:work/p214
