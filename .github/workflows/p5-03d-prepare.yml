name: Prepare P5-03D branch

on:
  push:
    branches:
      - p5-03d-report-reviewer-entry

permissions:
  contents: write

jobs:
  prepare:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: p5-03d-report-reviewer-entry
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Synchronize P5-03D tracking
        run: |
          python <<'PY'
          from pathlib import Path

          def replace(path, old, new):
              file = Path(path)
              text = file.read_text()
              if old not in text:
                  raise SystemExit(f'missing expected tracking text in {path}: {old!r}')
              file.write_text(text.replace(old, new))

          replace(
              'docs/PROJECT_STATUS.md',
              'P5-03C — Canonical report target snapshot and Claim-context signals',
              'P5-03D — Protected report reviewer queue and detail entry',
          )
          replace(
              'docs/PROJECT_STATUS.md',
              '- P5-03C canonical report target snapshot and Claim-context signals are in progress.',
              '- P5-03C canonical report target snapshot and Claim-context signals are complete through #196.\n- P5-03D protected report reviewer queue and detail entry is in progress.',
          )
          replace(
              'docs/PROJECT_STATUS.md',
              '3. P5-03 — Payment and problem reports — In progress at P5-03C',
              '3. P5-03 — Payment and problem reports — In progress at P5-03D',
          )
          replace(
              'docs/PROJECT_STATUS.md',
              'P5-03C  Canonical report target snapshot and Claim-context signals          In progress',
              'P5-03C  Canonical report target snapshot and Claim-context signals          Completed #196\nP5-03D  Protected report reviewer queue and detail entry                   In progress',
          )
          replace(
              'docs/PROJECT_STATUS.md',
              '30. `docs/P5_02R_SUGGEST_INTEGRATION_AND_HANDOFF_AUDIT.md`;\n31. `docs/P4_18_E_LIVE_REVIEW_AND_HANDOFF_AUDIT.md`.',
              '30. `docs/P5_02R_SUGGEST_INTEGRATION_AND_HANDOFF_AUDIT.md`;\n31. `docs/P5_03A_REPORT_CONTRACT_AND_NORMALIZATION.md`;\n32. `docs/P5_03B_REPORT_PRIVATE_INTAKE_INTEGRATION.md`;\n33. `docs/P5_03C_REPORT_TARGET_CONTEXT.md`;\n34. `docs/P5_03D_REPORT_REVIEWER_ENTRY.md`;\n35. `docs/P4_18_E_LIVE_REVIEW_AND_HANDOFF_AUDIT.md`.',
          )
          replace(
              'docs/PROJECT_STATUS.md',
              '## Current active scope — P5-03C report target context\n\nP5-03C resolves the existing Entity, Location, or Claim named by a private report and reduces public target identity, canonical path, public reportability, and exact Claim-context matches to a bounded protected-review response. It is read-only and adds no route, form, reviewer decision, Evidence action, priority change, visibility change, canonical mutation, export, or publication.\n\n## Next\n\nComplete P5-03C target identity validation, bounded public snapshot, Claim-context reasons, focused tests, and schema-check integration. Then proceed to P5-03D protected report reviewer queue and detail entry.\n\n## Blocked\n\nNo P5-03C blocker is known. Retained Launch work remains unchanged and launch readiness is not claimed.',
              '## Current active scope — P5-03D protected report reviewer entry\n\nP5-03D connects private payment and problem reports to a protected read-only queue and detail workspace. It strictly revalidates normalized reports, requires stored target metadata to match the projection, composes the P5-03C canonical target context, exposes only bounded workflow events, and adds no Evidence acceptance, Claim-state change, recheck-priority mutation, visibility decision, correction application, canonical mutation, export, or publication.\n\nRepository implementation and GitHub validation proceed without Cloudflare or Neon operator actions. Configured Access, deployed Functions, and live database execution remain assigned to P5-03I.\n\n## Next\n\nComplete P5-03D protected queue/detail contracts, Drizzle read backends, read-only administration UI, focused tests, schema validation, and built-artifact checks. Then proceed to P5-03E positive-payment Evidence and reconfirmation decision boundary.\n\n## Blocked\n\nNo repository blocker to P5-03D is known. Configured Cloudflare/Neon execution is intentionally deferred to P5-03I; retained Launch work remains unchanged and launch readiness is not claimed.',
          )

          replace(
              'docs/IMPLEMENTATION_PLAN.md',
              '**Status:** In progress at P5-03C',
              '**Status:** In progress at P5-03D',
          )
          replace(
              'docs/IMPLEMENTATION_PLAN.md',
              'P5-03C — Canonical target snapshot and Claim-context signals              In progress\n    ↓\nP5-03D — Protected report reviewer queue and detail entry                 Planned',
              'P5-03C — Canonical target snapshot and Claim-context signals              Completed #196\n    ↓\nP5-03D — Protected report reviewer queue and detail entry                 In progress',
          )
          replace(
              'docs/IMPLEMENTATION_PLAN.md',
              'P5-03A is complete through #194 and P5-03B is complete through #195. P5-03C owns only read-only target existence, public target snapshot, reportability, and exact Claim-context reasons. It does not add public routes/forms, reviewer decisions, Evidence acceptance, recheck-priority mutation, temporary hiding, canonical mutation, export, or publication.',
              'P5-03A is complete through #194, P5-03B through #195, and P5-03C through #196. P5-03D owns only the protected read-only report queue and detail entry, strict normalized projection validation, bounded workflow history, and P5-03C target-context composition. It does not add public routes/forms, reviewer decisions, Evidence acceptance, recheck-priority mutation, temporary hiding, correction application, canonical mutation, export, or publication. Configured Cloudflare and Neon execution remains deferred to P5-03I.',
          )

          replace(
              'docs/PHASE5_IMPLEMENTATION_SEQUENCE.md',
              '**Status:** Active — P5-03C in progress',
              '**Status:** Active — P5-03D in progress',
          )
          replace(
              'docs/PHASE5_IMPLEMENTATION_SEQUENCE.md',
              'P5-03C  Canonical report target snapshot and Claim-context signals          In progress\nP5-03   Payment and problem reports                                     In progress',
              'P5-03C  Canonical report target snapshot and Claim-context signals          Completed #196\nP5-03D  Protected report reviewer queue and detail entry                   In progress\nP5-03   Payment and problem reports                                     In progress',
          )
          replace(
              'docs/PHASE5_IMPLEMENTATION_SEQUENCE.md',
              '**Status:** In progress at P5-03C',
              '**Status:** In progress at P5-03D',
          )
          replace(
              'docs/PHASE5_IMPLEMENTATION_SEQUENCE.md',
              'P5-03C — Canonical target snapshot and Claim-context signals              In progress\n    ↓\nP5-03D — Protected report reviewer queue and detail entry                 Planned',
              'P5-03C — Canonical target snapshot and Claim-context signals              Completed #196\n    ↓\nP5-03D — Protected report reviewer queue and detail entry                 In progress',
          )

          replace(
              'docs/P5_03C_REPORT_TARGET_CONTEXT.md',
              '**Status:** Active',
              '**Status:** Completed through #196',
          )
          replace(
              'docs/P5_03C_REPORT_TARGET_CONTEXT.md',
              '## Next\n\nProceed to P5-03D for the protected report reviewer queue and detail-entry projection. P5-03D may consume P5-03B private payloads and P5-03C target context, but it must remain read-only with respect to Claim state and canonical targets.',
              '## Completion result\n\nP5-03C completed through #196. Entity, Location, and Claim target identities, public paths, reportability reasons, exact payment/problem Claim-context signals, non-conclusive absence semantics, focused tests, and schema validation are merged as a read-only contract.\n\n## Next\n\nProceed to P5-03D for the protected report reviewer queue and detail-entry projection. P5-03D may consume P5-03B private payloads and P5-03C target context, but it must remain read-only with respect to Claim state and canonical targets.',
          )
          PY

      - name: Format repository changes
        run: npm run format

      - name: Remove one-shot preparation workflow
        run: git rm .github/workflows/p5-03d-prepare.yml

      - name: Commit prepared branch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          if git diff --cached --quiet; then
            echo 'No preparation changes to commit.'
            exit 0
          fi
          git commit -m 'P5-03D: finalize reviewer entry slice'
          git push origin HEAD:p5-03d-report-reviewer-entry
