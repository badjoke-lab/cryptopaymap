name: P5-05H format branch

on:
  push:
    branches:
      - p5-05h-browser-photos-direct-upload

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: p5-05h-browser-photos-direct-upload
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run format
      - name: Commit formatted files
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/submissions/PhotoForm.tsx src/submissions/photo-browser-contract.ts
          git commit -m "P5-05H format Photos browser files"
          git push origin HEAD:p5-05h-browser-photos-direct-upload
